# dbt profile for the load_people_api Cosmos gate.
#
# MUST be named `profiles.yml` and live in its own directory: Cosmos passes dbt
# `--profiles-dir <parent-of-profiles_yml_filepath>` and dbt then reads `<dir>/profiles.yml`, so a
# differently-named file (or a shared dir) is not found. This dedicated dir avoids collisions.
#
# Authenticates with the people-api-loader service principal via OAuth M2M, reading the SAME
# env vars as the loader's databricks-sdk (DATABRICKS_HOST / DATABRICKS_CLIENT_ID /
# DATABRICKS_CLIENT_SECRET) so a single OAuth credential is used across every process. dbt
# resolves env_var() at task runtime. The profile name `default` matches dbt_project.yml's
# `profile:` key. Ships to /usr/local/airflow/include/loader_dbt/ in the Astro image.
default:
  target: loader
  outputs:
    loader:
      type: databricks
      # dbt-databricks wants the bare host (no scheme); DATABRICKS_HOST is the full URL.
      host: "{{ env_var('DATABRICKS_HOST') | replace('https://', '') | replace('http://', '') }}"
      # http_path comes straight from the shared L2 Databricks connection (injected as
      # DATABRICKS_HTTP_PATH by the DAG), so the gate runs on the same compute the L2 dbt jobs use.
      http_path: "{{ env_var('DATABRICKS_HTTP_PATH') }}"
      auth_type: oauth
      client_id: "{{ env_var('DATABRICKS_CLIENT_ID') }}"
      client_secret: "{{ env_var('DATABRICKS_CLIENT_SECRET') }}"
      catalog: "{{ env_var('LOADER_DBT_CATALOG', 'goodparty_data_catalog') }}"
      schema: "{{ env_var('LOADER_DBT_SCHEMA', 'dbt') }}"
      threads: 4
