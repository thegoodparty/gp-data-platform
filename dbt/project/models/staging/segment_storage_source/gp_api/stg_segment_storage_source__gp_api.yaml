models:
  - name: stg_segment_storage_source__gp_api_tracks
    description: Segment track calls from GP API capturing user actions and events
    columns:
      - name: id
        description: Unique identifier for the track event
        data_tests:
          - not_null
          - unique
      - name: event
        description: Name of the tracked event
        data_tests:
          - not_null
      - name: user_id
        description: Segment user ID associated with the event
      - name: timestamp
        description: Timestamp when the event occurred
        data_tests:
          - not_null
      - name: received_at
        description: Timestamp when Segment received the event
        data_tests:
          - not_null

  - name: stg_segment_storage_source__gp_api_identifies
    description: Segment identify calls from GP API linking anonymous IDs to known users
    columns:
      - name: id
        description: Unique identifier for the identify call
        data_tests:
          - not_null
          - unique
      - name: user_id
        description: Segment user ID
      - name: email
        description: Email address from the identify call
      - name: received_at
        description: Timestamp when Segment received the event
        data_tests:
          - not_null

  - name: stg_segment_storage_source__gp_api_users
    description: Segment user profiles from GP API with traits and properties
    columns:
      - name: id
        description: Unique identifier for the user profile
        data_tests:
          - not_null
          - unique
      - name: user_id
        description: Segment user ID
      - name: email
        description: Email address of the user
      - name: received_at
        description: Timestamp when Segment received the event
        data_tests:
          - not_null

  - name: stg_segment_storage_source__gp_api_peerly_identity_id_created
    description: Segment event fired when a Peerly identity ID is created for 10DLC compliance
    columns:
      - name: id
        description: Unique identifier for the event
        data_tests:
          - not_null
          - unique
      - name: event
        description: Name of the tracked event, always peerly_identity_id_created
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["peerly_identity_id_created"]
      - name: campaign_id
        description: GoodParty campaign (candidacy) ID the Peerly identity belongs to; nullable, as some events arrive without a campaign context
      - name: user_id
        description: Segment user ID associated with the event
        data_tests:
          - not_null
      - name: peerly_identity_id
        description: Peerly identity ID created for the campaign's 10DLC registration
        data_tests:
          - not_null
      - name: timestamp
        description: Timestamp when the event occurred
        data_tests:
          - not_null
      - name: received_at
        description: Timestamp when Segment received the event
        data_tests:
          - not_null

  - name: stg_segment_storage_source__gp_api_voter_outreach_10dlc_compliance_pin_submitted
    description: Segment event fired when a user submits their 10DLC compliance PIN
    columns:
      - name: id
        description: Unique identifier for the event
        data_tests:
          - not_null
          - unique
      - name: event
        description: Name of the tracked event, always voter_outreach_10dlc_compliance_pin_submitted
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["voter_outreach_10dlc_compliance_pin_submitted"]
      - name: user_id
        description: Segment user ID associated with the event
        data_tests:
          - not_null
      - name: timestamp
        description: Timestamp when the event occurred
        data_tests:
          - not_null
      - name: received_at
        description: Timestamp when Segment received the event
        data_tests:
          - not_null
