version: 2

models:
  - name: stg_airflow_source__l2_expired_voters
    description: >
      Staged view of expired L2 voter IDs ingested by the Airflow
      l2_ingest_expired_voters DAG. Each row is a LALVOTERID that was
      flagged as expired on L2's SFTP server.
    columns:
      - name: lalvoterid
        description: The L2 voter identifier that has been expired
        tests:
          - not_null
      - name: source_files
        description: Comma-separated list of SFTP source file names from the DAG run
      - name: source_file_keys
        description: >
          Comma-separated composite keys (filename|mtime) used for idempotency.
          Republished files with the same name but a new modification time
          are treated as new and re-processed.
      - name: file_modified_at
        description: SFTP file modification timestamp (most recent file in the batch)
      - name: ingested_at
        description: Timestamp when the record was staged by Airflow
        tests:
          - not_null
      - name: dag_run_id
        description: Airflow DAG run ID for traceability
        tests:
          - not_null
      - name: status
        description: >
          Processing status of the staged record. 'pending' while ingestion
          is in progress, 'completed' after staging succeeds.
        tests:
          - not_null
          - accepted_values:
              values: ['pending', 'completed']
