          published or not computable.
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - summary_level
              - geoid
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              length(geoid) = case summary_level when '150' then 12 when '040' then 2 when '050'
              then 5 when '160' then 7 when '010' then 0 else 7 end
      # Any unmapped jam sentinel would surface as a large negative value: these
      # two range walls make that impossible to miss. Aggregate household income
      # is excluded from the estimate wall because an additive dollar aggregate
      # can be legitimately negative in rare small geographies.
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              total_population_moe >= 0 and population_under_18_moe >= 0 and
              population_65_plus_moe >= 0 and population_race_universe_moe >= 0 and
              population_white_nh_moe >= 0 and population_black_nh_moe >= 0 and
              population_native_american_nh_moe >= 0 and population_asian_nh_moe >= 0 and
              population_other_nh_moe >= 0 and population_hispanic_moe >= 0 and
              population_25_plus_moe >= 0 and population_hs_or_higher_moe >= 0 and
              population_bachelors_or_higher_moe >= 0 and aggregate_household_income_moe >= 0
              and civilian_labor_force_moe >= 0 and unemployed_population_moe >= 0 and
              households_moe >= 0 and owner_occupied_households_moe >= 0 and
              population_in_households_moe >= 0 and households_broadband_universe_moe >= 0 and
              households_with_broadband_moe >= 0 and population_poverty_universe_moe >= 0 and
              population_below_poverty_moe >= 0 and median_household_income_moe >= 0 and
              median_home_value_moe >= 0 and households_income_universe_moe >= 0 and
              households_income_under_10k_moe >= 0 and households_income_10k_to_15k_moe >= 0 and
              households_income_15k_to_20k_moe >= 0 and households_income_20k_to_25k_moe >= 0
              and households_income_25k_to_30k_moe >= 0 and households_income_30k_to_35k_moe >=
              0 and households_income_35k_to_40k_moe >= 0 and households_income_40k_to_45k_moe
              >= 0 and households_income_45k_to_50k_moe >= 0 and
              households_income_50k_to_60k_moe >= 0 and households_income_60k_to_75k_moe >= 0
              and households_income_75k_to_100k_moe >= 0 and households_income_100k_to_125k_moe
              >= 0 and households_income_125k_to_150k_moe >= 0 and
              households_income_150k_to_200k_moe >= 0 and households_income_200k_plus_moe >= 0
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
