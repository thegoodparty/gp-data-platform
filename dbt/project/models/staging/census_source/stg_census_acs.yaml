      - name: population_below_poverty
        description: >
          ACS source cell(s): C17002 E002+E003 (income-to-poverty ratio below 1.00). Universe:
          Population for whom poverty status is determined (excludes institutionalized group
          quarters, military quarters, and college dormitories). Combined from the component
          brackets; null if any component is suppressed. Null when the Census suppressed or
          could not compute the value (jam codes).
      - name: population_below_poverty_moe
        description: >
          90 percent margin of error for population_below_poverty. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable. Combined by plain root sum of squares, which overstates
          for combinations of many or rare cells.
      - name: median_household_income
        description: >
          ACS source cell(s): B19013_E001. Universe: Households. Published medians are staged
          for published-geography rows only and are never allocated or aggregated; they are not
          additive. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: median_household_income_moe
        description: >
          90 percent margin of error for median_household_income. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: median_home_value
        description: >
          ACS source cell(s): B25077_E001. Universe: Owner-occupied housing units. Published
          medians are staged for published-geography rows only and are never allocated or
          aggregated; they are not additive. 2024 inflation-adjusted dollars. Null when the
          Census suppressed or could not compute the value (jam codes).
      - name: median_home_value_moe
        description: >
          90 percent margin of error for median_home_value. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: households_income_universe
        description: >
          ACS source cell(s): B19001_E001. Universe: Households. Denominator for the income
          brackets; equals households by construction. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_universe_moe
        description: >
          90 percent margin of error for households_income_universe. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_under_10k
        description: >
          ACS source cell(s): B19001_E002 (household income less than $10,000). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_under_10k_moe
        description: >
          90 percent margin of error for households_income_under_10k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_10k_to_15k
        description: >
          ACS source cell(s): B19001_E003 (household income $10,000 to $14,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_10k_to_15k_moe
        description: >
          90 percent margin of error for households_income_10k_to_15k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_15k_to_20k
        description: >
          ACS source cell(s): B19001_E004 (household income $15,000 to $19,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_15k_to_20k_moe
        description: >
          90 percent margin of error for households_income_15k_to_20k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_20k_to_25k
        description: >
          ACS source cell(s): B19001_E005 (household income $20,000 to $24,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_20k_to_25k_moe
        description: >
          90 percent margin of error for households_income_20k_to_25k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_25k_to_30k
        description: >
          ACS source cell(s): B19001_E006 (household income $25,000 to $29,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_25k_to_30k_moe
        description: >
          90 percent margin of error for households_income_25k_to_30k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_30k_to_35k
        description: >
          ACS source cell(s): B19001_E007 (household income $30,000 to $34,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_30k_to_35k_moe
        description: >
          90 percent margin of error for households_income_30k_to_35k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_35k_to_40k
        description: >
          ACS source cell(s): B19001_E008 (household income $35,000 to $39,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_35k_to_40k_moe
        description: >
          90 percent margin of error for households_income_35k_to_40k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_40k_to_45k
        description: >
          ACS source cell(s): B19001_E009 (household income $40,000 to $44,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_40k_to_45k_moe
        description: >
          90 percent margin of error for households_income_40k_to_45k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_45k_to_50k
        description: >
          ACS source cell(s): B19001_E010 (household income $45,000 to $49,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_45k_to_50k_moe
        description: >
          90 percent margin of error for households_income_45k_to_50k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_50k_to_60k
        description: >
          ACS source cell(s): B19001_E011 (household income $50,000 to $59,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_50k_to_60k_moe
        description: >
          90 percent margin of error for households_income_50k_to_60k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_60k_to_75k
        description: >
          ACS source cell(s): B19001_E012 (household income $60,000 to $74,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_60k_to_75k_moe
        description: >
          90 percent margin of error for households_income_60k_to_75k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_75k_to_100k
        description: >
          ACS source cell(s): B19001_E013 (household income $75,000 to $99,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_75k_to_100k_moe
        description: >
          90 percent margin of error for households_income_75k_to_100k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_100k_to_125k
        description: >
          ACS source cell(s): B19001_E014 (household income $100,000 to $124,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_100k_to_125k_moe
        description: >
          90 percent margin of error for households_income_100k_to_125k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_125k_to_150k
        description: >
          ACS source cell(s): B19001_E015 (household income $125,000 to $149,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_125k_to_150k_moe
        description: >
          90 percent margin of error for households_income_125k_to_150k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_150k_to_200k
        description: >
          ACS source cell(s): B19001_E016 (household income $150,000 to $199,999). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_150k_to_200k_moe
        description: >
          90 percent margin of error for households_income_150k_to_200k. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_income_200k_plus
        description: >
          ACS source cell(s): B19001_E017 (household income $200,000 or more). Universe:
          Households. 2024 inflation-adjusted dollars. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: households_income_200k_plus_moe
        description: >
          90 percent margin of error for households_income_200k_plus. 0 means the estimate is
