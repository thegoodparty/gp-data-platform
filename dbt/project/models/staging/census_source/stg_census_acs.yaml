      - name: households_broadband_universe
        description: >
          ACS source cell(s): B28002_E001. Universe: Households. Denominator for the
          broadband-subscription share; equals households by construction. Null when the Census
          suppressed or could not compute the value (jam codes).
      - name: households_broadband_universe_moe
        description: >
          90 percent margin of error for households_broadband_universe. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households_with_broadband
        description: >
          ACS source cell(s): B28002_E004 (broadband of any type; a subscription measure, not
          availability). Universe: Households. Null when the Census suppressed or could not
          compute the value (jam codes).
      - name: households_with_broadband_moe
        description: >
          90 percent margin of error for households_with_broadband. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: population_poverty_universe
        description: >
          ACS source cell(s): C17002_E001. Universe: Population for whom poverty status is
          determined (excludes institutionalized group quarters, military quarters, and college
          dormitories). Null when the Census suppressed or could not compute the value (jam
          codes).
      - name: population_poverty_universe_moe
        description: >
          90 percent margin of error for population_poverty_universe. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
