version: 2

models:
  - name: stg_census_acs__geo_estimates
    description: >
      ACS 2020-2024 5-year estimates and 90 percent margins of error at the retained summary
      levels: block group (150) and state (040) feed the district demographic layer; county
      (050), place (160), national (010), and school districts (950/960/970) are published
      validation surfaces and inputs to later place-page work. One row per (summary_level,
      geoid), parsed from the summary file GEO_ID keeping only complete-geography (component
      0000) rows. Counts-first contract: every column is a raw count, an additive dollar
      aggregate, or a never-allocated published median, with its margin twin; shares and rates
      are derived downstream from allocated primitives, never here. Jam-code sentinels are
      mapped so null means suppressed or not computable and a margin of exactly 0 means the
      estimate is controlled to an official total (a guard test proves the raw files publish no
      literal zero margin on retained rows, and the raw tables keep the original sentinels, so
      per-cell controlled flags stay re-derivable if a consumer ever needs component
      provenance). Bracket combinations use plain root-sum-of-squares margins (conservative;
      reads large for rare-subgroup combinations by construction). Margins assume independence
      and must not be summed or differenced across rows or across the race/ethnicity columns
      (they share one population). Dollar values are 2024 inflation-adjusted dollars. One-time
      load; see the census_acs source for provenance and the refresh story.
    columns:
      - name: summary_level
        description: >
          Census summary level of the row: 150 block group, 040 state, 050 county, 160 place,
          010 national, 950/960/970 elementary/secondary/unified school district.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["150", "040", "050", "160", "010", "950", "960", "970"]
      - name: geoid
        description: >
          FIPS-based geographic id parsed from GEO_ID (the part after 'US'): 12 characters for
          block groups (state+county+tract+block group), 2 state, 5 county, 7 place and school
          districts, empty string for the national row. Connecticut rows carry planning-region
          county codes (the 2022 county-equivalent change), not legacy counties.
        data_tests:
          - not_null
      - name: total_population
        description: >
          ACS source cell(s): B01001_E001. Universe: Total population. Null when the Census
          suppressed or could not compute the value (jam codes).
      - name: total_population_moe
        description: >
          90 percent margin of error for total_population. 0 means the estimate is controlled to
          an official total (no sampling error); null means the margin was not published or not
          computable.
      - name: population_under_18
        description: >
          ACS source cell(s): B01001 E003-E006 + E027-E030 (under 18 years). Universe: Total
          population. Combined from the component brackets; null if any component is suppressed.
          Null when the Census suppressed or could not compute the value (jam codes).
      - name: population_under_18_moe
        description: >
          90 percent margin of error for population_under_18. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable. Combined by plain root sum of squares, which overstates for
          combinations of many or rare cells.
      - name: population_65_plus
        description: >
          ACS source cell(s): B01001 E020-E025 + E044-E049 (65 years and over). Universe: Total
          population. Combined from the component brackets; null if any component is suppressed.
          Null when the Census suppressed or could not compute the value (jam codes).
      - name: population_65_plus_moe
        description: >
          90 percent margin of error for population_65_plus. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable. Combined by plain root sum of squares, which overstates for
          combinations of many or rare cells.
      - name: population_race_universe
        description: >
          ACS source cell(s): B03002_E001. Universe: Total population. Denominator for the race
          and ethnicity columns; equals total population by construction. Null when the Census
          suppressed or could not compute the value (jam codes).
      - name: population_race_universe_moe
        description: >
          90 percent margin of error for population_race_universe. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: population_white_nh
        description: >
          ACS source cell(s): B03002_E003 (not Hispanic or Latino, white alone). Universe: Total
          population. Null when the Census suppressed or could not compute the value (jam
          codes).
      - name: population_white_nh_moe
        description: >
          90 percent margin of error for population_white_nh. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: population_black_nh
        description: >
          ACS source cell(s): B03002_E004 (not Hispanic or Latino, Black or African American
          alone). Universe: Total population. Null when the Census suppressed or could not
          compute the value (jam codes).
      - name: population_black_nh_moe
        description: >
          90 percent margin of error for population_black_nh. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: population_native_american_nh
        description: >
          ACS source cell(s): B03002_E005 (not Hispanic or Latino, American Indian and Alaska
          Native alone). Universe: Total population. Null when the Census suppressed or could
          not compute the value (jam codes).
      - name: population_native_american_nh_moe
        description: >
          90 percent margin of error for population_native_american_nh. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: population_asian_nh
        description: >
          ACS source cell(s): B03002_E006 (not Hispanic or Latino, Asian alone). Universe: Total
          population. Null when the Census suppressed or could not compute the value (jam
          codes).
      - name: population_asian_nh_moe
        description: >
          90 percent margin of error for population_asian_nh. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: population_other_nh
        description: >
          ACS source cell(s): B03002 E007+E008+E009 (not Hispanic or Latino: Native Hawaiian and
          Other Pacific Islander alone, some other race alone, and two or more races). Universe:
          Total population. Combined from the component brackets; null if any component is
          suppressed. Null when the Census suppressed or could not compute the value (jam
          codes).
      - name: population_other_nh_moe
        description: >
          90 percent margin of error for population_other_nh. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable. Combined by plain root sum of squares, which overstates for
          combinations of many or rare cells.
      - name: population_hispanic
        description: >
