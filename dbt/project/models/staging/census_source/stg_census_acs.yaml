      - name: population_hispanic_moe
        description: >
          90 percent margin of error for population_hispanic. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: population_25_plus
        description: >
          ACS source cell(s): B15002_E001. Universe: Population 25 years and over. Null when the
          Census suppressed or could not compute the value (jam codes).
      - name: population_25_plus_moe
        description: >
          90 percent margin of error for population_25_plus. 0 means the estimate is controlled
          to an official total (no sampling error); null means the margin was not published or
          not computable.
      - name: population_hs_or_higher
        description: >
          ACS source cell(s): B15002 male E011-E018 + female E028-E035 (high school graduate,
          including equivalency, or higher). Universe: Population 25 years and over. Combined
          from the component brackets; null if any component is suppressed. Null when the Census
          suppressed or could not compute the value (jam codes).
      - name: population_hs_or_higher_moe
        description: >
          90 percent margin of error for population_hs_or_higher. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable. Combined by plain root sum of squares, which overstates
          for combinations of many or rare cells.
      - name: population_bachelors_or_higher
        description: >
          ACS source cell(s): B15002 male E015-E018 + female E032-E035 (bachelor's degree or
          higher). Universe: Population 25 years and over. Combined from the component brackets;
          null if any component is suppressed. Null when the Census suppressed or could not
          compute the value (jam codes).
      - name: population_bachelors_or_higher_moe
        description: >
          90 percent margin of error for population_bachelors_or_higher. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable. Combined by plain root sum of squares, which overstates
          for combinations of many or rare cells.
      - name: aggregate_household_income
        description: >
          ACS source cell(s): B19025_E001. Universe: Households. Aggregate (summed) household
          income: an additive dollar total, the safe allocation primitive behind mean income.
          2024 inflation-adjusted dollars. Null when the Census suppressed or could not compute
          the value (jam codes).
      - name: aggregate_household_income_moe
        description: >
          90 percent margin of error for aggregate_household_income. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: civilian_labor_force
        description: >
          ACS source cell(s): B23025_E003. Universe: Population 16 years and over. Null when the
          Census suppressed or could not compute the value (jam codes).
      - name: civilian_labor_force_moe
        description: >
          90 percent margin of error for civilian_labor_force. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: unemployed_population
        description: >
          ACS source cell(s): B23025_E005. Universe: Population 16 years and over. Null when the
          Census suppressed or could not compute the value (jam codes).
      - name: unemployed_population_moe
        description: >
          90 percent margin of error for unemployed_population. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: households
        description: >
          ACS source cell(s): B25003_E001. Universe: Occupied housing units. Occupied housing
          units, the household count and the denominator for tenure, mean income, and household
          size. Null when the Census suppressed or could not compute the value (jam codes).
      - name: households_moe
        description: >
          90 percent margin of error for households. 0 means the estimate is controlled to an
          official total (no sampling error); null means the margin was not published or not
          computable.
      - name: owner_occupied_households
        description: >
          ACS source cell(s): B25003_E002. Universe: Occupied housing units. Null when the
          Census suppressed or could not compute the value (jam codes).
      - name: owner_occupied_households_moe
        description: >
          90 percent margin of error for owner_occupied_households. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
          published or not computable.
      - name: population_in_households
        description: >
          ACS source cell(s): B25008_E001. Universe: Total population in occupied housing units.
          Null when the Census suppressed or could not compute the value (jam codes).
      - name: population_in_households_moe
        description: >
          90 percent margin of error for population_in_households. 0 means the estimate is
          controlled to an official total (no sampling error); null means the margin was not
