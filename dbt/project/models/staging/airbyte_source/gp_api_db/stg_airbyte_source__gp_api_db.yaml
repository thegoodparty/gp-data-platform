                field: id
              config:
                warn_if: ">5"
                error_if: ">10"
      - name: run_id
        description: "Identifier for the generation run that produced this standout action"
        data_tests:
          - not_null
      - name: opponent_name
        description: >
          Name of the opponent the standout action is attributed to. Nullable
