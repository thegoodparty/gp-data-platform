models:
  - name: stg_airbyte_source__gp_api_db_annotation
    description: >
      Annotation records (notes, chats, bug reports) attached to EO Meeting
      Briefing artifacts. One row per annotation.
    columns:
      - name: id
        description: "Primary key - unique identifier for the annotation"
        data_tests:
          - not_null
          - unique
      - name: kind
        description: "Type of annotation: note, chat, bug_report, or review"
        data_tests:
          - accepted_values:
              arguments:
                values: ["note", "chat", "bug_report", "review"]
      - name: author_user_id
        description: "Foreign key to the user who authored the annotation"
        data_tests:
          - not_null
      - name: resource_id
        description: "ID of the annotated resource (e.g. a meeting briefing)"
        data_tests:
          - not_null
      - name: resource_type
        description: "Type of the annotated resource"
        data_tests:
          - not_null
      - name: note_id
        description: "Foreign key to annotation_note when kind = note"
      - name: chat_conversation_id
        description: "Foreign key to chat_conversation when kind = chat"
      - name: annotation_bug_report_id
        description: "Foreign key to annotation_bug_report when kind = bug_report"
      - name: annotation_review_id
        description: "Foreign key to annotation_review"
  - name: stg_airbyte_source__gp_api_db_annotation_bug_report
    description: raw data load from gp_api_db postgres db from table `annotation_bug_report`
    columns:
      - name: id
        description: "Primary key - unique identifier for the bug report"
        data_tests:
          - not_null
          - unique
      - name: description
        description: "Free-text description of the reported bug"
      - name: submitted_at
        description: "Timestamp when the bug report was submitted"
  - name: stg_airbyte_source__gp_api_db_annotation_note
    description: raw data load from gp_api_db postgres db from table `annotation_note`
    columns:
      - name: id
        description: "Primary key - unique identifier for the note"
        data_tests:
          - not_null
          - unique
      - name: body
        description: "Free-text body of the note"
      - name: created_at
        description: "Timestamp when the note was created"
      - name: updated_at
        description: "Timestamp when the note was last updated"
  - name: stg_airbyte_source__gp_api_db_annotation_note_attachment
    description: raw data load from gp_api_db postgres db from table `annotation_note_attachment`
    columns:
      - name: id
        description: "Primary key - unique identifier for the attachment"
        data_tests:
          - not_null
          - unique
      - name: note_id
        description: "Foreign key to the annotation_note this attachment belongs to"
        data_tests:
          - not_null
      - name: storage_key
        description: "Storage key/path for the attachment file"
      - name: file_name
        description: "Original file name of the attachment"
      - name: mime_type
        description: "MIME type of the attachment"
      - name: size_bytes
        description: "Size of the attachment in bytes"
      - name: ocr_status
        description: "OCR processing status: pending, processing, completed, failed, or skipped"
        data_tests:
          - accepted_values:
              arguments:
                values: ["pending", "processing", "completed", "failed", "skipped"]
      - name: ocr_text
        description: "Extracted text from OCR processing"
      - name: ocr_error
        description: "Error message if OCR processing failed"
      - name: ocr_completed_at
        description: "Timestamp when OCR processing completed"
      - name: created_at
        description: "Timestamp when the attachment was created"
  - name: stg_airbyte_source__gp_api_db_annotation_review
    description: raw data load from gp_api_db postgres db from table `annotation_review`
    columns:
      - name: id
        description: "Primary key - unique identifier for the review"
        data_tests:
          - not_null
          - unique
      - name: body
        description: "Free-text body of the review"
      - name: reviewer_email
        description: "Email of the reviewer"
      - name: reviewer_clerk_sub
        description: "Clerk subject identifier of the reviewer"
      - name: created_at
        description: "Timestamp when the review was created"
      - name: updated_at
        description: "Timestamp when the review was last updated"
  - name: stg_airbyte_source__gp_api_db_artifact_feedback
    description: >
      Positive/negative feedback submitted on EO Meeting Briefing artifacts.
      One row per (submitter, briefing, artifact) feedback submission.
    columns:
      - name: id
        description: "Primary key - unique identifier for the feedback submission"
        data_tests:
          - not_null
          - unique
      - name: feedback
        description: "Feedback value: positive or negative"
        data_tests:
          - accepted_values:
              arguments:
                values: ["positive", "negative"]
      - name: comment
        description: "Optional free-text comment accompanying the feedback"
      - name: artifact_id
        description: "ID of the artifact the feedback is about"
        data_tests:
          - not_null
      - name: artifact_type
        description: "Type of the artifact (e.g. agenda_item)"
        data_tests:
          - not_null
      - name: briefing_id
        description: "Foreign key to the meeting_briefing"
        data_tests:
          - not_null
      - name: organization_slug
        description: "Foreign key to the organization"
        data_tests:
          - not_null
      - name: submitter_user_id
        description: "Foreign key to the user who submitted the feedback"
        data_tests:
          - not_null
      - name: created_at
        description: "Timestamp when the feedback was created"
      - name: updated_at
        description: "Timestamp when the feedback was last updated"
  - name: stg_airbyte_source__gp_api_db_artifact_review
    description: >
      Automated/human review verdicts on EO artifacts (currently briefings).
      One row per review of a resource.
    columns:
      - name: id
        description: "Primary key - unique identifier for the review"
        data_tests:
          - not_null
          - unique
      - name: verdict
        description: "Review outcome: passed or failed"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["passed", "failed"]
      - name: fail_reason
        description: "Free-text explanation of the failure (null when passed)"
      - name: resource_id
        description: "ID of the reviewed resource (e.g. a briefing_id)"
        data_tests:
          - not_null
      - name: resource_type
        description: "Type of the reviewed resource (e.g. briefing)"
        data_tests:
          - not_null
      - name: reviewer_email
        description: "Email of the reviewer (nullable; some rows carry the reviewer's identity only in reviewer_clerk_sub)"
      - name: reviewer_clerk_sub
        description: "Reviewer identity: Clerk subject id, though some rows hold an email instead"
      - name: created_at
        description: "Timestamp when the review was created"
      - name: updated_at
        description: "Timestamp when the review was last updated"
  - name: stg_airbyte_source__gp_api_db_campaign
    description: raw data load from gp_api_db postgres db from table `campaign`
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: organization_slug
        description: "Foreign key to the organization table"
        data_tests:
          - unique:
              config:
                where: "organization_slug is not null"
  - name: stg_airbyte_source__gp_api_db_campaign_position
    description: raw data load from gp_api_db postgres db from table `campaign_position`
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: campaign_id
        data_tests:
          - not_null
      - name: position_id
        data_tests:
          - not_null
      - name: top_issue_id
        data_tests:
          - not_null
  - name: stg_airbyte_source__gp_api_db_chat_conversation
    description: >
      Chat conversations collected from EO Meeting Briefings. One row per
      conversation.
    columns:
      - name: id
        description: "Primary key - unique identifier for the conversation"
        data_tests:
          - not_null
          - unique
      - name: scope
        description: "Scope of the conversation"
      - name: title
        description: "Title of the conversation"
      - name: anchor
        description: "Anchor reference locating the conversation within its resource"
      - name: owner_user_id
        description: "Foreign key to the user who owns the conversation"
        data_tests:
          - not_null
      - name: organization_slug
        description: "Foreign key to the organization"
      - name: deleted_at
        description: "Timestamp when the conversation was soft-deleted, if any"
      - name: created_at
        description: "Timestamp when the conversation was created"
      - name: updated_at
        description: "Timestamp when the conversation was last updated"
  - name: stg_airbyte_source__gp_api_db_chat_message
    description: raw data load from gp_api_db postgres db from table `chat_message`
    columns:
      - name: id
        description: "Primary key - unique identifier for the message"
        data_tests:
          - not_null
          - unique
      - name: conversation_id
        description: "Foreign key to the chat_conversation this message belongs to"
        data_tests:
          - not_null
      - name: role
        description: "Role of the message author: user, assistant, system, or tool"
        data_tests:
          - accepted_values:
              arguments:
                values: ["user", "assistant", "system", "tool"]
      - name: content
        description: "Text content of the message"
      - name: client_message_id
        description: "Optional client-supplied idempotency key for the send attempt"
      - name: created_at
        description: "Timestamp when the message was created"
  - name: stg_airbyte_source__gp_api_db_meeting_briefing
    description: >
      EO Meeting Briefing artifacts generated for an elected office and meeting
      date. One row per briefing.
    columns:
      - name: id
        description: "Primary key - unique identifier for the briefing"
        data_tests:
          - not_null
          - unique
      - name: elected_office_id
        description: "Foreign key to the elected_office this briefing was generated for"
        data_tests:
          - not_null
      - name: experiment_run_id
        description: "Foreign key to the experiment run that produced the briefing"
        data_tests:
          - not_null
      - name: meeting_date
        description: "Date of the meeting the briefing covers"
        data_tests:
          - not_null
      - name: meeting_time
        description: "Time of the meeting the briefing covers"
      - name: meeting_timezone
        description: "Timezone of the meeting time"
      - name: artifact
        description: "JSON artifact payload for the briefing"
      - name: artifact_bucket
        description: "Storage bucket holding the briefing artifact"
      - name: artifact_key
        description: "Storage key/path of the briefing artifact"
      - name: created_at
        description: "Timestamp when the briefing was created"
      - name: updated_at
        description: "Timestamp when the briefing was last updated"
  - name: stg_airbyte_source__gp_api_db_experiment_run
    description: >
      Experiment runs from the gp-api experiment pipeline. Each row is one run
      of an experiment (e.g. meeting briefing/schedule generation, opposition
      research) for an organization, with its status, cost, and artifact
      pointers. One row per run_id.
    columns:
      - name: run_id
        description: "Primary key - unique identifier for the experiment run"
        data_tests:
          - not_null
          - unique
      - name: experiment_type
        description: "Type of experiment (e.g. meeting_briefing, meeting_schedule, opposition_research)"
      - name: stage
        description: "Pipeline stage the run reached"
      - name: status
        description: >
          Status of the run. Accepted values are the union of the current
          ExperimentRunStatus enum (QUEUED, RUNNING, AWAITING_RESUME, COMPLETED,
          FAILED) plus SUPERSEDED, a legacy value dropped from the enum but still
          present on historical rows.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  ["QUEUED", "RUNNING", "AWAITING_RESUME", "COMPLETED", "FAILED", "SUPERSEDED"]
      - name: priority
        description: "Scheduling priority of the run"
      - name: data_quality
        description: "Data quality assessment recorded for the run"
      - name: error
        description: "Error message captured when the run failed"
      - name: params
        description: "JSON parameters the run was invoked with"
      - name: cost_usd
        description: "Cost of the run in USD"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: duration_seconds
        description: "Wall-clock duration of the run in seconds"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: resume_attempts
        description: "Number of times the run has been resumed"
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: artifact_bucket
        description: "Storage bucket holding the run artifact"
      - name: artifact_key
        description: "Storage key/path of the run artifact"
      - name: organization_slug
        description: "Foreign key to the organization the run was generated for"
        data_tests:
          - not_null
      - name: created_at
        description: "Timestamp when the run was created"
      - name: updated_at
        description: "Timestamp when the run was last updated"
      - name: resume_scheduled_for
        description: "Timestamp the run is scheduled to resume at, if any"
  - name: stg_airbyte_source__gp_api_db_community_issue
    description: >
      Community issues surfaced for an organization, ranked and categorized.
      One row per issue.
    columns:
      - name: id
        description: "Primary key - unique identifier for the community issue"
        data_tests:
          - not_null
          - unique
      - name: organization_slug
        description: "Foreign key to the organization the issue belongs to"
        data_tests:
          - not_null
      - name: list
        description: "Name of the list the issue belongs to"
      - name: rank
        description: "Rank of the issue within its list"
      - name: category
        description: "Category the issue is classified under"
      - name: priority
        description: "Priority assigned to the issue"
      - name: title
        description: "Short title of the issue"
      - name: summary
        description: "Summary of the issue"
      - name: detail
        description: "Full detail/description of the issue"
      - name: last_refreshed_run_id
        description: "Foreign key to the experiment run that last refreshed this issue"
      - name: created_at
        description: "Timestamp when the issue was created"
      - name: updated_at
        description: "Timestamp when the issue was last updated"
      - name: archived_at
        description: "Timestamp when the issue was archived, if any"
  - name: stg_airbyte_source__gp_api_db_domain
    description: raw data load from gp_api_db postgres db from table `domain`
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: id
        tests:
          - not_null
          - unique
      - name: name
      - name: price
      - name: status
      - name: created_at
      - name: payment_id
      - name: updated_at
      - name: website_id
      - name: operation_id
      - name: email_forwarding_domain_id
  - name: stg_airbyte_source__gp_api_db_organization
    description: raw data load from gp_api_db postgres db from table `organization`
    columns:
      - name: slug
        description: "Primary key - unique slug identifier for the organization"
        data_tests:
          - not_null
          - unique
      - name: owner_id
        description: "Foreign key reference to the user who owns this organization"
        data_tests:
          - not_null
      - name: position_id
        description: "Election-api position UUID for BallotReady-sourced offices"
      - name: custom_position_name
        description: "Free-text position name for custom offices"
      - name: override_district_id
        description: "L2 district ID override for manually selected or silver-matched districts"
      - name: created_at
        description: "Timestamp when the organization was created"
        data_tests:
          - not_null
      - name: updated_at
        description: "Timestamp when the organization was last updated"
        data_tests:
          - not_null
  - name: stg_airbyte_source__gp_api_db_elected_office
    description: raw data load from gp_api_db postgres db from table `elected_office`
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: id
        description: "Unique identifier for the elected office record"
        tests:
          - not_null
          - unique
      - name: user_id
        description: "Foreign key reference to the user who holds this elected office"
        tests:
          - not_null
      - name: created_at
        description: "Timestamp when the elected office record was created"
        tests:
          - not_null
      - name: updated_at
        description: "Timestamp when the elected office record was last updated"
        tests:
          - not_null
      - name: campaign_id
        description: "Foreign key reference to the campaign associated with this elected office"
      - name: sworn_in_date
        description: "Date when the user was sworn in to office"
      - name: organization_slug
        description: "Slug identifier for the organization associated with this elected office"
        data_tests:
          - unique:
              config:
                where: "organization_slug is not null"
  - name: stg_airbyte_source__gp_api_db_ecanvasser
    description: "Staging model for eCanvasser stream - contains eCanvasser configuration and sync information"
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: _airbyte_extracted_at
        description: "Timestamp when the record was extracted from gp_api_db"
        tests:
          - not_null
      - name: _airbyte_meta
        description: "Airbyte metadata containing sync information"
        tests:
          - not_null
      - name: _airbyte_generation_id
        description: "Airbyte generation ID for tracking data lineage"
        tests:
          - not_null
      - name: id
        description: "Unique identifier for the eCanvasser instance"
        tests:
          - not_null
          - unique
      - name: error
        description: "Error message if any issues occurred with the eCanvasser sync"
      - name: api_key
        description: "API key used for eCanvasser authentication"
        tests:
          - not_null
      - name: last_sync
        description: "Timestamp of the last successful sync with eCanvasser"
      - name: created_at
        description: "Timestamp when the eCanvasser record was created"
        tests:
          - not_null
      - name: updated_at
        description: "Timestamp when the eCanvasser record was last updated"
        tests:
          - not_null
      - name: campaign_id
        description: "Foreign key reference to the campaign this eCanvasser belongs to"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__gp_api_db_campaign')
                field: id
              config:
                warn_if: ">5"
                error_if: ">10"
  - name: stg_airbyte_source__gp_api_db_ecanvasser_contact
    description: "Staging model for eCanvasser Contact stream - contains voter contact information from eCanvasser"
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: _airbyte_extracted_at
        description: "Timestamp when the record was extracted from gp_api_db"
        tests:
          - not_null
      - name: _airbyte_meta
        description: "Airbyte metadata containing sync information"
        tests:
          - not_null
      - name: _airbyte_generation_id
        description: "Airbyte generation ID for tracking data lineage"
        tests:
          - not_null
      - name: id
        description: "Unique identifier for the contact"
        tests:
          - not_null
          - unique
      - name: type
        description: "Type of contact (e.g., voter, volunteer, donor)"
      - name: donor
        description: "Whether this contact is a donor"
      - name: email
        description: "Email address of the contact"
      - name: gender
        description: "Gender of the contact"
      - name: deceased
        description: "Whether the contact is deceased"
      - name: house_id
        description: "Foreign key reference to the house record"
      - name: action_id
        description: "Action ID associated with this contact"
      - name: last_name
        description: "Last name of the contact"
        tests:
          - not_null
      - name: volunteer
        description: "Whether this contact is a volunteer"
      - name: created_at
        description: "Timestamp when the contact record was created"
        tests:
          - not_null
      - name: created_by
        description: "User ID who created this contact record"
      - name: first_name
        description: "First name of the contact"
        tests:
          - not_null
      - name: home_phone
        description: "Home phone number of the contact"
      - name: updated_at
        description: "Timestamp when the contact record was last updated"
        tests:
          - not_null
      - name: mobile_phone
        description: "Mobile phone number of the contact"
      - name: organization
        description: "Organization associated with the contact"
      - name: date_of_birth
        description: "Date of birth of the contact"
      - name: ecanvasser_id
        description: "Foreign key reference to the eCanvasser instance"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__gp_api_db_ecanvasser')
                field: id
      - name: year_of_birth
        description: "Year of birth of the contact"
      - name: ecanvasserHouseId
        description: "eCanvasser house ID (alternative reference)"
      - name: unique_identifier
        description: "Unique identifier for the contact within eCanvasser"
      - name: last_interaction_id
        description: "ID of the last interaction with this contact"
  - name: stg_airbyte_source__gp_api_db_ecanvasser_house
    description: "Staging model for eCanvasser House stream - contains household information from eCanvasser"
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: _airbyte_extracted_at
        description: "Timestamp when the record was extracted from gp_api_db"
        tests:
          - not_null
      - name: _airbyte_meta
        description: "Airbyte metadata containing sync information"
        tests:
          - not_null
      - name: _airbyte_generation_id
        description: "Airbyte generation ID for tracking data lineage"
        tests:
          - not_null
      - name: id
        description: "Unique identifier for the house"
        tests:
          - not_null
          - unique
      - name: address
        description: "Full address of the house"
        tests:
          - not_null
      - name: latitude
        description: "Latitude coordinate of the house location"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -90
                max_value: 90
                inclusive: true
              config:
                where: "latitude is not null"
      - name: longitude
        description: "Longitude coordinate of the house location"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: -180
                max_value: 180
                inclusive: true
              config:
                where: "longitude is not null"
      - name: created_at
        description: "Timestamp when the house record was created"
        tests:
          - not_null
      - name: updated_at
        description: "Timestamp when the house record was last updated"
        tests:
          - not_null
      - name: ecanvasser_id
        description: "Foreign key reference to the eCanvasser instance"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__gp_api_db_ecanvasser')
                field: id
  - name: stg_airbyte_source__gp_api_db_ecanvasser_interaction
    description: "Staging model for eCanvasser Interaction stream - contains interaction records between contacts and canvassers"
    columns:
      - name: _airbyte_raw_id
        description: "Airbyte internal unique identifier for the raw record"
        tests:
          - not_null
          - unique
      - name: _airbyte_extracted_at
        description: "Timestamp when the record was extracted from gp_api_db"
        tests:
          - not_null
      - name: _airbyte_meta
        description: "Airbyte metadata containing sync information"
        tests:
          - not_null
      - name: _airbyte_generation_id
        description: "Airbyte generation ID for tracking data lineage"
        tests:
          - not_null
      - name: id
        description: "Unique identifier for the interaction"
        tests:
          - not_null
          - unique
      - name: date
        description: "Date when the interaction occurred"
        tests:
          - not_null
      - name: type
        description: "Type of interaction (e.g., door knock, phone call, text)"
        tests:
          - not_null
      - name: notes
        description: "Notes from the interaction"
      - name: rating
        description: "Rating or score given to the interaction"
      - name: source
        description: "Source of the interaction (e.g., mobile app, web)"
      - name: status
        description: "Status of the interaction (e.g., completed, pending)"
        tests:
          - not_null
      - name: contact_id
        description: "Foreign key reference to the contact"
        tests:
          - not_null
      - name: created_at
        description: "Timestamp when the interaction record was created"
        tests:
          - not_null
      - name: created_by
        description: "User ID who created this interaction record"
      - name: updated_at
        description: "Timestamp when the interaction record was last updated"
        tests:
          - not_null
      - name: ecanvasser_id
        description: "Foreign key reference to the eCanvasser instance"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__gp_api_db_ecanvasser')
                field: id
  - name: stg_airbyte_source__gp_api_db_election_type
    description: raw data load from gp_api_db postgres db from table `election_type`
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__gp_api_db_outreach
    description: "Staging model for Outreach stream - contains outreach campaign information and configuration"
    columns:
