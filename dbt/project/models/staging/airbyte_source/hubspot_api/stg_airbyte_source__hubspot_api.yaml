models:
  - name: stg_airbyte_source__hubspot_api_companies
    description: Companies data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_uncontested
        description: Whether the race is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
  - name: stg_airbyte_source__hubspot_api_contacts
    description: >
      Contacts data loaded from the HubSpot API. Most columns are native HubSpot
      Contact properties. A few columns are denormalized snapshots of data that
      is authoritative elsewhere in this dbt project — they are kept here for
      convenience/auditing but downstream models should prefer the authoritative
      source:

        - `br_candidacy_id`, `br_position_id`, `br_race_id`: BallotReady IDs.
          Authoritative source is the BallotReady staging/intermediate models.
        - `goodparty_user_id`: mirrors `gp_api_db_user.id`. Authoritative source
          is the users staging model from the gp_api database.
        - `win_icp`, `serve_icp`: HubSpot holds a snapshot of our ICP model
          output. Authoritative ICP comes from the ICP dbt model.
        - `win_activated_user`, `serve_activated_user`: mirror activation state
          from the product users table.
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_uncontested
        description: Whether the race is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: br_candidacy_id
        description: >
          BallotReady candidacy ID stored on the HubSpot contact. Not
          authoritative — prefer BallotReady staging/intermediate models.
      - name: br_position_id
        description: >
          BallotReady position ID stored on the HubSpot contact. Not
          authoritative — prefer BallotReady staging/intermediate models.
      - name: br_race_id
        description: >
          BallotReady race ID stored on the HubSpot contact. Not authoritative —
          prefer BallotReady staging/intermediate models.
      - name: goodparty_user_id
        description: >
          Denormalized copy of `gp_api_db_user.id` stored on the HubSpot
          contact. Authoritative source is the users staging model from the
          gp_api database. Parsed from the HubSpot property
          `goodparty_org_user_id` (named after the goodparty.org domain, not
          an "org user" concept — this is the only user-ID key on the contact).
          `try_cast` to int so free-text values manually entered by HubSpot
          users (e.g. "TS Net New", candidate slugs) become null instead of
          erroring; see `goodparty_user_id_raw` for the original string.
      - name: goodparty_user_id_raw
        description: >
          Raw HubSpot `goodparty_org_user_id` property value as a string,
          before `try_cast` to int. Preserved for data-quality forensics —
          rows where this is non-numeric indicate a HubSpot data-entry error.
      - name: candidate_id_result
        description: HubSpot-tracked outcome of the candidate-ID research process.
      - name: candidate_type
        description: HubSpot classification of the candidate (e.g. Pro, Lead, etc.).
      - name: is_confirmed_candidate
        description: Whether HubSpot has confirmed this contact as a running candidate.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_filed_candidate
        description: Whether the candidate has filed for office per HubSpot.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_pro_candidate
        description: Whether the contact is flagged as a Pro candidate in HubSpot.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: has_ever_been_pro
        description: Whether the contact has ever held Pro status in HubSpot.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: pledge_status
        description: Raw HubSpot pledge status string (see `is_pledged` for boolean).
      - name: has_email_pledge
        description: Whether the contact has submitted an email-based pledge.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: has_verbal_pledge
        description: Whether the contact has given a verbal pledge.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: has_verbal_pro
        description: Whether the contact has given a verbal Pro commitment.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: has_verbal_serve
        description: Whether the contact has given a verbal Serve commitment.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_on_serve_waitlist
        description: >
          Whether the contact is on the Serve waitlist (HubSpot
          `serve_waitlist` property, extracted from the `properties` JSON
          blob). The deprecated top-level `properties_serve_waitlist` column
          in the snapshot is stale and should not be used.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: product_line
        description: HubSpot product line classification for the contact.
      - name: product_stage
        description: HubSpot product stage classification for the contact.
      - name: hubspot_owner_id
        description: HubSpot user ID of the contact owner.
      - name: marketing_contact_status
        description: HubSpot `hs_marketable_status` — whether the contact is marketable.
      - name: is_contact_unworked
        description: HubSpot `hs_is_unworked` — whether the contact has no logged outreach.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: lifecycle_stage
        description: HubSpot lifecycle stage for the contact.
      - name: journey_stage
        description: HubSpot journey stage (`hs_journey_stage`) for the contact.
      - name: lead_status
        description: HubSpot lead status.
      - name: lead_source
        description: HubSpot lead source.
      - name: conversion_type
        description: HubSpot conversion type.
      - name: lifecycle_current_stage_entered_at
        description: Timestamp the contact entered its current lifecycle stage.
      - name: lifecycle_customer_entered_at
        description: Timestamp the contact first entered the Customer lifecycle stage.
      - name: lifecycle_evangelist_entered_at
        description: Timestamp the contact first entered the Evangelist lifecycle stage.
      - name: lifecycle_lead_entered_at
        description: Timestamp the contact first entered the Lead lifecycle stage.
      - name: lifecycle_mql_entered_at
        description: Timestamp the contact first entered the MQL lifecycle stage.
      - name: lifecycle_opportunity_entered_at
        description: Timestamp the contact first entered the Opportunity lifecycle stage.
      - name: lifecycle_other_entered_at
        description: Timestamp the contact first entered the Other lifecycle stage.
      - name: lifecycle_sql_entered_at
        description: Timestamp the contact first entered the SQL lifecycle stage.
      - name: lifecycle_subscriber_entered_at
        description: Timestamp the contact first entered the Subscriber lifecycle stage.
      - name: win_stage
        description: Current Win pipeline stage for the contact.
      - name: win_stage_0_intake_entered_at
        description: Timestamp the contact entered Win Stage 0 (Intake).
      - name: win_stage_1_new_assigned_entered_at
        description: Timestamp the contact entered Win Stage 1 (New/Assigned).
      - name: win_stage_2_discovery_complete_entered_at
        description: Timestamp the contact entered Win Stage 2 (Discovery Complete).
      - name: win_stage_3_pro_presented_entered_at
        description: Timestamp the contact entered Win Stage 3 (Pro Presented).
      - name: win_stage_4_pro_consideration_entered_at
        description: Timestamp the contact entered Win Stage 4 (Pro Consideration).
      - name: win_stage_5_closed_won_pro_entered_at
        description: Timestamp the contact entered Win Stage 5 (Closed Won — Pro).
      - name: win_stage_6_activated_pro_user_entered_at
        description: Timestamp the contact entered Win Stage 6 (Activated Pro User).
      - name: win_stage_closed_too_early_entered_at
        description: Timestamp the contact entered Win Stage Closed (Too Early).
      - name: win_icp
        description: >
          HubSpot snapshot of the Win ICP classification. Not authoritative —
          authoritative ICP comes from the ICP dbt model.
      - name: serve_icp
        description: >
          HubSpot snapshot of the Serve ICP classification. Not authoritative —
          authoritative ICP comes from the ICP dbt model.
      - name: win_activated_user
        description: >
          HubSpot snapshot of Win activation status. Not authoritative —
          sourced from the product users table.
      - name: serve_activated_user
        description: >
          HubSpot snapshot of Serve activation status. Not authoritative —
          sourced from the product users table.
      - name: serve_stage
        description: Current Serve pipeline stage.
      - name: serve_onboarding_stage
        description: Serve onboarding stage label.
      - name: is_serve_opted_in
        description: Whether the contact has opted into the Serve program.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: has_serve_results_viewed
        description: Whether the contact has viewed their Serve results.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: serve_opt_in_at
        description: Timestamp the contact opted into Serve.
      - name: serve_activated_at
        description: Timestamp the contact became a Serve activated user.
      - name: serve_results_received_at
        description: Timestamp Serve results were received for the contact.
      - name: serve_results_viewed_at
        description: Timestamp the contact viewed their Serve results.
      - name: serve_lifecycle_lead_entered_at
        description: Timestamp the contact became a Serve lifecycle Lead.
      - name: serve_lifecycle_converted_entered_at
        description: Timestamp the contact became a Serve lifecycle Converted.
      - name: serve_lifecycle_activated_entered_at
        description: Timestamp the contact became a Serve lifecycle Activated.
      - name: serve_lifecycle_noshow_sql_entered_at
        description: Timestamp the contact became a Serve lifecycle No-Show SQL.
      - name: serve_lifecycle_opportunity_entered_at
        description: Timestamp the contact became a Serve lifecycle Opportunity.
      - name: serve_lifecycle_sal_entered_at
        description: Timestamp the contact became a Serve lifecycle SAL.
      - name: serve_lifecycle_sql_entered_at
        description: Timestamp the contact became a Serve lifecycle SQL.
      - name: serve_lifecycle_churned_entered_at
        description: Timestamp the contact became Serve lifecycle Churned.
      - name: serve_lifecycle_not_qualified_entered_at
        description: Timestamp the contact became Serve lifecycle Not Qualified.
      - name: serve_lifecycle_scheduled_sql_entered_at
        description: Timestamp the contact became a Serve lifecycle Scheduled SQL.
      - name: serve_lifecycle_retained_entered_at
        description: Timestamp the contact became Serve lifecycle Retained.
      - name: email_open_count
        description: >
          HubSpot `hs_email_open` — lifetime count of marketing/sales emails
          opened by this contact.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: email_click_count
        description: >
          HubSpot `hs_email_click` — lifetime count of links clicked in
          marketing/sales emails sent to this contact.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: email_last_open_at
        description: HubSpot `hs_email_last_open_date` — timestamp of the most recent email open.
      - name: email_last_click_at
        description: HubSpot `hs_email_last_click_date` — timestamp of the most recent email click.
      - name: last_call_at
        description: Date of the last recorded sales call.
      - name: last_call_outcome
        description: Outcome label from the last recorded sales call.
      - name: last_contacted_at
        description: HubSpot `notes_last_contacted` — timestamp of last contact activity.
      - name: number_of_serve_calls
        description: Count of Serve calls logged for this contact.
      - name: pro_upgrade_at
        description: HubSpot `pro_upgrade_date` — timestamp of the Pro upgrade.
      - name: contact_created_at
        description: HubSpot `createdate` — when the contact was created in HubSpot.
      - name: n2026_alt_activation__cas_meeting
        description: >
          HubSpot contact property `n2026_alt_activation__cas_meeting` (2026 alt
          activation - CAS meeting). HubSpot property group: 2026_alt_activation.
      - name: n2026_alt_activation__circle_engagement
        description: >
          HubSpot contact property `n2026_alt_activation__circle_engagement` (2026
          alt activation - Circle engagement). HubSpot property group:
          2026_alt_activation.
      - name: n2026_alt_activation__content_engagement
        description: >
          HubSpot contact property `n2026_alt_activation__content_engagement` (2026
          alt activation - content engagement). HubSpot property group:
          2026_alt_activation.
      - name: n2026_alt_activation__course_completion
        description: >
          HubSpot contact property `n2026_alt_activation__course_completion` (2026
          alt activation - course completion). HubSpot property group:
          2026_alt_activation.
      - name: n2026_alt_activation__free_features
        description: >
          HubSpot contact property `n2026_alt_activation__free_features` (2026 alt
          activation - free features). HubSpot property group: 2026_alt_activation.
      - name: n2026_alt_activation__pro_features
        description: >
          HubSpot contact property `n2026_alt_activation__pro_features` (2026 alt
          activation - Pro Features). HubSpot property group: 2026_alt_activation.
      - name: n2026_alt_activation__webinar_attendance
        description: >
          HubSpot contact property `n2026_alt_activation__webinar_attendance` (2026
          alt activation - webinar attendance). HubSpot property group:
          2026_alt_activation.
      - name: n2026_alternative_activation
        description: >
          HubSpot contact property `n2026_alternative_activation` (2026 alternative
          activation). HubSpot property group: 2026_alt_activation.
      - name: serve_eo_waitlist
        description: >
          HubSpot contact property `serve_eo_waitlist` (Serve EO Waitlist). HubSpot
          property group: 2026_eo_outreach.
      - name: serve_eo_waitlist_date
        description: >
          HubSpot contact property `serve_eo_waitlist_date` (Serve EO Waitlist
          Date). HubSpot property group: 2026_eo_outreach.
      - name: activepassive_candidate
        description: >
          HubSpot contact property `activepassive_candidate` (Active/Passive
          Candidate). HubSpot property group: 2026_sales_properties.
      - name: candidate_pain_point
        description: >
          HubSpot contact property `candidate_pain_point` (Candidate Pain Point).
          HubSpot property group: 2026_sales_properties.
      - name: follow_up_preference
        description: >
          HubSpot contact property `follow_up_preference` (Follow Up Preference).
          HubSpot property group: 2026_sales_properties.
      - name: menu_item_offered
        description: >
          HubSpot contact property `menu_item_offered` (Solution Offered). HubSpot
          property group: 2026_sales_properties.
      - name: no_offer_made_reason
        description: >
          HubSpot contact property `no_offer_made_reason` (No Offer Made Reason).
          HubSpot property group: 2026_sales_properties.
      - name: offer_accepted
        description: >
          HubSpot contact property `offer_accepted` (Offer Accepted). HubSpot
          property group: 2026_sales_properties.
      - name: hs_analytics_average_page_views
        description: >
          HubSpot contact property `hs_analytics_average_page_views` (Average
          Pageviews). Average number of pageviews per session for this contact. Set
          automatically.
      - name: hs_analytics_first_referrer
        description: >
          HubSpot contact property `hs_analytics_first_referrer` (First Referring
          Site). URL that referred the contact to your website. Set automatically.
      - name: hs_analytics_first_timestamp
        description: >
          HubSpot contact property `hs_analytics_first_timestamp` (Time First Seen).
          First time the contact has been seen. Set automatically.
      - name: hs_analytics_first_touch_converting_campaign
        description: >
          HubSpot contact property `hs_analytics_first_touch_converting_campaign`
          (First Touch Converting Campaign). Campaign responsible for the first
          touch creation of this contact.
      - name: hs_analytics_first_url
        description: >
          HubSpot contact property `hs_analytics_first_url` (First Page Seen). First
          page the contact visited on your website. Set automatically.
      - name: hs_analytics_first_visit_timestamp
        description: >
          HubSpot contact property `hs_analytics_first_visit_timestamp` (Time of
          First Session). First time the contact visited your website. Set
          automatically.
      - name: hs_analytics_last_referrer
        description: >
          HubSpot contact property `hs_analytics_last_referrer` (Last Referring
          Site). Last URL that referred contact to your website. Set automatically.
      - name: hs_analytics_last_timestamp
        description: >
          HubSpot contact property `hs_analytics_last_timestamp` (Time Last Seen).
          Timestamp for most recent webpage view on your website.
      - name: hs_analytics_last_touch_converting_campaign
        description: >
          HubSpot contact property `hs_analytics_last_touch_converting_campaign`
          (Last Touch Converting Campaign). Campaign responsible for the last touch
          creation of this contact.
      - name: hs_analytics_last_url
        description: >
          HubSpot contact property `hs_analytics_last_url` (Last Page Seen). Last
          page the contact visited on your website. Set automatically.
      - name: hs_analytics_last_visit_timestamp
        description: >
          HubSpot contact property `hs_analytics_last_visit_timestamp` (Time of Last
          Session). Timestamp for start of the most recent session for this contact
          to your website.
      - name: hs_analytics_num_event_completions
        description: >
          HubSpot contact property `hs_analytics_num_event_completions` (Number of
          event completions). Total number of events for this contact. Set
          automatically.
      - name: hs_analytics_num_page_views
        description: >
          HubSpot contact property `hs_analytics_num_page_views` (Number of
          Pageviews). Total number of page views this contact has had on your
          website. Set automatically.
      - name: hs_analytics_num_visits
        description: >
          HubSpot contact property `hs_analytics_num_visits` (Number of Sessions).
          Number of times a contact has come to your website. Set automatically.
      - name: hs_analytics_source
        description: >
          HubSpot contact property `hs_analytics_source` (Original Traffic Source).
          First known source the contact used to find your website. Set
          automatically, but may be updated manually.
      - name: hs_analytics_source_data_1
        description: >
          HubSpot contact property `hs_analytics_source_data_1` (Original Traffic
          Source Drill-Down 1). Additional information about the source the contact
          used to find your website. Set automatically.
      - name: hs_analytics_source_data_2
        description: >
          HubSpot contact property `hs_analytics_source_data_2` (Original Traffic
          Source Drill-Down 2). Additional information about the source the contact
          used to find your website. Set automatically.
      - name: hs_latest_source
        description: >
          HubSpot contact property `hs_latest_source` (Latest Traffic Source). The
          source of the latest session for a contact
      - name: hs_latest_source_data_1
        description: >
          HubSpot contact property `hs_latest_source_data_1` (Latest Traffic Source
          Drill-Down 1). Additional information about the latest source for the last
          session the contact used to find your website. Set automatically.
      - name: hs_latest_source_data_2
        description: >
          HubSpot contact property `hs_latest_source_data_2` (Latest Traffic Source
          Drill-Down 2). Additional information about the source for the last
          session the contact used to find your website. Set automatically.
      - name: hs_latest_source_timestamp
        description: >
          HubSpot contact property `hs_latest_source_timestamp` (Latest Traffic
          Source Date). The time of the latest session for a contact
      - name: calls_made
        description: >
          HubSpot contact property `calls_made` (Calls Made). HubSpot property
          group: contact_activity.
      - name: notes_last_updated
        description: >
          HubSpot contact property `notes_last_updated` (Last Activity Date). The
          last time a call, chat conversation, LinkedIn message, postal mail,
          meeting, note, sales email, SMS, or WhatsApp message was logged for a
          contact. This is set automatically by HubSpot based on user actions in the
          contact record.
      - name: notes_next_activity_date
        description: >
          HubSpot contact property `notes_next_activity_date` (Next Activity Date).
          The date of the next upcoming activity for a contact. This is set
          automatically by HubSpot based on user actions in the contact record.
      - name: num_contacted_notes
        description: >
          HubSpot contact property `num_contacted_notes` (Number of times
          contacted). The number of times a call, chat conversation, LinkedIn
          message, postal mail, meeting, sales email, SMS, or WhatsApp message was
          logged for a contact record. This is set automatically by HubSpot based on
          user actions in the contact record.
      - name: num_notes
        description: >
          HubSpot contact property `num_notes` (Number of Sales Activities). The
          number of times a call, chat conversation, LinkedIn message, postal mail,
          meeting, note, sales email, SMS, task, or WhatsApp message was logged for
          a contact record. This is set automatically by HubSpot based on user
          actions in the contact record.
      - name: open_lead
        description: >
          HubSpot contact property `open_lead` (Open Lead). HubSpot property group:
          contact_activity.
      - name: ana_health
        description: >
          HubSpot contact property `ana_health` (ANA Health). HubSpot property
          group: contactinformation.
      - name: br_person_id
        description: >
          HubSpot contact property `br_person_id` (BR Person ID). HubSpot property
          group: contactinformation.
      - name: candidate_date_verified
        description: >
          HubSpot contact property `candidate_date_verified` (Candidate Date
          Verified). When a candidate became confirmed - stamped over from company-
          level property 'date_verified'
      - name: candidate_experience_level
        description: >
          HubSpot contact property `candidate_experience_level` (Candidate
          Experience Level). HubSpot property group: contactinformation.
      - name: candidate_interest
        description: >
          HubSpot contact property `candidate_interest` (Candidate Interest).
          HubSpot property group: contactinformation.
      - name: candidate_profile_url
        description: >
          HubSpot contact property `candidate_profile_url` (Candidate Profile URL).
          HubSpot property group: contactinformation.
      - name: candidate_seat
        description: >
          HubSpot contact property `candidate_seat` (Candidate Seat). HubSpot
          property group: contactinformation.
      - name: candidate_state
        description: >
          HubSpot contact property `candidate_state` (Candidate State). State in
          which the candidate is running
      - name: channel_group__first_conversion_source
        description: >
          HubSpot contact property `channel_group__first_conversion_source` (Channel
          Group - First Conversion Source). HubSpot property group:
          contactinformation.
      - name: circle_attributed_pledge
        description: >
          HubSpot contact property `circle_attributed_pledge` (Circle attributed
          pledge). Indicates whether this contact's pledge is attributed to Circle.
          Options are Yes or No.
      - name: circle_comments
        description: >
          HubSpot contact property `circle_comments` (Circle Comments). HubSpot
          property group: contactinformation.
      - name: circle_invite_link
        description: >
          HubSpot contact property `circle_invite_link` (circle invite link).
          HubSpot property group: contactinformation.
      - name: circle_join_date
        description: >
          HubSpot contact property `circle_join_date` (Circle Join Date). The date a
          candidate joined Circle
      - name: circle_leaderboard_level
        description: >
          HubSpot contact property `circle_leaderboard_level` (Circle Leaderboard
          Level). Shows the level attained on the Circle leaderboard
      - name: circle_level_2_code
        description: >
          HubSpot contact property `circle_level_2_code` (Circle Level 2 Code). The
          unique Stripe code for this user's Circle Level 2 rewards
      - name: circle_level_5_code
        description: >
          HubSpot contact property `circle_level_5_code` (Circle Level 5 Code). The
          unique Stripe code for this user's Circle Level 5 rewards
      - name: circle_level_8_code
        description: >
          HubSpot contact property `circle_level_8_code` (Circle Level 8 Code). The
          unique Stripe code for this user's Circle Level 8 rewards
      - name: circle_live_events_attended
        description: >
          HubSpot contact property `circle_live_events_attended` (Circle Live Events
          Attended). HubSpot property group: contactinformation.
      - name: circle_member
        description: >
          HubSpot contact property `circle_member` (Circle Member). HubSpot property
          group: contactinformation.
      - name: circle_roles
        description: >
          HubSpot contact property `circle_roles` (Circle Roles). Contact is on
          Circle/came from Circle & indicates their roles on Circle
      - name: circle_tags
        description: >
          HubSpot contact property `circle_tags` (Circle Tags). HubSpot property
          group: contactinformation.
      - name: circle_user_name
        description: >
          HubSpot contact property `circle_user_name` (Circle User Name). HubSpot
          property group: contactinformation.
      - name: clean_phone
        description: >
          HubSpot contact property `clean_phone` (Clean Phone). This is a clean
          phone number field that should not contain anything other than digits. No
          parentheses, dashes, spaces, etc.
      - name: closed_post_enrichment
        description: >
          HubSpot contact property `closed_post_enrichment` (Closed Post
