models:
  - name: stg_airbyte_source__hubspot_api_companies
    description: Companies data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_uncontested
        description: Whether the race is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
