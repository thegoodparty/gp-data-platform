models:
  - name: stg_airbyte_source__hubspot_api_companies
    description: Companies data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_uncontested
        description: Whether the race is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
  - name: stg_airbyte_source__hubspot_api_contacts
    description: Contacts data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_uncontested
        description: Whether the race is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
  - name: stg_airbyte_source__hubspot_api_deals
    description: Deals data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__hubspot_api_engagements
    description: Engagements data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__hubspot_api_owners
    description: Owners data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__hubspot_api_owners_archived
    description: Archived owners data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__hubspot_api_tickets
    description: Tickets data load from HubSpot API
    columns:
      - name: id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__feedback_submissions
    description: >
      Staged HubSpot Feedback Survey submissions. Contains responses from all
      feedback surveys including PMF, user satisfaction, and research
      compensation surveys. One row per submission.
    columns:
      - name: submission_id
        description: Unique identifier for the feedback submission
        data_tests:
          - not_null
          - unique
      - name: hs_survey_id
        description: HubSpot survey identifier
        data_tests:
          - not_null
      - name: submitted_at
        description: Timestamp when the survey response was submitted
        data_tests:
          - not_null
      - name: survey_type
        description: Type of survey (CUSTOM, KNOWLEDGE, etc.)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["CUSTOM", "KNOWLEDGE"]
      - name: survey_channel
        description: Channel through which the survey was delivered
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["WEB"]
