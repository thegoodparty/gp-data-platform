models:
  - name: stg_airbyte_source__techspeed_gdrive_candidates
    description: Candidates data load from TechSpeed Google Drive
    columns:
      - name: _airbyte_raw_id
        data_tests:
          - not_null
          - unique
  - name: stg_airbyte_source__techspeed_gdrive_officeholders
    description: Officeholders data load from TechSpeed Google Drive
    # TODO: Add person-level office_holder_id tests if/when candidates moves to id-based key tests.
    columns:
      - name: _airbyte_raw_id
        data_tests:
          - not_null
          - unique
      - name: is_incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: ["", "FALSE", "False", "TRUE", "True"]
              config:
                where: "is_incumbent is not null"
      - name: is_uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: ["", "No", "Yes"]
              config:
                where: "is_uncontested is not null"
  - name: stg_airbyte_source__techspeed_gdrive_marketing_data_enrichment
    description: Marketing data enrichment load from TechSpeed Google Drive
    columns:
      - name: _airbyte_raw_id
        data_tests:
          - not_null
          - unique
