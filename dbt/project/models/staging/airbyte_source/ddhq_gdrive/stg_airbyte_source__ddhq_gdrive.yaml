models:

  - name: stg_airbyte_source__ddhq_gdrive_election_results
    description: Election results data load from ddhq google drive
    columns:
      - name: state_postal_code
        description: 2-letter state code resolved from race_name prefix via clean_states
        data_tests:
          - not_null
      - name: ddhq_race_id
        data_tests:
          - not_null
      - name: is_winner
        description: Whether the candidate won the election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: election_stage
        description: Normalized stage derived from election_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - "primary runoff"
                  - "general runoff"
                  - "primary special"
                  - "general special"
                  - "primary special runoff"
                  - "general special runoff"
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - ddhq_race_id
              - candidate_id
              - candidate

  - name: stg_airbyte_source__ddhq_elections_gsheet_reported_races
    description: >
      Race-level rows from the DDHQ Elections gsheet for races whose results
      have been reported. One row per ddhq_race_id.
    columns:
      - name: ddhq_race_id
        description: DDHQ race ID
        data_tests:
          - not_null
          - unique
      - name: state_postal_code
        description: 2-letter US state postal code
        data_tests:
          - not_null
      - name: race_name
        data_tests:
          - not_null
      - name: election_date
        data_tests:
          - not_null
      - name: election_stage
        description: Normalized stage derived from election_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - "primary runoff"
                  - "general runoff"
                  - "primary special"
                  - "general special"
                  - "primary special runoff"
                  - "general special runoff"

  - name: stg_airbyte_source__ddhq_elections_gsheet_upcoming_races
    description: >
      Race-level rows from the DDHQ Elections gsheet for races whose results
      have not yet been reported. One row per ddhq_race_id.
    columns:
      - name: ddhq_race_id
        description: DDHQ race ID
        data_tests:
          - not_null
          - unique
      - name: state_postal_code
        description: 2-letter US state postal code
        data_tests:
          - not_null
      - name: race_name
        data_tests:
          - not_null
      - name: election_date
        data_tests:
          - not_null
      - name: election_stage
        description: Normalized stage derived from election_type
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - "primary runoff"
                  - "general runoff"
                  - "primary special"
                  - "general special"
                  - "primary special runoff"
                  - "general special runoff"

  - name: stg_airbyte_source__ddhq_gdrive_election_results_invalid
    description: >
      DDHQ election results rows that fail data quality checks.
      Captures rows with null candidate_id (non-numeric source values)
      or race_name that does not start with a recognized state name
      (e.g. city-prefixed names like "Grand Prairie City Council").
      Used for data quality monitoring and investigation.
    columns:
      - name: _airbyte_raw_id
        data_tests:
          - unique
          - not_null
      - name: invalid_reason
        description: Why this row was excluded (null_candidate_id or unresolvable_state)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - null_candidate_id
                  - unresolvable_state
