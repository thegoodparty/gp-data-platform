      - name: br_candidate_id_r
        description: Right record's BallotReady candidate ID.
      - name: ts_officeholder_id_l
        description: Left record's TechSpeed officeholder ID.
      - name: ts_officeholder_id_r
        description: Right record's TechSpeed officeholder ID.
      - name: ts_position_id_l
        description: Left record's TechSpeed position ID.
      - name: ts_position_id_r
        description: Right record's TechSpeed position ID.
      - name: gp_api_user_id_l
        description: Left record's gp-api product user ID. Only populated on the gp_api side.
      - name: gp_api_user_id_r
        description: Right record's gp-api product user ID. Only populated on the gp_api side.
      - name: gp_api_campaign_id_l
