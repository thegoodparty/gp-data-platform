version: 2

models:
  - name: stg_er_source__clustered_candidacy_stages
    description: >
      Staged cluster assignments from the Splink entity resolution pipeline.
      Each row is a candidacy-stage record from BallotReady, TechSpeed, or DDHQ,
      annotated with a cluster_id grouping records that represent the same
      real-world candidacy-stage. Cross-source clusters form crosswalks between
      sources (e.g. BR↔TS, BR↔DDHQ). Single-record clusters are unmatched
      records unique to one source.

      The clustering uses a 0.95 match probability threshold on Splink's
      connected-components algorithm, after post-prediction filters enforce
      person identity agreement (last name + first name/email/phone), race-level
      agreement (office name Jaro-Winkler >= 0.75), and race ID consistency.
    columns:
      - name: cluster_id
        description: >
          Splink cluster identifier grouping records believed to represent the
          same candidacy-stage. Cross-source clusters link records across BR,
          TS, and DDHQ.
        data_tests:
          - not_null
      - name: unique_id
        description: >
          Composite key in the format `source_name|source_id` that uniquely
          identifies each candidacy-stage record across all sources.
        data_tests:
          - not_null
          - unique
      - name: source_id
        description: >
          Source-specific identifier — br_candidacy_id for BallotReady records,
          a composite key (name + location + office) for TechSpeed records, or
          ddhq_candidacy_id for DDHQ records.
        data_tests:
          - not_null
      - name: source_name
        description: Origin data source for this record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq"]
      - name: first_name
        description: Candidate first name (lowercased, trimmed in prematch).
      - name: last_name
        description: Candidate last name (lowercased, trimmed in prematch).
      - name: first_name_aliases
        description: >
          String representation of nickname aliases array, built from the
          nicknames seed table during prematch. Used by Splink's
          ArrayIntersectLevel comparison for fuzzy first name matching.
      - name: state
        description: Two-letter US state postal code.
      - name: party
        description: Parsed party affiliation (e.g. Democratic, Republican, Nonpartisan).
      - name: candidate_office
        description: Human-readable office name from the source.
      - name: office_level
        description: Office level classification (e.g. Federal, State, County, Local).
      - name: office_type
        description: Office type classification (e.g. Executive, Legislative, Judicial, School Board, Other).
      - name: district_raw
        description: Raw district value from the source before normalization.
      - name: district_identifier
        description: Normalized district number, cast to integer to remove leading zeros.
      - name: election_date
        description: Date of the election stage.
      - name: election_stage
        description: Election stage (Primary, General, or Runoff).
        data_tests:
          - accepted_values:
              values: ["Primary", "General", "Runoff"]
      - name: email
        description: Candidate email address (sparse — used as a high-signal comparison in matching).
      - name: phone
        description: Candidate phone number (sparse — used as a high-signal comparison in matching).
      - name: br_race_id
        description: BallotReady race ID, cast to integer. Present for both sources when TechSpeed inherits BR race data.
      - name: official_office_name
        description: Lowercased, trimmed office name used in Splink's Jaro-Winkler comparison.
      - name: br_candidacy_id
        description: BallotReady candidacy ID, cast to integer. Only populated for BallotReady records.
      - name: seat_name
        description: Seat or position name from the source.
      - name: partisan_type
        description: Partisan classification of the race from the source.

  - name: stg_er_source__pairwise_candidacy_stages
    description: >
      Staged pairwise predictions from the Splink entity resolution pipeline.
      Each row is a scored pair of candidacy-stage records with Splink match
      weights, match probabilities, per-comparison gamma levels (agreement
      categories), Bayes factors, and term-frequency adjustments. Records may
      come from BallotReady, TechSpeed, or DDHQ.

      Pairs are generated by 6 blocking rules (br_race_id exact, state +
      election_date + office fuzzy + last_name, state + last_name +
      election_date, state + election_date + office fuzzy + last_name fuzzy,
      phone exact, email exact) and filtered to match_probability >= 0.01.

      Three post-prediction filters are applied: (1) person identity — requires
      partial last_name match AND first_name/email/phone match, (2) race-level
      — requires office name Jaro-Winkler >= 0.75, (3) race ID — excludes
      pairs with differing integer br_race_ids unless office names match well.
    columns:
      - name: match_weight
        description: >
          Log2 likelihood ratio (Splink match weight). Higher values indicate
          stronger evidence the pair is a true match.
        data_tests:
          - not_null
      - name: match_probability
        description: >
          Probability that the pair is a true match (0 to 1), derived from the
          match weight via the logistic function. All rows have probability >= 0.01.
        data_tests:
          - not_null
      - name: unique_id_l
        description: Composite key (source_name|source_id) for the left record.
        data_tests:
          - not_null
      - name: unique_id_r
        description: Composite key (source_name|source_id) for the right record.
        data_tests:
          - not_null
      - name: source_name_l
        description: Origin source for the left record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq"]
      - name: source_name_r
        description: Origin source for the right record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq"]
      - name: gamma_last_name
        description: >
          Comparison level for last_name: 3=exact, 2=JW>=0.95, 1=JW>=0.88, 0=else.
          Term-frequency adjusted.
      - name: gamma_first_name
        description: >
          Comparison level for first_name: 3=exact, 2=nickname alias intersection,
          1=JW>=0.92, 0=else. Term-frequency adjusted.
      - name: gamma_party
        description: "Comparison level for party: 1=exact match, 0=else."
      - name: gamma_email
        description: "Comparison level for email: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_phone
        description: "Comparison level for phone: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_state
        description: "Comparison level for state: 1=exact match, 0=else."
      - name: gamma_election_date
        description: "Comparison level for election_date: 1=exact match, 0=else."
      - name: gamma_official_office_name
        description: >
          Comparison level for office name: 4=exact, 3=JW>=0.95, 2=JW>=0.88,
          1=JW>=0.75, 0=else.
      - name: gamma_district_identifier
        description: "Comparison level for district: 1=exact match, -1=one or both null, 0=else."
      - name: match_key
        description: >
          Index of the blocking rule that generated this pair (0-5), corresponding
          to: 0=br_race_id exact, 1=state+date+office_fuzzy+last_name, 2=state+last_name+date,
          3=state+date+office_fuzzy+last_name_fuzzy, 4=phone exact, 5=email exact.

  - name: stg_er_source__clustered_elected_officials
    description: >
      Staged cluster assignments from the elected officials entity resolution
      pipeline. Each row is an elected official record from BallotReady or
      TechSpeed, annotated with a cluster_id grouping records that represent
      the same person. Unlike candidacy stages, the cluster grain is person
      — multi-term records for the same official cluster together.

      The clustering uses a 0.95 match probability threshold on Splink's
      connected-components algorithm, after post-prediction filters enforce
      person identity agreement (last name + first name/email/phone) and
      office compatibility (office_type match or contact-info bypass).
    config:
      enabled: false  # TODO: enable once er_source tables are uploaded (blocked on volume permissions)
    columns:
      - name: cluster_id
        description: >
          Splink cluster identifier grouping records believed to represent the
          same elected official. Cross-source clusters link records across BR
          and TS.
        data_tests:
          - not_null
      - name: unique_id
        description: >
          Composite key in the format `source_name|source_id` that uniquely
          identifies each elected official record across all sources.
        data_tests:
          - not_null
          - unique
      - name: source_id
        description: >
          Source-specific identifier — br_office_holder_id for BallotReady
          records, a composite key for TechSpeed records.
        data_tests:
          - not_null
      - name: source_name
        description: Origin data source for this record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed"]
      - name: first_name
        description: Official's first name (lowercased, trimmed in prematch).
      - name: last_name
        description: Official's last name (lowercased, trimmed in prematch).
      - name: first_name_aliases
        description: >
          String representation of nickname aliases array, built from the
          nicknames seed table during prematch.
      - name: state
        description: Two-letter US state postal code.
      - name: party
        description: Parsed party affiliation.
      - name: candidate_office
        description: Human-readable office name from the source.
      - name: office_level
        description: Office level classification (e.g. Federal, State, County, Local).
      - name: office_type
        description: Office type classification (e.g. Executive, Legislative, Judicial, School Board, Other).
      - name: district_raw
        description: Raw district value from the source before normalization.
      - name: district_identifier
        description: Normalized district number, cast to integer.
      - name: email
        description: Official's email address (sparse — high-signal comparison).
      - name: phone
        description: Official's phone number (sparse — high-signal comparison).
      - name: official_office_name
        description: Lowercased, trimmed office name used in Splink's Jaro-Winkler comparison.
      - name: city
        description: City associated with the office.
      - name: term_start_date
        description: Start date of the official's term.
      - name: term_end_date
        description: End date of the official's term.
      - name: br_office_holder_id
        description: BallotReady office holder ID, cast to integer. Only populated for BR records.
      - name: br_candidate_id
        description: BallotReady candidate ID, cast to integer. Only populated for BR records.
      - name: ts_officeholder_id
        description: TechSpeed officeholder ID. Only populated for TS records.
      - name: ts_position_id
        description: TechSpeed position ID. Only populated for TS records.

  - name: stg_er_source__pairwise_elected_officials
    config:
      enabled: false  # TODO: enable once er_source tables are uploaded (blocked on volume permissions)
    description: >
      Staged pairwise predictions from the elected officials entity resolution
      pipeline. Each row is a scored pair of elected official records with Splink
      match weights, match probabilities, per-comparison gamma levels, Bayes
      factors, and term-frequency adjustments.

      Pairs are generated by 5 blocking rules (state+office_fuzzy+last_name,
      state+office_fuzzy+last_name_fuzzy, state+last_name, phone exact, email
      exact) and filtered to match_probability >= 0.01.

      Post-prediction filters enforce person identity (last_name + first_name or
      contact info) and office compatibility (office_type match with contact-info
      bypass). No race ID filter (elected officials have no br_race_id).

      Compared to candidacy stages, this entity type adds office_type and
      office_level as Splink comparisons and drops election_date.
    columns:
      - name: match_weight
        description: >
          Log2 likelihood ratio (Splink match weight). Higher values indicate
          stronger evidence the pair is a true match.
        data_tests:
          - not_null
      - name: match_probability
        description: >
          Probability that the pair is a true match (0 to 1). All rows have
          probability >= 0.01.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0.01
              max_value: 1.0
      - name: unique_id_l
        description: Composite key (source_name|source_id) for the left record.
        data_tests:
          - not_null
      - name: unique_id_r
        description: Composite key (source_name|source_id) for the right record.
        data_tests:
          - not_null
      - name: source_name_l
        description: Origin source for the left record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed"]
      - name: source_name_r
        description: Origin source for the right record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed"]
      - name: gamma_last_name
        description: >
          Comparison level for last_name: 3=exact, 2=JW>=0.95, 1=JW>=0.88, 0=else.
          Term-frequency adjusted.
      - name: gamma_first_name
        description: >
          Comparison level for first_name: 3=exact, 2=nickname alias intersection,
          1=JW>=0.92, 0=else. Term-frequency adjusted.
      - name: gamma_party
        description: "Comparison level for party: 1=exact match, 0=else."
      - name: gamma_email
        description: "Comparison level for email: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_phone
        description: "Comparison level for phone: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_state
        description: "Comparison level for state: 1=exact match, 0=else."
      - name: gamma_official_office_name
        description: >
          Comparison level for office name: 4=exact, 3=JW>=0.95, 2=JW>=0.88,
          1=JW>=0.75, 0=else.
      - name: gamma_district_identifier
        description: "Comparison level for district: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_office_type
        description: "Comparison level for office_type: 1=exact match, -1=one or both null, 0=else."
      - name: gamma_office_level
        description: "Comparison level for office_level: 1=exact match, -1=one or both null, 0=else."
      - name: match_key
        description: >
          Index of the blocking rule that generated this pair (0-4), corresponding
          to: 0=state+office_fuzzy+last_name, 1=state+office_fuzzy+last_name_fuzzy,
          2=state+last_name, 3=phone exact, 4=email exact.
        data_tests:
          - dbt_utils.accepted_range:
              min_value: 0
              max_value: 4
