version: 2

models:
  - name: stg_er_source__clustered_candidacy_stages
    description: >
      Staged cluster assignments from the Splink entity resolution pipeline.
      Each row is a candidacy-stage record from BallotReady, TechSpeed, or DDHQ,
      annotated with a cluster_id grouping records that represent the same
      real-world candidacy-stage. Cross-source clusters form crosswalks between
      sources (e.g. BR↔TS, BR↔DDHQ). Single-record clusters are unmatched
      records unique to one source.

      The clustering uses a 0.95 match probability threshold on Splink's
      connected-components algorithm, after post-prediction filters enforce
      person identity agreement (last name + first name/email/phone), race-level
      agreement (office name Jaro-Winkler >= 0.75), and race ID consistency.
    columns:
      - name: cluster_id
        description: >
          Splink cluster identifier grouping records believed to represent the
          same candidacy-stage. Cross-source clusters link records across BR,
          TS, and DDHQ.
        data_tests:
          - not_null
      - name: unique_id
        description: >
          Composite key in the format `source_name|source_id` that uniquely
          identifies each candidacy-stage record across all sources.
        data_tests:
          - not_null
          - unique
      - name: source_id
        description: >
          Source-specific identifier — br_candidacy_id for BallotReady records,
          a composite key (name + location + office) for TechSpeed records, or
          ddhq_candidacy_id for DDHQ records.
        data_tests:
          - not_null
      - name: source_name
        description: Origin data source for this record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq", "gp_api"]
      - name: first_name
        description: Candidate first name (lowercased, trimmed in prematch).
      - name: last_name
        description: Candidate last name (lowercased, trimmed in prematch).
      - name: first_name_aliases
        description: >
          String representation of nickname aliases array, built from the
          nicknames seed table during prematch. Used by Splink's
          ArrayIntersectLevel comparison for fuzzy first name matching.
      - name: state
        description: Two-letter US state postal code.
      - name: party
        description: Parsed party affiliation (e.g. Democratic, Republican, Nonpartisan).
      - name: candidate_office
        description: Human-readable office name from the source.
      - name: office_level
        description: Office level classification (e.g. Federal, State, County, Local).
      - name: office_type
        description: Office type classification (e.g. Executive, Legislative, Judicial, School Board, Other).
      - name: district_raw
        description: Raw district value from the source before normalization.
      - name: district_identifier
        description: Normalized district number, cast to integer to remove leading zeros.
      - name: election_date
        description: Date of the election stage.
      - name: election_stage
        description: Election stage (Primary, General, Runoff, or Special variants).
        data_tests:
          - accepted_values:
              values:
                - "Primary"
                - "General"
                - "Primary Runoff"
                - "General Runoff"
                - "Primary Special"
                - "General Special"
                - "Primary Special Runoff"
                - "General Special Runoff"
      - name: email
        description: Candidate email address (sparse — used as a high-signal comparison in matching).
      - name: phone
        description: Candidate phone number (sparse — used as a high-signal comparison in matching).
      - name: br_race_id
        description: BallotReady race ID, cast to integer. Present for both sources when TechSpeed inherits BR race data.
      - name: official_office_name
        description: Lowercased, trimmed office name used in Splink's Jaro-Winkler comparison.
      - name: br_candidacy_id
        description: BallotReady candidacy ID, cast to integer. Only populated for BallotReady records.
      - name: seat_name
        description: Seat or position name from the source.
      - name: partisan_type
        description: Partisan classification of the race from the source.

  - name: stg_er_source__pairwise_candidacy_stages
    description: >
      Staged pairwise predictions from the Splink entity resolution pipeline.
      Each row is a scored pair of candidacy-stage records with Splink match
      weights, match probabilities, per-comparison gamma levels (agreement
      categories), Bayes factors, and term-frequency adjustments. Records may
      come from BallotReady, TechSpeed, or DDHQ.

      Pairs are generated by 6 blocking rules (br_race_id exact, state +
      election_date + office fuzzy + last_name, state + last_name +
      election_date, state + election_date + office fuzzy + last_name fuzzy,
      phone exact, email exact) and filtered to match_probability >= 0.01.

      Three post-prediction filters are applied: (1) person identity — requires
      partial last_name match AND first_name/email/phone match, (2) race-level
      — requires office name Jaro-Winkler >= 0.75, (3) race ID — excludes
      pairs with differing integer br_race_ids unless office names match well.
    columns:
      - name: match_weight
        description: >
          Log2 likelihood ratio (Splink match weight). Higher values indicate
          stronger evidence the pair is a true match.
        data_tests:
          - not_null
      - name: match_probability
        description: >
          Probability that the pair is a true match (0 to 1), derived from the
          match weight via the logistic function. All rows have probability >= 0.01.
        data_tests:
          - not_null
      - name: unique_id_l
        description: Composite key (source_name|source_id) for the left record.
        data_tests:
          - not_null
      - name: unique_id_r
        description: Composite key (source_name|source_id) for the right record.
        data_tests:
          - not_null
      - name: source_name_l
        description: Origin source for the left record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq", "gp_api"]
      - name: source_name_r
        description: Origin source for the right record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready", "techspeed", "ddhq", "gp_api"]
      - name: source_id_l
        description: Left record's source-specific identifier.
      - name: source_id_r
        description: Right record's source-specific identifier.
      - name: source_dataset_l
        description: Left record's source dataset name.
      - name: source_dataset_r
        description: Right record's source dataset name.
      - name: last_name_l
        description: Left record's last name.
      - name: last_name_r
        description: Right record's last name.
      - name: gamma_last_name
        description: >
          Comparison level for last_name: 3=exact, 2=JW>=0.95, 1=JW>=0.88, 0=else.
          Term-frequency adjusted.
      - name: tf_last_name_l
        description: >
          Term frequency of last_name for the left record. Measures how common
          the value is across the dataset (0 to 1). Rare values get higher match weight.
      - name: tf_last_name_r
        description: >
          Term frequency of last_name for the right record. Measures how common
          the value is across the dataset (0 to 1). Rare values get higher match weight.
      - name: bf_last_name
        description: >
          Bayes factor for the last_name comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: bf_tf_adj_last_name
        description: >
          Term-frequency-adjusted Bayes factor for last_name. Adjusts the raw
          Bayes factor by the rarity of each record's value.
      - name: first_name_l
        description: Left record's first name.
      - name: first_name_r
        description: Right record's first name.
      - name: first_name_aliases_l
        description: Left record's first name nickname aliases.
      - name: first_name_aliases_r
        description: Right record's first name nickname aliases.
      - name: gamma_first_name
        description: >
          Comparison level for first_name: 3=exact, 2=nickname alias intersection,
          1=JW>=0.92, 0=else. Term-frequency adjusted.
      - name: tf_first_name_l
        description: >
          Term frequency of first_name for the left record. Measures how common
          the value is across the dataset (0 to 1). Rare values get higher match weight.
      - name: tf_first_name_r
        description: >
          Term frequency of first_name for the right record. Measures how common
          the value is across the dataset (0 to 1). Rare values get higher match weight.
      - name: bf_first_name
        description: >
          Bayes factor for the first_name comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: bf_tf_adj_first_name
        description: >
          Term-frequency-adjusted Bayes factor for first_name. Adjusts the raw
          Bayes factor by the rarity of each record's value.
      - name: party_l
        description: Left record's party affiliation.
      - name: party_r
        description: Right record's party affiliation.
      - name: gamma_party
        description: "Comparison level for party: 1=exact match, 0=else."
      - name: bf_party
        description: >
          Bayes factor for the party comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: email_l
        description: Left record's email address.
      - name: email_r
        description: Right record's email address.
      - name: gamma_email
        description: "Comparison level for email: 1=exact match, -1=one or both null, 0=else."
      - name: bf_email
        description: >
          Bayes factor for the email comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: phone_l
        description: Left record's phone number.
      - name: phone_r
        description: Right record's phone number.
      - name: gamma_phone
        description: "Comparison level for phone: 1=exact match, -1=one or both null, 0=else."
      - name: bf_phone
        description: >
          Bayes factor for the phone comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: state_l
        description: Left record's state postal code.
      - name: state_r
        description: Right record's state postal code.
      - name: gamma_state
        description: "Comparison level for state: 1=exact match, 0=else."
      - name: bf_state
        description: >
          Bayes factor for the state comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: election_date_l
        description: Left record's election date.
      - name: election_date_r
        description: Right record's election date.
      - name: gamma_election_date
        description: "Comparison level for election_date: 1=exact match, 0=else."
      - name: bf_election_date
        description: >
          Bayes factor for the election_date comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: official_office_name_l
        description: Left record's official office name.
      - name: official_office_name_r
        description: Right record's official office name.
      - name: gamma_official_office_name
        description: >
          Comparison level for office name: 4=exact, 3=JW>=0.95, 2=JW>=0.88,
          1=JW>=0.75, 0=else.
      - name: bf_official_office_name
        description: >
          Bayes factor for the official_office_name comparison. Values >1 indicate
          evidence of match; <1 indicate evidence of non-match.
      - name: district_identifier_l
        description: Left record's normalized district number.
      - name: district_identifier_r
        description: Right record's normalized district number.
      - name: gamma_district_identifier
        description: "Comparison level for district: 1=exact match, -1=one or both null, 0=else."
      - name: bf_district_identifier
        description: >
          Bayes factor for the district_identifier comparison. Values >1 indicate
          evidence of match; <1 indicate evidence of non-match.
      - name: br_race_id_l
        description: Left record's BallotReady race ID.
      - name: br_race_id_r
        description: Right record's BallotReady race ID.
      - name: candidate_office_l
        description: Left record's candidate office name.
      - name: candidate_office_r
        description: Right record's candidate office name.
      - name: office_level_l
        description: Left record's office level classification.
      - name: office_level_r
        description: Right record's office level classification.
      - name: office_type_l
        description: Left record's office type classification.
      - name: office_type_r
        description: Right record's office type classification.
      - name: district_raw_l
        description: Left record's raw district value.
      - name: district_raw_r
        description: Right record's raw district value.
      - name: seat_name_l
        description: Left record's seat or position name.
      - name: seat_name_r
        description: Right record's seat or position name.
      - name: br_candidacy_id_l
        description: Left record's BallotReady candidacy ID.
      - name: br_candidacy_id_r
        description: Right record's BallotReady candidacy ID.
      - name: election_stage_l
        description: Left record's election stage.
      - name: election_stage_r
        description: Right record's election stage.
      - name: match_key
        description: >
          Index of the blocking rule that generated this pair (0-5), corresponding
          to: 0=br_race_id exact, 1=state+date+office_fuzzy+last_name, 2=state+last_name+date,
          3=state+date+office_fuzzy+last_name_fuzzy, 4=phone exact, 5=email exact.

  - name: stg_er_source__clustered_elected_officials
    description: |
      Match groups bridging gp-api elected-office records to BR+TS terms.
      Term grain. Mart owns person rollup via br_candidate_id, and term selection
      within a multi-term cluster via sworn_in_date proximity to term_start_date.
    columns:
      - name: cluster_id
        description: >
          Splink cluster identifier grouping records believed to represent the
          same elected official. Cross-source clusters link records across BR
          and TS.
        data_tests:
          - not_null
      - name: unique_id
        description: >
          Composite key in the format `source_name|source_id` that uniquely
          identifies each elected official record across all sources.
        data_tests:
          - not_null
          - unique
      - name: source_id
        description: >
          Source-specific identifier — br_office_holder_id for BallotReady
          records, a composite key for TechSpeed records.
        data_tests:
          - not_null
      - name: source_name
        description: Origin data source for this record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready_techspeed", "gp_api"]
      - name: first_name
        description: Official's first name (lowercased, trimmed in prematch).
      - name: last_name
        description: Official's last name (lowercased, trimmed in prematch).
      - name: first_name_aliases
        description: >
          String representation of nickname aliases array, built from the
          nicknames seed table during prematch.
      - name: state
        description: Two-letter US state postal code.
      - name: party
        description: Parsed party affiliation.
      - name: candidate_office
        description: Human-readable office name from the source.
      - name: office_level
        description: Office level classification (e.g. Federal, State, County, Local).
      - name: office_type
        description: Office type classification (e.g. Executive, Legislative, Judicial, School Board, Other).
      - name: district_raw
        description: Raw district value from the source before normalization.
      - name: district_identifier
        description: Normalized district number, cast to integer.
      - name: email
        description: Official's email address (sparse — high-signal comparison).
      - name: phone
        description: Official's phone number (sparse — high-signal comparison).
      - name: official_office_name
        description: Lowercased, trimmed office name used in Splink's Jaro-Winkler comparison.
      - name: city
        description: City associated with the office.
      - name: term_start_date
        description: Start date of the official's term.
      - name: term_end_date
        description: End date of the official's term.
      - name: br_office_holder_id
        description: BallotReady office holder ID, cast to integer. Only populated for BR records.
      - name: br_candidate_id
        description: BallotReady candidate ID, cast to integer. Only populated for BR records.
      - name: ts_officeholder_id
        description: TechSpeed officeholder ID. Only populated for TS records.
      - name: ts_position_id
        description: TechSpeed position ID. Only populated for TS records.
      - name: ballotready_position_id
        description: >
          BallotReady position FK. Used as a Splink ExactMatch comparison feature
          and a (state, ballotready_position_id) blocking rule. Sourced from BR's
          br_position_id on the ballotready_techspeed side and from the gp-api
          campaigns join on the gp_api side.
      - name: gp_api_user_id
        description: gp-api product user ID. Only populated for gp_api rows.
      - name: gp_api_campaign_id
        description: gp-api product campaign ID. Only populated for gp_api rows.
      - name: gp_api_elected_office_id
        description: gp-api elected office UUID. Only populated for gp_api rows.
      - name: gp_api_organization_slug
        description: gp-api organization slug. Only populated for gp_api rows.

  - name: stg_er_source__pairwise_elected_officials
    description: >
      Staged pairwise predictions from the elected officials entity resolution
      pipeline. Each row is a scored pair of elected official records with Splink
      match weights, match probabilities, per-comparison gamma levels, Bayes
      factors, and term-frequency adjustments.

      Pairs are generated by 5 blocking rules (state+office_fuzzy+last_name,
      state+office_fuzzy+last_name_fuzzy, state+last_name, phone exact, email
      exact) and filtered to match_probability >= 0.01.

      Post-prediction filters enforce person identity (last_name + first_name or
      contact info) and office compatibility (office_type match with contact-info
      bypass). No race ID filter (elected officials have no br_race_id).

      Compared to candidacy stages, this entity type adds office_type and
      office_level as Splink comparisons and drops election_date.
    columns:
      - name: match_weight
        description: >
          Log2 likelihood ratio (Splink match weight). Higher values indicate
          stronger evidence the pair is a true match.
        data_tests:
          - not_null
      - name: match_probability
        description: >
          Probability that the pair is a true match (0 to 1). All rows have
          probability >= 0.01.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              min_value: 0.01
              max_value: 1.0
      - name: unique_id_l
        description: Composite key (source_name|source_id) for the left record.
        data_tests:
          - not_null
      - name: unique_id_r
        description: Composite key (source_name|source_id) for the right record.
        data_tests:
          - not_null
      - name: source_name_l
        description: Origin source for the left record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready_techspeed", "gp_api"]
      - name: source_name_r
        description: Origin source for the right record.
        data_tests:
          - not_null
          - accepted_values:
              values: ["ballotready_techspeed", "gp_api"]
      - name: source_id_l
        description: Source-specific identifier for the left record.
      - name: source_id_r
        description: Source-specific identifier for the right record.
      - name: source_dataset_l
        description: Splink internal dataset label for the left record.
      - name: source_dataset_r
        description: Splink internal dataset label for the right record.
      - name: gamma_last_name
        description: >
          Comparison level for last_name: 3=exact, 2=JW>=0.95, 1=JW>=0.88, 0=else.
          Term-frequency adjusted.
      - name: last_name_l
        description: Left record's last name.
      - name: last_name_r
        description: Right record's last name.
      - name: tf_last_name_l
        description: >
          Term frequency of last_name for the left record. Measures how common
          the value is across the dataset (0 to 1). Rare values get higher match weight.
      - name: tf_last_name_r
        description: >
          Term frequency of last_name for the right record.
      - name: bf_last_name
        description: >
          Bayes factor for the last_name comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: bf_tf_adj_last_name
        description: >
          Term-frequency-adjusted Bayes factor for last_name. Adjusts the raw
          Bayes factor by the rarity of each record's value.
      - name: gamma_first_name
        description: >
          Comparison level for first_name: 3=exact, 2=nickname alias intersection,
          1=JW>=0.92, 0=else. Term-frequency adjusted.
      - name: first_name_l
        description: Left record's first name.
      - name: first_name_r
        description: Right record's first name.
      - name: first_name_aliases_l
        description: Nickname aliases array for the left record's first name.
      - name: first_name_aliases_r
        description: Nickname aliases array for the right record's first name.
      - name: tf_first_name_l
        description: >
          Term frequency of first_name for the left record.
      - name: tf_first_name_r
        description: >
          Term frequency of first_name for the right record.
      - name: bf_first_name
        description: >
          Bayes factor for the first_name comparison. Values >1 indicate evidence
          of match; <1 indicate evidence of non-match.
      - name: bf_tf_adj_first_name
        description: >
          Term-frequency-adjusted Bayes factor for first_name.
      - name: gamma_party
        description: "Comparison level for party: 1=exact match, 0=else."
      - name: party_l
        description: Left record's party affiliation.
      - name: party_r
        description: Right record's party affiliation.
      - name: bf_party
        description: Bayes factor for the party comparison.
      - name: gamma_email
        description: "Comparison level for email: 1=exact match, -1=one or both null, 0=else."
      - name: email_l
        description: Left record's email address.
      - name: email_r
        description: Right record's email address.
      - name: bf_email
        description: Bayes factor for the email comparison.
      - name: gamma_phone
        description: "Comparison level for phone: 1=exact match, -1=one or both null, 0=else."
      - name: phone_l
        description: Left record's phone number.
      - name: phone_r
        description: Right record's phone number.
      - name: bf_phone
        description: Bayes factor for the phone comparison.
      - name: gamma_state
        description: "Comparison level for state: 1=exact match, 0=else."
      - name: state_l
        description: Left record's two-letter US state postal code.
      - name: state_r
        description: Right record's two-letter US state postal code.
      - name: bf_state
        description: Bayes factor for the state comparison.
      - name: gamma_official_office_name
        description: >
          Comparison level for office name: 4=exact, 3=JW>=0.95, 2=JW>=0.88,
          1=JW>=0.75, 0=else.
      - name: official_office_name_l
        description: Left record's normalized office name.
      - name: official_office_name_r
        description: Right record's normalized office name.
      - name: bf_official_office_name
