version: 2

models:
  - name: int__l2_district_aggregations
    description: Intermediate model that aggregates L2 district data for downstream use.
    columns:
      - name: id
        description: Internally generated unique identifier for the district aggregation.
        tests:
          - not_null
          - unique
          - is_uuid
      - name: state_postal_code
        description: "Uppercase two-letter state postal code"
        tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false) }}"
      - name: district_type
        description: "Type of district (e.g., US_Congressional_District, State_Senate_District)"
        tests:
          - not_null
      - name: district_name
        description: "The actual district identifier/name"
        tests:
          - not_null
      - name: voter_count
        description: "Number of distinct voters in this district"
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: BIGINT
      - name: unique_cellphones
        description: >-
          Distinct cellphone numbers
          (votertelephones_cellphoneformatted) appearing on L2 voters
          in this district. The collapse is on the phone-number value
          itself, so two voters sharing a household phone count as
          one — this matches per-channel send/dial costs downstream
          (SMS, robocall).
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: BIGINT
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: unique_landlines
        description: >-
          Distinct landline numbers
          (votertelephones_landlineformatted) appearing on L2 voters
          in this district. Same collapse semantics as
          unique_cellphones.
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: BIGINT
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: loaded_at
        description: "Timestamp from the source L2 uniform data"
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - state_postal_code
              - district_type
              - district_name

  - name: int__l2_nationwide_uniform
    description: "Combined uniform voter file data from all states"
    columns:
      - name: state_postal_code
        description: "Uppercase two-letter state postal code"
        tests:
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=false) }}"

  - name: int__voter_turnout_lgbm_inference
    description: >
      Nationwide district-level voter-turnout projections from the LightGBM
      models (DATA-2015). One row per (state, district_type, district_name,
      election_year, election_code). Replaces the per-state inference models.
      Projections are known to skew high (calibration caveat from research).
    config:
      meta:
        # Most recent year of L2 vote history present (drives the feature window).
        max_vote_history_year: "{{ var('max_vote_history_year', 2025) }}"
        # DEV-ONLY iteration knob: comma/space list like "AL" to score a subset.
        # NEVER set when building the wired int__model_prediction_voter_turnout
        # (the carve would suppress legacy rows nationwide for a partial run).
        l2_state_allowlist: "{{ var('l2_state_allowlist', '') }}"
        # Schema holding the @production registered models.
        voter_turnout_models_schema: "{{ var('voter_turnout_models_schema', 'model_predictions') }}"
        # Schema holding turnout_historical_precincts. PROD = model_predictions
        # (must be promoted there alongside the models; it currently exists only
        # in sandbox). Dev overrides to sandbox via the var.
        voter_turnout_precincts_schema: "{{ var('voter_turnout_precincts_schema', 'model_predictions') }}"
    columns:
      - name: election_year
        description: "Election year scored (current year + 0/1/2)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 2024
                max_value: 2035
      - name: election_code
        description: "General, Local_or_Municipal, or Primary (the codes this model emits)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["General", "Local_or_Municipal", "Primary"]
      - name: state
        description: >
          State postal code. The full-nationwide set is asserted so a partial
          (allowlisted) build fails loudly.
        tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=false) }}"
      - name: district_type
        description: "L2 district column name, or 'State' for the statewide row."
        tests:
          - not_null
      - name: district_name
        description: "District identifier within district_type."
        tests:
          - not_null
      - name: ballots_projected
        description: "Projected ballots = round(sum(p_hat * n_voters)) over the district's precincts."
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: model_version
        description: "model_family value (load-bearing - part of the election-api projected_turnout id)."
        tests:
          - not_null
      - name: inference_at
        description: "Timestamp the projections were produced (dedup tiebreaker downstream)."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - state
              - district_type
              - district_name
              - election_year
              - election_code
              - model_version

  - name: int__l2_nationwide_haystaq_flags
    description: "Combined Haystaq issue model flags from all states (loaded from per-state L2 Haystaq flags tables)"
    config:
      tags: ["monthly"]
      meta:
        dbt_environment: "{{ env_var('DBT_ENVIRONMENT') }}"
        # optional: comma/space-separated list like \"AK,AL\" for iterative runs
        l2_state_allowlist: "{{ var('l2_state_allowlist', '') }}"
        # optional override if your user doesn't have permissions on the default source schema
        l2_haystaq_databricks_schema: "{{ var('l2_haystaq_databricks_schema', '') }}"
    columns:
      - name: LALVOTERID
        description: "The ID of the voter"
        tests:
          - not_null
          - unique

  - name: int__l2_nationwide_haystaq_scores
    description: "Combined Haystaq issue model scores from all states (loaded from per-state L2 Haystaq scores tables)"
    config:
      tags: ["monthly"]
      meta:
        dbt_environment: "{{ env_var('DBT_ENVIRONMENT') }}"
        # optional: comma/space-separated list like \"AK,AL\" for iterative runs
        l2_state_allowlist: "{{ var('l2_state_allowlist', '') }}"
        # optional override if your user doesn't have permissions on the default source schema
        l2_haystaq_databricks_schema: "{{ var('l2_haystaq_databricks_schema', '') }}"
    columns:
      - name: LALVOTERID
        description: "The ID of the voter"
        tests:
          - not_null
          - unique

  - name: int__zip_code_to_br_office
    description: "Zip code to BR office mapping"
    columns:
      - name: zip_code
        description: "Zip code"
        tests:
          - not_null
      - name: state_postal_code
        description: "State postal code"
        tests:
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false) }}"
      - name: district_type
        description: "District type"
        tests:
          - not_null
      - name: district_name
        description: "District name"
        tests:
          - not_null
      - name: voters_in_zip_district
        description: >
          L2 voters in this (zip, district_type, district_name). Passes
          through unchanged from int__zip_code_to_l2_district at L2 grain.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: voters_in_zip
        description: >
          L2 voters in this zip across all district_names of this
          district_type. Invariant per (zip, state, district_type).
          Voters whose value for this district_type column is null are
          excluded from the denominator (matches int__zip_code_to_l2_district).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: confidence
        description: "LLM confidence"
      - name: br_database_id
        description: "BallotReady/CivicEngine database ID"
      - name: br_position_id
        description: "BallotReady/CivicEngine position ID"
        tests:
          - relationships:
              arguments:
                to: ref("stg_airbyte_source__ballotready_api_position")
                field: id
      - name: br_race_id
        description: "BR race ID"
        tests:
          - relationships:
              arguments:
                to: ref("stg_airbyte_source__ballotready_api_race")
                field: id
      - name: br_race_database_id
        description: "BR race database ID"
        tests:
          - relationships:
              arguments:
                to: ref("stg_airbyte_source__ballotready_api_race")
                field: database_id
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - zip_code
              - district_type
              - district_name
              - br_database_id
      - dbt_utils.expression_is_true:
          arguments:
            expression: "voters_in_zip_district <= voters_in_zip"

  - name: int__zip_code_to_l2_district
    description: >
      Zip code to L2 district mapping. One row per
      (zip_code, state_postal_code, district_type, district_name) with the
      L2 voter count in that intersection and the total L2 voter count for
      the zip. No threshold is applied; downstream consumers decide cutoffs.
    columns:
      - name: zip_code
        description: "5-digit zip code"
        tests:
          - not_null
      - name: state_postal_code
        description: "State postal code"
        tests:
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false) }}"
      - name: district_type
        description: >
          L2 district column name (e.g. City, US_Congressional_District), plus
          the synthetic value 'State' (one row per in-state zip, district_name =
          state_postal_code) used to give statewide positions zip coverage.
        tests:
          - not_null
      - name: district_name
        description: "L2 district value within district_type for this zip"
        tests:
          - not_null
      - name: voters_in_zip_district
        description: >
          Count of L2 voters whose residence is in this zip AND in this
          (district_type, district_name).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: voters_in_zip
        description: >
          Count of L2 voters whose residence is in this zip with a non-null
          value for this district_type column (summed across all district_names
          of this district_type). Voters whose value for the district_type
          column is null are excluded from the denominator. Invariant per
          (zip_code, state_postal_code, district_type).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - zip_code
              - state_postal_code
              - district_type
              - district_name
      - dbt_utils.expression_is_true:
          arguments:
            expression: "voters_in_zip_district <= voters_in_zip"

  - name: int__l2_block_district_map
    description: >
      One row per (census block, state, district_type, normalized
      district_name) with the L2 voter count in that intersection
      (voters_in_block_district) and the per-(block, district_type) voter total
      (voters_in_block). The block-grain map underlying the district/census
      substrate (DATA-1992; widened DATA-2013); UNPIVOTs the curated substrate district
      columns. Block grain is the source of truth for overlap (do NOT count by
      joining the district-level int__l2_district_aggregations on the
      normalized name - its key is non-unique and would fan out).
    columns:
      - name: block_geoid
        description: "15-char zero-padded 2020 census block GEOID (state+county+tract+block)."
        tests:
          - not_null
      - name: state_postal_code
        description: >
          Uppercase two-letter state postal code, derived from the block's
          geoid FIPS prefix (block_geoid[:2]) via the fips_codes seed -- NOT
          L2's per-voter state (which is mislabeled for voters geocoded across
          a state line). not_null confirms every block FIPS mapped; the
          state-set test confirms the FIPS->postal mapping is correct.
        tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false) }}"
      - name: district_type
        description: "L2 district column name; the curated substrate subset (DATA-1992; widened DATA-2013)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - County
                  - US_Congressional_District
                  - State_Senate_District
                  - State_House_District
                  - State_Legislative_District
                  - City
                  - Township
                  - Town_District
                  - Village
                  - Borough
                  - City_Council_Commissioner_District
                  - City_Ward
                  - County_Commissioner_District
                  - County_Supervisorial_District
                  - School_District
                  - Unified_School_District
                  - School_Board_District
                  - Board_of_Education_District
                  - City_School_District
                  - Elementary_School_District
                  - High_School_District
                  - Fire_District
                  - Community_College
                  - Community_College_SubDistrict
                  - County_Board_of_Education_District
                  - School_Subdistrict
                  - School_District_Vocational
                  - Educational_Service_District
                  - Learning_Community_Coordinating_Council_District
                  - Town_Ward
                  - Township_Ward
                  - Community_Council_SubDistrict
                  - County_Legislative_District
                  - Judicial_Justice_of_the_Peace
                  - Judicial_Superior_Court_District
                  - Judicial_District_Court_District
                  - Park_District
                  - Library_District
                  - Water_District
                  - Water_SubDistrict
                  - Sewer_District
                  - Fire_Protection_District
                  - Port_District
                  - Conservation_District
                  - Conservation_SubDistrict
                  - Soil_and_Water_District
                  - Aquatic_District
      - name: district_name
        description: "Normalized L2 district name (normalize_l2_district_name): upper, trimmed, no ' (EST.)'."
        tests:
          - not_null
      - name: voters_in_block_district
        description: "Distinct L2 voters in this (block, district_type, district_name)."
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: voters_in_block
        description: >
          Distinct L2 voters in this block across all district_names of this
          district_type (the substrate's split denominator). Invariant per
          (block_geoid, district_type).
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: loaded_at
        description: "Max loaded_at of the contributing L2 rows."
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [block_geoid, district_type, district_name]
      - dbt_utils.expression_is_true:
          arguments:
            expression: "voters_in_block_district <= voters_in_block"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "length(block_geoid) = 15"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "length(trim(district_name)) > 0"

  - name: int__election_calendar_primary_ballotready
    description: >
      Live-recomputed per (state, election_year) Primary-day guess from
      BallotReady's scheduled-election data (DATA-2015). Authoritative for
      Primary in m_election_api__election_calendar -- recomputes every run,
      so an edit to BallotReady's election table flows through automatically.
      Even years only. See the model file's header comment for the full rule
      (max-race-count winner, Wisconsin exception, Presidential fallback, the
      Louisiana general-day collision guard) and its validation writeup.
    columns:
      - name: state
        description: State postal code
        data_tests:
          - not_null
      - name: election_date
        description: The guessed Primary date for this state/year
        data_tests:
          - not_null
      - name: election_code
        description: Always 'Primary' -- this model only ever emits Primary rows
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["Primary"]
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - state
              - election_date
