  - name: int__civics_candidacy_stage_ddhq
    description: >
      DDHQ candidacy stages — the foundational DDHQ intermediate model.

      Grain: One row per candidacy stage (candidate + race), 1:1 with staging rows.

      Reads from staging, computes all five GP IDs, and carries through all
      columns needed by the four downstream DDHQ models (candidate, candidacy,
      election_stage, election).

    columns:
      - name: gp_candidacy_stage_id
        description: Primary key - internally generated unique identifier for candidacy stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidacy_id
        description: Candidacy ID (candidate + position + year)
        data_tests:
          - not_null

      - name: gp_candidate_id
        description: Candidate ID (person-level)
        data_tests:
          - not_null

      - name: gp_election_stage_id
        description: Election stage ID (one per DDHQ race)
        data_tests:
          - not_null

      - name: gp_election_id
        description: Election ID (position + year)
        data_tests:
          - not_null

      - name: source_candidate_id
        description: >
          DDHQ's native candidate_id (string-cast). Asserts every raw DDHQ
          record surfaces in the candidacy_stage mart with 'ddhq' in
          source_systems. The mart populates ddhq_candidate_id only when
          DDHQ is in the cluster. Configured to warn on small failure
          counts: if Splink over-clusters two DDHQ rows with different
          candidate_ids into the same cluster, the mart's dedup keeps one
          and drops the other's natural keys. Investigate when count grows.
        data_tests:
          # Threshold rationale tracked by DATA-1894 (ER cluster-quality fix
          # would let these thresholds tighten back to default).
          # https://goodparty.clickup.com/t/90132012119/DATA-1894
          - relationships:
              arguments:
                to: ref('candidacy_stage')
                field: ddhq_candidate_id
              config:
                warn_if: ">0"
                error_if: ">100"

      - name: source_race_id
        description: >
          DDHQ's native ddhq_race_id (string-cast). Same propagation guarantee
          as source_candidate_id, paired with it as DDHQ's compound natural
          key. Same warn-vs-error thresholds for the same reason.
        data_tests:
          # Threshold rationale tracked by DATA-1894 (ER cluster-quality fix
          # would let these thresholds tighten back to default).
          # https://goodparty.clickup.com/t/90132012119/DATA-1894
          - relationships:
              arguments:
                to: ref('candidacy_stage')
                field: ddhq_race_id
              config:
                warn_if: ">0"
                error_if: ">100"

      - name: election_result
        description: Result of the election stage (Won or Lost)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Won
                  - Lost

      - name: is_winner
        description: Whether the candidate won the election stage
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: election_date
        description: Date of the election stage
        data_tests:
          - not_null

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

