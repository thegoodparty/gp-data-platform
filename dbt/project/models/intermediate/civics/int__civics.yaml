models:
  - name: int__civics_election_2025
    description: >
      Historical archive of elections from the general mart with election dates
      on or before 2025-12-31. Snapshot from 2026-01-22.
    columns:
      - name: gp_election_id
        description: Primary key - internally generated unique identifier for elections
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: election_date
        description: Date of the election
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2025-12-31'"
      - name: population
        description: Population of the electoral district
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null
      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: int__civics_election_stage_2025
    description: >
      Historical archive of election stages (primary, general, general runoff) from
      elections on or before 2025-12-31. Grain: one row per (gp_election_id, stage_type).
      Seeded from candidacy dates so HubSpot-only stages are represented; DDHQ race
      attributes are left-joined when a match exists.
    columns:
      - name: gp_election_stage_id
        description: Primary key - internally generated unique identifier for election stages
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: gp_election_id
        description: Foreign key to election table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_election_2025')
                field: gp_election_id
      - name: ddhq_race_id
        description: DDHQ race identifier. Null for HubSpot-only stages with no DDHQ match.
      - name: election_stage
        description: >
          Type of election stage. DDHQ uses a single 'runoff' type without
          distinguishing primary vs general; for 2025 and earlier data, DDHQ
          runoff rows are mapped to 'general runoff'. 'primary runoff' only
          appears in 2026+ BallotReady data, which flags it explicitly.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - general runoff
      - name: ddhq_election_stage_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2025-12-31'"
      - name: br_position_id
        description: >
          BallotReady position database ID, sourced from HubSpot-linked product DB
          campaign.details.positionId (base64-decoded upstream). Used for ICP join
          at the mart layer. Null when no candidacy at this stage has a product DB link.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
              config:
                severity: warn
      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

  - name: int__civics_candidacy_2025
    description: >
      Historical archive of candidacies from the general mart with elections
      on or before 2025-12-31. Snapshot from 2026-01-22.
    columns:
      - name: gp_candidacy_id
        description: Primary key - internally generated unique identifier for candidacies
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: gp_candidate_id
        description: Foreign key to candidate table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidate_2025')
                field: gp_candidate_id
      - name: gp_election_id
        description: Foreign key to election table (referential integrity enforced at mart level)
      - name: is_pledged
        description: >
          Whether the candidate has taken the GoodParty pledge (boolean).
          A pledged candidate agreed to 4 qualifying statements either on the
          GoodParty website or via communication with the politics team.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_verified
        description: >
          Whether the candidacy has been verified to exist (boolean).
          True if verified, false otherwise. Set automatically if candidate data
          came from Techspeed or BallotReady. For inbound candidates, verification
          was done manually by the politics team by checking for evidence of a
          legitimate campaign (campaign website, filing information, Facebook page,
          etc.). Manual verification was discontinued in 2026.
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: verification_status_reason
        description: >
          Reason why a candidacy is not verified. Only populated when is_verified
          is false. Values: No, Unresponsive, Can't Determine, Partisan Candidate,
          Write In.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - "No"
                  - "Unresponsive"
                  - "Can\\'t Determine"
                  - "Partisan Candidate"
                  - "Write In"
      - name: general_election_date
        description: Date of the general election
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2025-12-31'"
      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null
      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: int__civics_candidate_2025
    description: >
      Historical archive of candidates from the general mart with elections
      on or before 2025-12-31. Snapshot from 2026-01-22.
    columns:
      - name: gp_candidate_id
        description: Primary key - internally generated unique identifier for candidates
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: hubspot_contact_id
        description: Contact ID from HubSpot CRM (may be null for companies without associated contacts)
      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null
      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(first_name is not null) or (last_name is not null) or (full_name is not null)"
          config:
            # Companies without associated contacts may have null names
            error_if: ">200"
            warn_if: ">150"

  - name: int__civics_candidacy_stage_2025
    description: >
      Historical archive of candidacy stages (primary, general, general runoff)
      from elections on or before 2025-12-31. Grain: one row per (gp_candidacy_id,
      stage_type) where the candidacy carries a non-null date for that stage.
      DDHQ is an optional attribute join — HubSpot-only candidacies flow through.
    columns:
      - name: gp_candidacy_stage_id
        description: Primary key - internally generated unique identifier for candidacy stages
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: gp_candidacy_id
        description: Foreign key to candidacy table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidacy_2025')
                field: gp_candidacy_id
      - name: gp_election_stage_id
        description: Foreign key to election_stage table
        data_tests:
          - relationships:
              arguments:
                to: ref('int__civics_election_stage_2025')
                field: gp_election_stage_id
      - name: is_winner
        description: Whether the candidate won the election stage (boolean)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: election_result
        description: >
          Normalized result of the election stage.
          Standard values: Won, Lost, Runoff, Withdrew, Not on Ballot.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Won
                  - Lost
                  - Runoff
                  - Withdrew
                  - Not on Ballot
      - name: election_stage_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2025-12-31'"
      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null
      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: int__hubspot_contacts_2025
    description: >
      Archived HubSpot contacts from 2026-01-22 snapshot. Source data for civics mart.
    columns:
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: verified_candidate_status
        description: >
          Raw verification status from HubSpot contacts. Empty strings allowed
          and converted to nulls in downstream int__hubspot_companies_w_contacts_2025.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - "Yes"
                  - "No"
                  - "Unresponsive"
                  - "Can\\'t Determine"
                  - "Partisan Candidate"
                  - "Write In"
                  - ""

  - name: int__hubspot_companies_w_contacts_2025
    description: >
      Archived HubSpot companies joined with contacts from 2026-01-22 snapshot.
      Upstream source for civics candidacy data. Empty strings in verified_candidate
      are converted to nulls at this layer.
    columns:
      - name: verified_candidate
        description: >
          Verification status from HubSpot. Empty strings converted to nulls.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - "Yes"
                  - "No"
                  - "Unresponsive"
                  - "Can\\'t Determine"
                  - "Partisan Candidate"
                  - "Write In"

  - name: int__civics_candidacy_techspeed
    description: >
      TechSpeed candidates transformed into civics mart candidacy schema.

      Grain: One row per candidacy (candidate + election combination).

      Source: stg_airbyte_source__techspeed_gdrive_candidates

      Key design decisions:
      - UUID fields aligned with int__hubspot_companies_w_contacts_2025 for cross-source consistency
      - br_candidacy_id is NULL; will be populated via COALESCE when TS adds it
      - candidate_code is the linkage key to BallotReady data
      - No HubSpot dependency
      - Election-level attributes (population, seats, etc.) NOT included — those belong in election table

    columns:
      - name: gp_candidacy_id
        description: >
          Primary key - internally generated UUID for candidacies.
          Generated from: first_name, last_name, state, party, candidate_office,
          election_date, district (matches HubSpot pattern).
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: br_candidacy_id
        description: BallotReady candidacy ID - NULL for TechSpeed-sourced records (future COALESCE target)

      - name: gp_candidate_id
        description: Foreign key to candidate table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidate_techspeed')
                field: gp_candidate_id

      - name: hubspot_company_ids
        description: HubSpot company IDs (NULL for TechSpeed-sourced records)

      - name: candidate_code
        description: Deterministic linkage key (first_name__last_name__state__office_type__city)
        data_tests:
          - not_null

      - name: candidate_id_source
        description: Source system identifier
        data_tests:
          - accepted_values:
              arguments:
                values: ["techspeed"]

      - name: is_verified
        description: Whether candidacy is verified (always TRUE for TechSpeed data)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_pledged
        description: Whether candidate took GoodParty pledge (always FALSE for TechSpeed leads)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_incumbent
        description: Whether candidate is incumbent (boolean, NULL if unknown)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_open_seat
        description: Whether seat is open (boolean, NULL if unknown)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_partisan
        description: Whether race is partisan (boolean)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: general_election_date
        description: >
          General election date. Sourced from TS form data when present, with
          a fallback to BallotReady's election_stage data via br_race_id when
          TS only captured a primary. At least one of general/primary must be
          non-null.

      - name: primary_election_date
        description: >
          Primary election date. Sourced from TS form data when present, with
          a fallback to BallotReady's election_stage data via br_race_id when
          TS only captured a general. At least one of general/primary must be
          non-null.

      - name: primary_runoff_election_date
        description: >
          Primary runoff election date. NULL unless BallotReady's election_stage
          surfaces one for the matched BR race (TS form data does not capture
          runoffs).

      - name: general_runoff_election_date
        description: >
          General runoff election date. NULL unless BallotReady's election_stage
          surfaces one for the matched BR race (TS form data does not capture
          runoffs).

      - name: br_position_database_id
        description: >
          BallotReady position id, recovered from the BR election_stage row
          matching the TS br_race_id. NULL when the TS br_race_id is not
          present in BR (e.g. ts_found_race_net_new). Unlocks the ICP join
          downstream for TS-only candidacies that have no BR candidacy row.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__ballotready_api_position')
                field: database_id
              config:
                where: "br_position_database_id is not null"
                severity: warn
                # Some position IDs may not exist in the API position table
                # yet (API loaded incrementally, S3/election_stage may be
                # ahead). Threshold mirrors the candidacy mart's allowance.
                warn_if: ">200"
                error_if: ">300"

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          name: techspeed_candidacy_has_general_or_primary_date
          arguments:
            expression: "coalesce(general_election_date, primary_election_date) is not null"

  - name: int__civics_candidate_techspeed
    description: >
      TechSpeed candidates transformed into civics mart candidate schema.

      Grain: One row per unique person (deduplicated on identity fields).

      Source: stg_airbyte_source__techspeed_gdrive_candidates

      UUID fields aligned with int__civics_candidate_2025 for cross-source consistency:
      first_name, last_name, state, birth_date, email, phone_number

    columns:
      - name: gp_candidate_id
        description: >
          Primary key - internally generated UUID for candidates.
          Generated from: first_name, last_name, state, birth_date, email, phone_number.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: first_name
        description: Candidate's first name
        data_tests:
          - not_null

      - name: last_name
        description: Candidate's last name
        data_tests:
          - not_null

      - name: state
        description: U.S. state
        data_tests:
          - not_null
          - is_state_abbreviation:
              config:
                severity: warn

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_election_stage_techspeed
    description: >
      TechSpeed election stages transformed into civics mart election_stage schema.

      Grain: One row per election stage (race + stage type).

      Source: stg_airbyte_source__techspeed_gdrive_candidates, unpivoted from candidate-level
      into primary/general stage rows, then aggregated to race-level.

      gp_election_stage_id uses a composite key (NOT br_race_id) because a
      TechSpeed candidate has one br_race_id but two stage dates. br_race_id
      is stored as a reference column only.

    columns:
      - name: gp_election_stage_id
        description: Primary key - internally generated unique identifier for election stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_election_id
        description: Foreign key to election table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_election_techspeed')
                field: gp_election_id

      - name: br_race_id
        description: >
          BallotReady race ID reference. May be a numeric ID (for BR-matched records)
          or 'ts_found_race_net_new' (for net-new races). NOT used for ID generation.

      - name: stage_type
        description: Type of election stage
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - general
                  - primary

      - name: election_date
        description: Date of the election stage
        data_tests:
          - not_null

      - name: is_primary
        description: Whether this stage is a primary election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_runoff
        description: Whether this stage is a runoff election (always false for TechSpeed)

      - name: is_retention
        description: Whether this stage is a retention election (always false for TechSpeed)

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_election_techspeed
    description: >
      TechSpeed elections transformed into civics mart election schema.

      Grain: One row per election (position + election year).

      Source: stg_airbyte_source__techspeed_gdrive_candidates, grouped by election-defining
      fields. Enriched with population, filing_deadline, and contested status
      from the source data.

    columns:
      - name: gp_election_id
        description: Primary key - internally generated unique identifier for elections
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: election_date
        description: Date of the election
        data_tests:
          - not_null

      - name: election_year
        description: Year of the election

      - name: population
        description: Population of the electoral district
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: has_ddhq_match
        description: Whether there is a DDHQ match (always false for TechSpeed)

      - name: is_judicial
        description: Whether the office is judicial (always null for TechSpeed)

      - name: is_appointed
        description: Whether the office is appointed (always null for TechSpeed)

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_candidacy_stage_techspeed
    description: >
      TechSpeed candidacy stages transformed into civics mart candidacy_stage schema.

      Grain: One row per candidacy stage (candidate + election stage).

      Source: stg_airbyte_source__techspeed_gdrive_candidates, unpivoted into primary/general
      stage rows. Each candidate with both dates produces two rows.

      Won/Unopposed election results mapped to general stages when available.

    columns:
      - name: gp_candidacy_stage_id
        description: Primary key - internally generated unique identifier for candidacy stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidacy_id
        description: Foreign key to candidacy table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidacy_techspeed')
                field: gp_candidacy_id

      - name: gp_election_stage_id
        description: Foreign key to election_stage table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_election_stage_techspeed')
                field: gp_election_stage_id

      - name: election_result
        description: Result of the election stage (Won or null, general stages only)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Won

      - name: is_winner
        description: Whether the candidate won the election stage
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: election_stage_date
        description: Date of the election stage
        data_tests:
          - not_null

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_election_stage_ddhq
    description: >
      DDHQ election results transformed into civics mart election_stage schema.

      Grain: One row per DDHQ race (ddhq_race_id).

      Derived from int__civics_candidacy_stage_ddhq, aggregated from
      candidate-level to race-level.

    columns:
      - name: gp_election_stage_id
        description: Primary key - internally generated unique identifier for election stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_election_id
        description: Foreign key to election table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_election_ddhq')
                field: gp_election_id

      - name: ddhq_race_id
        description: DDHQ race identifier
        data_tests:
          - not_null

      - name: state
        description: U.S. state (human-readable name)
        data_tests:
          - not_null

      - name: state_postal_code
        description: U.S. state (2-letter postal code)
        data_tests:
          - not_null
          - is_state_abbreviation

      - name: stage_type
        description: Type of election stage
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - primary runoff
                  - general runoff

      - name: election_date
        description: Date of the election stage
        data_tests:
          - not_null

      - name: is_primary
        description: Whether this stage is a primary election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_runoff
        description: Whether this stage is a runoff election

      - name: is_retention
        description: Whether this stage is a retention election (always false for DDHQ)

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_election_ddhq
    description: >
      DDHQ elections transformed into civics mart election schema.

      Grain: One row per election (position + election year).

      Derived from int__civics_candidacy_stage_ddhq, representative-row
      approach preferring general stage.

    columns:
      - name: gp_election_id
        description: Primary key - internally generated unique identifier for elections
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: state
        description: U.S. state (human-readable name)
        data_tests:
          - not_null

      - name: state_postal_code
        description: U.S. state (2-letter postal code)
        data_tests:
          - not_null
          - is_state_abbreviation

      - name: election_date
        description: Date of the election
        data_tests:
          - not_null

      - name: election_year
        description: Year of the election

      - name: has_ddhq_match
        description: Whether there is a DDHQ match (always true for DDHQ data)

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_candidate_ddhq
    description: >
      DDHQ candidates transformed into civics mart candidate schema.

      Grain: One row per unique person (deduplicated on gp_candidate_id).

      Derived from int__civics_candidacy_stage_ddhq.

      UUID fields aligned with int__civics_candidate_2025 for cross-source consistency:
      first_name, last_name, state (birth_date, email, phone are NULL for DDHQ).

    columns:
      - name: gp_candidate_id
        description: >
          Primary key - internally generated UUID for candidates.
          Generated from: first_name, last_name, state, null, null, null.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: first_name
        description: Candidate's first name
        data_tests:
          - not_null

      - name: last_name
        description: Candidate's last name
        data_tests:
          - not_null

      - name: state
        description: U.S. state (human-readable name)
        data_tests:
          - not_null

      - name: state_postal_code
        description: U.S. state (2-letter postal code)
        data_tests:
          - not_null
          - is_state_abbreviation

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_candidacy_ddhq
    description: >
      DDHQ candidacies transformed into civics mart candidacy schema.

      Grain: One row per candidacy (candidate + position + election year).

      Derived from int__civics_candidacy_stage_ddhq, rolled up from
