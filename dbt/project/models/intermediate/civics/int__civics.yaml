  - name: int__civics_elected_official_ballotready
    description: >
      BallotReady office holders, term-grain. Carries both term-grain and
      person-grain canonical UUIDs (gp_elected_official_term_id and
      gp_elected_official_id) so downstream models can consume them without
      regenerating salted UUIDs. ICP flags are joined upstream via
      int__icp_offices on br_position_id (Win and Win-Supersize gated by
      candidacy election_day).

      Grain: One row per office-holder term.

      Source: stg_airbyte_source__ballotready_s3_office_holders_v3.

    tests:
      # Asserts the gp_elected_official_id NULL pattern matches br_candidate_id.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(gp_elected_official_id is not null) = (br_candidate_id is not null)"
    columns:
      - name: gp_elected_official_term_id
        description: >
          Term-grain canonical UUID. Salted from BallotReady's br_office_holder_id
          (unique per office-holder term). Replaces the previous
          gp_elected_official_id column on this model — same values, renamed for
          unambiguous grain semantics.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_elected_official_id
        description: >
          Person-grain canonical UUID. Salted from BallotReady's br_candidate_id.
          NULL for vacancy terms (br_candidate_id IS NULL). Used by the EO
          crosswalk, the BR person rollup intermediate, and both EO marts.
          Centralizing generation here prevents salt/source drift across the
          downstream models that reference this UUID.
        data_tests:
          - is_uuid # repo's is_uuid test ignores nulls, so vacancy NULLs are fine

      - name: br_office_holder_id
        description: BallotReady natural key for the office-holder term record
        data_tests:
          - unique
          - not_null

      - name: first_name
        description: Elected official first name
        data_tests:
          - not_null

      - name: last_name
        description: Elected official last name
        data_tests:
          - not_null

      - name: phone
        description: >
          Canonical phone number, preferring office_phone, then central_phone,
          then any remaining non-null BallotReady phone value

      - name: position_name
        description: Raw BallotReady office name
        data_tests:
          - not_null

      - name: br_position_id
        description: BallotReady position identifier
        data_tests:
          - not_null

      - name: br_position_tier
        description: >
          BallotReady's research-tier classification (integer 1-5) for the
          position the office-holder fills. Per BR docs, positions are
          organized into five tiers reflecting research effort:
          (1) Federal, (2) State, (3) County & Municipal,
          (4) Small Town, Township & School Board,
          (5) Special Districts and local small-population positions.
          See https://developers.civicengine.com/docs/api/graphql/reference/objects/position#positiontierint--

      - name: state
        description: U.S. state (2-letter code)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"

      - name: office_level
        description: >
          Office level from BallotReady's PositionLevel enum
          (initcap normalization only, no value collapsing).
          See https://developers.civicengine.com/docs/api/graphql/reference/enums/position-level
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - City
                  - Local
                  - County
                  - Township
                  - State
                  - Regional
                  - Federal

      - name: party_affiliation
        description: Normalized party affiliation from the first BallotReady party value
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: office_phone
        description: Phone number from a BallotReady contact with type = office

      - name: central_phone
        description: Phone number from a BallotReady contact with type = central

      - name: candidate_id_source
        description: Source system identifier
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - ballotready

      - name: is_win_icp
        description: >
          Whether this position meets Win ICP criteria (non-judicial,
          non-appointed, 500-100K voters, recognized position type).
          NULL when voter count data is unavailable, or when this term's
          election_day is unknown (no matching BR candidacy in the S3
          export). Forced false when election_day predates
          icp_win_effective_date.

      - name: is_serve_icp
        description: >
          Whether this position meets Serve ICP criteria (non-judicial,
          non-appointed, serve-eligible position type, 1K-100K voters).
          No effective-date gate applied.

      - name: is_win_supersize_icp
        description: >
          Whether this is a large office (>100K voters) meeting all
          other Win ICP criteria except the voter count cap. NULL when
          this term's election_day is unknown. Forced false when
          election_day predates icp_win_effective_date.

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_elected_official_canonical_ids
    description: |
      Deterministic crosswalk: TechSpeed ts_officeholder_id ↔ BallotReady
      canonical IDs (term-grain UUID, person-grain UUID, raw BR keys).

      Grain: one row per distinct numeric ts_officeholder_id that
      deterministically matches a BR br_office_holder_id. This is a
      key-mapping model only — it does NOT assert that ts_officeholder_id
      is a clean person identifier (see ts_officeholder_id_is_reused).

      Reads TS staging directly to stay decoupled from the prematch-preserving
      TS intermediate and to compute reuse against the same delivery-dedup
      population.

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "try_cast(ts_officeholder_id as bigint) = br_office_holder_id"

    columns:
      - name: ts_officeholder_id
        description: Primary key. Raw TS officeholder ID (numeric, as a string).
        data_tests:
          - unique
          - not_null

      - name: br_office_holder_id
        description: BR's term-grain natural key. Inner join guarantees presence; deterministic 1:1 with ts_officeholder_id.
        data_tests:
          - unique
          - not_null

      - name: br_candidate_id
        description: |
          BR's person-grain natural key. Asserted not_null — TS should never
          match a BR vacancy term (no person to TS-track). Failure means we
          need to either filter out vacancy matches or surface them as
          term-only.
        data_tests:
          - not_null

      - name: canonical_gp_elected_official_term_id
        description: BR's term-grain canonical UUID. Salted from br_office_holder_id.
        data_tests:
          - not_null
          - is_uuid

      - name: canonical_gp_elected_official_id
        description: BR's person-grain canonical UUID. Salted from br_candidate_id.
        data_tests:
          - not_null
          - is_uuid

      - name: ts_officeholder_id_is_reused
        description: |
          true when this ts_officeholder_id has >=2 records after delivery dedup.
          Conservative: catches the known contaminated/reused-ID risk and also
          suppresses legitimate same-person multi-position IDs. Downstream
          (TS person intermediate) suppresses contact rollup for any flagged ID.
        data_tests:
          - not_null

  - name: int__civics_elected_official_ballotready_person
    description: |
      BR-only person-grain rollup of int__civics_elected_official_ballotready.
      One row per br_candidate_id, populated with the person's latest term
      snapshot. Plays the same role as int__civics_candidate_ballotready in
      the merge (BR-side input to a person-grain mart), but the grain
      mechanics differ: this is a latest-term window over term-grain BR
      data, not a natural person grain.

      Grain: one row per person (br_candidate_id).

      Latest-term ordering: term_start_date desc nulls last,
      term_end_date desc nulls last, updated_at desc, br_office_holder_id
      desc. Term-scoped attributes (candidate_office, office_level,
      office_type, state, city, district, mailing_*, tier,
      party_affiliation) take the latest term's value. Multi-term people
      with cross-term variation:
        - 8,400+ multi-office people
        - 7,300+ multi-office_type people
      Consumers needing per-term accuracy must query elected_official_terms.

      ICP flags (is_win_icp, is_serve_icp, is_win_supersize_icp) are
      intentionally NOT included on this intermediate. Per Hugh's commit
      8c22079, ICP is position-scoped and a latest-term scalar
      misrepresents the data. ICP lives at term grain only
      (int__civics_elected_official_ballotready, elected_official_terms).

      Audit trail: selected_gp_elected_official_term_id and
      selected_br_office_holder_id expose which term row was chosen as
      "latest," so debugging "why this person got office X" doesn't require
      re-running the window logic.

      Vacancy terms (br_candidate_id IS NULL) are filtered out.

    columns:
      - name: gp_elected_official_id
        description: Primary key. Person-grain canonical UUID, sourced from int__civics_elected_official_ballotready.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: br_candidate_id
        description: BallotReady's natural person-level key.
        data_tests:
          - unique
          - not_null

      - name: selected_gp_elected_official_term_id
        description: Audit. The gp_elected_official_term_id of the term row chosen by the latest-term window.
        data_tests:
          - not_null
          - is_uuid

      - name: selected_br_office_holder_id
        description: Audit. BR's br_office_holder_id of the chosen latest term.
        data_tests:
          - not_null

      - name: first_name
        data_tests:
          - not_null

      - name: last_name
        data_tests:
          - not_null

      - name: state
        description: Latest term's U.S. state (2-letter code).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"

      - name: office_level
        description: Latest term's BallotReady PositionLevel.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - City
                  - Local
                  - County
                  - Township
                  - State
                  - Regional
                  - Federal

      - name: party_affiliation
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: tier
        description: BallotReady research tier (1-5) for the latest term's position.

      - name: created_at
        description: Latest term's created_at, not the person's first observed creation time.
        data_tests:
          - not_null

      - name: updated_at
        description: Latest term's updated_at — NOT the person's earliest appearance.
        data_tests:
          - not_null

  - name: int__civics_elected_official_techspeed
    description: >
      TechSpeed office holders transformed into the civics mart
      elected_officials schema.

      Grain: One row per officeholder-position (current snapshot, deduplicated).

      Source: stg_airbyte_source__techspeed_gdrive_officeholders.

    columns:
      - name: gp_elected_official_id
        description: >
          Primary key - internally generated UUID for elected officials.
          Generated from composite key: ts_officeholder_id + position_id +
          office_name_clean to handle source ID collisions.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: ts_officeholder_id
        description: >
          TechSpeed officeholder ID. Not unique — source reuses across
          genuinely different people. Carried for traceability only.
        data_tests:
          - not_null

      - name: ts_position_id
        description: TechSpeed position ID
        data_tests:
          - not_null

      - name: ts_normalized_position_id
        description: TechSpeed normalized position ID

      - name: first_name
        description: Elected official first name
        data_tests:
          - not_null

      - name: last_name
        description: Elected official last name
        data_tests:
          - not_null

      - name: full_name
        description: Concatenated first + last name

      - name: email
        description: >
          Contact email. ~34.6% may be wrong-person (sourced from
          fastpeoplesearch.com lookups). Treat with skepticism.

      - name: phone
        description: Cleaned phone number (punctuation stripped in staging)

      - name: position_name
        description: Raw TechSpeed office name (from office_name field)
        data_tests:
          - not_null

      - name: normalized_position_name
        description: TechSpeed normalized office name (from office_normalized field)

      - name: candidate_office
        description: Office name via initcap(office_normalized), used for display

      - name: state
        description: >
          U.S. state (2-letter code, via clean_states join).
        data_tests:
          - not_null:
              config:
                severity: warn
          - is_state_abbreviation:
              config:
                severity: warn

      - name: city
        description: City from source data

      - name: district
        description: Electoral district name

      - name: office_level
        description: >
          Office level from BallotReady's PositionLevel enum, passed through
          TechSpeed's level field with initcap normalization.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - City
                  - Local
                  - County
                  - Township
                  - State
                  - Regional

      - name: office_type
        description: >
          Normalized office type derived from TechSpeed office_type field
          via a 34-variant case normalization map.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - City Council
                  - Town Council
                  - School Board
                  - Mayor
                  - Judge
                  - Clerk/Treasurer
                  - County Supervisor
                  - Sheriff
                  - State House
                  - State Senate
                  - Surveyor
                  - Attorney
                  - Other

      - name: party_affiliation
        description: Normalized party affiliation via parse_party_affiliation macro
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: is_incumbent
        description: Whether the officeholder is an incumbent (boolean)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_judicial
        description: Whether the position is judicial, derived from source office_type
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_uncontested
        description: Whether the position is uncontested (boolean, may be null)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: mailing_address_line_1
        description: Street address for mailing

      - name: mailing_city
        description: City for mailing address

      - name: mailing_state
        description: State for mailing address (2-letter code)

      - name: mailing_zip
        description: Postal code for mailing address

      - name: tier
        description: TechSpeed tier classification (integer)

      - name: county_municipality
        description: County or municipality from source data

      - name: normalized_location
        description: TechSpeed normalized location string

      - name: ts_status
        description: TechSpeed record status

      - name: candidate_id_source
        description: Source system identifier (always 'techspeed')
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - techspeed

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_elected_official_techspeed_person
    description: |
      TS-side person-grain rollup. Adopts BR canonical IDs via
      int__civics_elected_official_canonical_ids, suppresses reused-ID
      contamination, rolls up phone/email per-field (FIRST_VALUE IGNORE
      NULLS), and detects is_incumbent conflicts at canonical grain.
      Consumed by the elected_officials person mart in a full-outer-join +
      coalesce against int__civics_elected_official_ballotready_person.

      Grain: one row per canonical_gp_elected_official_id. PR #333 data:
      27,827 rows. Canonicals whose TS contributions are entirely from
      reused ts_officeholder_ids (53 in PR #333 data) are EXCLUDED — no
      clean TS rows means no TS contribution, and the person mart's
      full-outer-join correctly yields BR-only.

      Reused-ID suppression: 86 IDs flagged in the crosswalk;
        - 53 reused-only canonicals dropped entirely
        - For canonicals with both reused and clean rows, reused rows are
          suppressed; clean rows still contribute via per-field rollup
        - Per-field rollup preserves: 107 phones (across 908 multi-phone
          canonicals) and 1,097 emails (across 210 multi-email canonicals)
          vs single-row dedup

      Conflict handling: when contributing TS rows disagree on is_incumbent
      for a canonical (350 affected canonicals in PR #333 data), the value
      is NULL'd and ts_incumbent_conflict is set true.

      TS-only fallback is unsolved (zero rows today). The unmatched-TS
      singular test on the crosswalk blocks the build if any appear.

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(not ts_incumbent_conflict) or (is_incumbent is null)"

    columns:
      - name: gp_elected_official_id
        description: Primary key. Canonical person-grain UUID, adopted from int__civics_elected_official_canonical_ids.
        data_tests:
          - unique
          - not_null
          - is_uuid
          - relationships:
              arguments:
                to: ref('int__civics_elected_official_ballotready_person')
                field: gp_elected_official_id

      - name: br_candidate_id
        description: BallotReady's natural person-level key (via crosswalk).
        data_tests:
          - unique
          - not_null

      - name: selected_ts_officeholder_id
        description: Audit. The ts_officeholder_id of the TS row chosen as latest non-reused.
        data_tests:
          - not_null

      - name: selected_ts_position_id
        description: Audit. The ts_position_id of the chosen TS row.

      - name: selected_gp_elected_official_term_id
        description: Audit. BR term UUID that the selected TS row matched deterministically.
        data_tests:
          - not_null
          - is_uuid

      - name: selected_br_office_holder_id
        description: Audit. BR's br_office_holder_id of the matched term.
        data_tests:
          - not_null

      - name: phone
        description: Per-field FIRST_VALUE IGNORE NULLS rollup of TS phone across all non-reused contributing rows.

      - name: email
        description: Per-field FIRST_VALUE IGNORE NULLS rollup of TS email across all non-reused contributing rows.

      - name: is_incumbent
        description: TS-derived incumbency. NULL when contributing rows for this canonical disagree (see ts_incumbent_conflict). NULL when no non-NULL value contributed.

      - name: ts_incumbent_conflict
        description: True when at least two non-reused contributing TS rows for this canonical disagreed on is_incumbent.
        data_tests:
          - not_null

      - name: state
        description: U.S. state from latest non-reused TS row.
        data_tests:
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"

      - name: party_affiliation
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: created_at
        description: Latest non-reused TS row's created_at.
        data_tests:
          - not_null

      - name: updated_at
        description: Latest non-reused TS row's updated_at.
        data_tests:
          - not_null

  - name: int__er_prematch_candidacy_stages
    description: >
      Entity resolution prematch table: BallotReady x TechSpeed x DDHQ x
      GP API candidacy-stages unioned into a standardized schema for
      Splink probabilistic matching.

      Grain: One row per source candidacy-stage record (candidate + office + election date).
      GP API contributes one row per latest-version pledged campaign;
      BR/TS/DDHQ each contribute one row per (candidate, race/stage).

      Sources: stg_airbyte_source__ballotready_s3_candidacies_v3 (BR staging),
      stg_airbyte_source__techspeed_gdrive_candidates (TS),
      stg_airbyte_source__ddhq_gdrive_election_results (DDHQ),
      campaigns mart (GP API). The gp_api side resolves election_stage and
      br_race_id deterministically from PD's pledged ballotready_race_id
      against BR's race spine (~94% coverage); both fields are null for the
      ~6% of campaigns where PD didn't set raceId.

    columns:
      - name: unique_id
        description: >
          Primary key for Splink — source_name || '|' || source_id.
          Guaranteed unique across all sources.
        data_tests:
          - unique
          - not_null

      - name: source_name
        description: Origin of the record ('ballotready', 'techspeed', 'ddhq', or 'gp_api')
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ballotready
                  - techspeed
                  - ddhq
                  - gp_api

      - name: source_id
        description: >
          Source-specific identifier. BR: br_candidacy_id; TS: techspeed_candidate_code;
          DDHQ: candidate_id_race_id; GP API: campaign_id (one row per
          latest-version campaign).
        data_tests:
          - not_null

      - name: first_name
        description: Candidate first name (lowercased, trimmed)
        data_tests:
          - not_null

      - name: first_name_tokens
        description: >
          Array of >=2-char first-name tokens (split on non-letter characters)
          for Splink ArrayIntersectLevel. Lets compound first names overlap on a
          shared given name (e.g. "charles kirk" vs "charles"). Consumed by the
          matcha first-name comparison; keep first_name_tokens macro in sync.

      - name: last_name
        description: Candidate last name (lowercased, trimmed)
        data_tests:
          - not_null

      - name: state
        description: U.S. state (2-letter code)
        data_tests:
          - not_null
          - is_state_abbreviation:
              config:
                severity: warn

      - name: election_date
        description: Election date for this candidacy-stage
        data_tests:
          - not_null

      - name: election_stage
        description: >
          Type of election stage. Values: Primary, General,
          Primary Runoff, General Runoff, Primary Special, General Special,
          Primary Special Runoff, General Special Runoff. GP API resolves
          this from PD's ballotready_race_id against BR's race spine; null
          when PD didn't set raceId (~6% of in-scope campaigns).
        data_tests:
          - not_null:
              config:
                where: "source_name != 'gp_api'"
          - accepted_values:
              arguments:
                values:
                  - Primary
                  - General
                  - Primary Runoff
                  - General Runoff
                  - Primary Special
                  - General Special
                  - Primary Special Runoff
                  - General Special Runoff

      - name: office_level
        description: >
          Normalized office level matching BallotReady's 7-bucket PositionLevel
          taxonomy (City/Local/County/Township/State/Regional/Federal). BR and
          TS sources emit initcap(level) directly. The gp-api source prefers
          initcap(br_position_level) when available (deterministic left-join
          on ballotready_position_id to BR's position table; coverage is
          near-100% since gp-api rows carry that FK natively). Otherwise
          falls back to campaigns.election_level which collapses to a
          4-bucket subset (Local/County/State/Federal — City/Town/Township
          are not distinguishable at gp-api granularity). DDHQ emits a
          3-value subset (Local/County/State) from race_name parsing. Null
          is permitted for sources that cannot resolve a level.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - City
                  - Local
                  - County
                  - Township
                  - State
                  - Regional
                  - Federal

  - name: int__er_prematch_elected_officials
    description: >
      Entity resolution prematch table at term grain. Two sources:
      ballotready_techspeed (BR term LEFT JOIN canonical_ids LEFT JOIN raw TS
      with reused-ID guard inside the TS join clause) and gp_api (with raw
      campaign_office_raw for official_office_name and district extraction).

      Grain: One row per BR office-holder term (BR+TS source) / one row per
      gp-api elected_office row (gp_api source).

      Sources: int__civics_elected_official_ballotready (BR term),
      int__civics_elected_official_canonical_ids (crosswalk),
      int__civics_elected_official_techspeed (raw TS),
      int__civics_elected_official_gp_api (gp-api), with nicknames seed for
      first_name alias arrays.

      Unlike the candidacy prematch, elected officials have no election_date
      or br_race_id. Splink blocking anchors on state + office name + last
      name and contact info (phone, email).

    tests:
      - dbt_utils.expression_is_true:
          name: er_prematch_eo_has_ballotready_techspeed_source
          arguments:
            expression: "(select count(*) from {{ ref('int__er_prematch_elected_officials') }} where source_name = 'ballotready_techspeed') > 0"

    columns:
      - name: unique_id
        description: >
          Primary key for Splink — source_name || '|' || source_id.
          Guaranteed unique across all sources.
        data_tests:
          - unique
          - not_null

      - name: source_name
        description: >
          Origin of the record. Phase 1 broadens to old + new values
          ('ballotready', 'techspeed', 'ballotready_techspeed', 'gp_api');
          Phase 2 follow-up tightens to the new values only.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ballotready
                  - techspeed
                  - ballotready_techspeed
                  - gp_api

      - name: source_id
        description: >
          Source-specific identifier. BR+TS: br_office_holder_id (string);
          gp_api: gp_api_elected_office_id (string).
        data_tests:
          - not_null

      - name: first_name
        description: Official first name (lowercased, trimmed; blank names filtered out)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "!= ''"


      - name: first_name_tokens
        description: >
          Array of >=2-char first-name tokens (split on non-letter characters)
          for Splink ArrayIntersectLevel. Lets compound first names overlap on a
          shared given name (e.g. "charles kirk" vs "charles"). Consumed by the
          matcha first-name comparison; keep first_name_tokens macro in sync.

      - name: last_name
        description: Official last name (lowercased, trimmed; blank names filtered out)
        data_tests:
          - not_null
          - dbt_utils.expression_is_true:
              arguments:
                expression: "!= ''"

      - name: state
        description: U.S. state (2-letter code)
        data_tests:
          - not_null
          - is_state_abbreviation

      - name: ballotready_position_id
        description: >
          BR position FK. Populated when the BR side has br_position_id or
          gp-api side has the upstream campaigns FK (campaigns.ballotready_position_id).

      - name: official_office_name
        description: >
          Lowered + trimmed + nullif of position_name for BR+TS;
          lowered + trimmed + nullif of raw campaign_office_raw for gp-api
          (preserves seat/district context).

  - name: int__er_prematch_election_stages
    description: >
      Entity resolution prematch input for the matcha election_stage entity
      type. Unions BR / DDHQ / TS race-level records into a standardized
      schema for Splink matching. One row per source race record.

      Grain: One row per source race record (election stage).

      Sources: int__civics_election_stage_ballotready (BR, joined to BR
      position staging for state), int__civics_election_stage_ddhq (DDHQ;
      ddhq_race_id can repeat across stages, so source_id uses
      gp_election_stage_id), int__civics_election_stage_techspeed (TS; state
      extracted from race_name's `STATE ` prefix).

      ballotready_position_id is NULL on the DDHQ and TS branches in V1.
      DDHQ has no native BR position FK, and resolving it requires the
      election_stage ER clusters that this view itself seeds; revisit once
      int__civics_er_canonical_election_stages exists.

      first_name_aliases is emitted as an empty array because matcha's
      shared pipeline.load_and_prepare unconditionally reads the column even
      though election_stage has no person fields.

      Output of matcha lands at
      goodparty_data_catalog.er_source.er_clustered_election_stages and is
      consumed by int__civics_er_canonical_election_stages in a follow-up PR.

    columns:
      - name: unique_id
        description: >
          Primary key for Splink — source_name || '|' || source_id.
          Guaranteed unique across all sources.
        data_tests:
          - unique
          - not_null

      - name: source_name
        description: Origin of the record ('ballotready', 'ddhq', or 'techspeed').
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - ballotready
                  - ddhq
                  - techspeed

      - name: source_id
        description: >
          Source-specific identifier. BR: br_race_id; DDHQ:
          gp_election_stage_id (not ddhq_race_id; see model docstring);
          TS: gp_election_stage_id.
        data_tests:
          - not_null

      - name: state
        description: U.S. state (2-letter code)
        data_tests:
          - not_null
          - is_state_abbreviation:
              config:
                severity: warn

      - name: election_date
        description: Election date for this election stage.
        data_tests:
          - not_null

      - name: election_stage
        description: >
          Stage type. Values: primary, general, primary runoff, general
          runoff, primary special, general special, primary special runoff,
          general special runoff. Lowercased per upstream stage_type.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - primary
                  - general
                  - primary runoff
                  - general runoff
                  - primary special
                  - general special
                  - primary special runoff
                  - general special runoff

      - name: is_special
        description: >
          Whether this is a special election. Native on BR; derived from
          stage_type LIKE '%special%' on DDHQ; always false on TS (TS does
          not surface special-election flags).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: official_office_name
        description: >
          Lowercased + trimmed race_name from each upstream model. Each
          source constructs race_name with a 2-letter state prefix, so the
          prefix is left intact for cross-source comparability.

      - name: ballotready_position_id
        description: >
          BR position FK. Populated for BR rows; NULL for DDHQ and TS in V1.

      - name: br_race_id
        description: BR race FK as int. Populated for BR rows only.

  - name: int__civics_election_ballotready
    description: >
      BallotReady elections transformed into civics mart election schema.

      Grain: One row per election (position + election date).

      Source: Rolled up from int__civics_election_stage_ballotready, which
      sources from BallotReady API race, election, and position tables.

    columns:
      - name: gp_election_id
        description: Primary key - internally generated unique identifier for elections
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: election_date
        description: Date of the election
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'2026-01-01'"
                max_value: "'2050-12-31'"

      - name: election_year
        description: Year of the election
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 2026
                max_value: 2050

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_election_stage_ballotready
    description: >
      BallotReady election stages transformed into civics mart election_stage schema.

      Grain: One row per election stage (position + election + stage type).

      Source: BallotReady API race, election, and position tables (2026+ elections).
      This model is the foundation for int__civics_election_ballotready, which
      rolls up stages into elections.

    columns:
      - name: gp_election_stage_id
        description: Primary key - internally generated unique identifier for election stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_election_id
        description: Foreign key to election table (referential integrity guaranteed by the election model rolling up from this model)
        data_tests:
          - not_null

      - name: br_race_id
        description: BallotReady race ID (maps to election stage concept)
        data_tests:
          - not_null

      - name: br_election_id
        description: BallotReady election ID

      - name: br_position_id
        description: BallotReady position ID (used for ICP join)

      - name: stage_type
        description: Type of election stage
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - general
                  - primary
                  - primary runoff
                  - general runoff
                  - primary special
                  - general special
                  - primary special runoff
                  - general special runoff

      - name: election_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'2026-01-01'"
                max_value: "'2050-12-31'"

      - name: election_name
        description: >
          Overarching election event name from BallotReady (e.g., "Illinois Primary Election").
          Describes the election event, not the specific race/office.

      - name: race_name
        description: >
          Office-specific label constructed from BallotReady position fields
          (e.g., "IL Franklin County Board - Full Term"). Analogous to DDHQ race name.

      - name: is_primary
        description: Whether this stage is a primary election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_runoff
        description: Whether this stage is a runoff election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_special
        description: >
          Whether this stage belongs to a special election (vacancy fill).
          Derived from the BallotReady election.name containing 'special'.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_retention
        description: Whether this stage is a retention election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: number_of_seats
        description: Number of seats available for this race

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_candidacy_stage_ballotready
    description: >
      BallotReady candidacy stages transformed into civics mart candidacy_stage schema.

      Grain: One row per candidacy stage (each BallotReady S3 candidacy row is a stage).

      Source: stg_airbyte_source__ballotready_s3_candidacies_v3 (2026+ elections).

    columns:
      - name: gp_candidacy_stage_id
        description: Primary key - internally generated unique identifier for candidacy stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidacy_id
        description: Foreign key to candidacy table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidacy_ballotready')
                field: gp_candidacy_id

      - name: gp_election_stage_id
        description: Foreign key to election_stage table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_election_stage_ballotready')
                field: gp_election_stage_id
              config:
                error_if: ">=100"

      - name: br_candidacy_id
        description: >
          BallotReady's native candidacy stage ID. Asserts every raw BR record
          surfaces in the candidacy_stage mart with 'ballotready' in
          source_systems (the mart populates this column only when BR is in
          the cluster, so a value's presence implies the source tag).
        data_tests:
          - relationships:
              # Warn-severity: when a Splink cluster contains multiple BR
              # records (rare but real — e.g., two BR ingestions for the
              # same candidacy_stage), the cluster-merge in candidacy_stage
              # collapses them to one mart row and only one br_candidacy_id
              # carries through. The others are dropped from the mart by
              # design. ~7-40 such rows depending on BR ingestion state;
              # error_if=">100" guards against true regressions.
              arguments:
                to: ref('candidacy_stage')
                field: br_candidacy_id
              config:
                severity: warn
                error_if: ">100"

      - name: election_result
        description: Result of the election stage (Won, Lost, Runoff, or null)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Won
                  - Lost
                  - Runoff

      - name: is_winner
        description: Whether the candidate won the election stage
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - true
                  - false

      - name: election_stage_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'2026-01-01'"
                max_value: "'2050-12-31'"

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_position_office_type
    description: >
      One row per BallotReady position with the canonical office_type, derived
      from the normalized position name (DATA-1972). Source of office_type for
      positioned candidacies in the civics marts.
    columns:
      - name: br_position_database_id
        description: BallotReady position database id (grain).
        data_tests:
          - not_null
          - unique
      - name: office_type
        description: Canonical office_type for the position (map_office_type output).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - Alderman
                  - Attorney
                  - City Council
                  - Clerk/Treasurer
                  - Congressional
                  - County Supervisor
                  - Judge
                  - Mayor
                  - President
                  - School Board
                  - Sheriff
                  - State House
                  - State Senate
                  - Statewide/Governor
                  - Town Council
                  - Other
      - name: is_office_type_fallback
        description: >
          True when no candidate_office could be derived for the position (no
          normalized position name available and no position-name pattern
          matched), making office_type the NULL-input fallback 'Other' rather
          than a real classification. True rows mean the incremental
          normalized-position model is lagging the position universe; the mart
          coalesce already prevents fallback 'Other' from overriding per-source
          values.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - false
              config:
                severity: warn

  - name: int__civics_candidate_gp_api
    description: >
      Product Database (gp_api_db) users transformed into the civics mart
      candidate schema. Grain: one row per user with campaign_count > 0.

      ER canonicalization: canonical_gp_candidate_id from
      int__civics_er_canonical_ids is looked up via the user's latest campaigns
      and propagated across users sharing the same person hash.

    columns:
      - name: gp_candidate_id
        description: >
          Primary key - UUID generated from (first_name, last_name, state,
          null birth_date, email, phone). Cross-source compatible with
          int__civics_candidate_ballotready / _techspeed.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: prod_db_user_id
        description: Product DB user.id
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('candidate')
                field: prod_db_user_id
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">100"

      - name: first_name
        data_tests:
          - not_null

      - name: last_name
        data_tests:
          - not_null

      - name: email
        data_tests:
          - not_null

      - name: state
        description: >
          Most recent non-demo campaign's campaign_state. Null for users whose
          only campaigns are demo — these users are still surfaced as
          candidates (no not_null test: null is by design and a
          warning that always fires is noise).
          accepted_values mirrors int__civics_elected_official_ballotready and
          includes 'US' as a known-bad value present in source, so
          the test only fails when a genuinely new invalid code appears.
        data_tests:
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          name: gp_api_candidate_updated_ge_created
          arguments:
            expression: "updated_at >= created_at"

  - name: int__civics_candidacy_gp_api
    description: >
      Product Database campaigns transformed into the civics mart candidacy
      schema. Grain: one row per latest-version campaign with a non-null
      election_date.

      gp_candidate_id uses the user's derived state (most recent non-demo
      campaign), not the per-campaign state, so users with campaigns in
      multiple states (or demo-only users with null user_state) keep
      referential integrity to int__civics_candidate_gp_api.

    columns:
      - name: gp_candidacy_id
        description: Primary key
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidate_id
        description: Foreign key to int__civics_candidate_gp_api
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidate_gp_api')
                field: gp_candidate_id

      - name: gp_election_id
        data_tests:
          - not_null

      - name: product_campaign_id
        description: Product DB campaign.id (latest version)
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('candidacy')
                field: product_campaign_id
              config:
                severity: warn
                warn_if: ">0"
                error_if: ">100"

      - name: candidate_id_source
        data_tests:
          - accepted_values:
              arguments:
                values: ["gp_api"]

      - name: office_level
        description: >
          Source-faithful Product DB election_level. Raw values are
          {city, county, federal, state}; mart-layer union normalizes to the
          cross-source enum (Local/County/Township/State/Regional/Federal).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - city
                  - county
                  - federal
                  - state

      - name: candidacy_result
        description: "Won if did_win, else null. Under-populated in source."
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Won

      - name: is_verified
        data_tests:
          - not_null

      - name: party_affiliation
        description: Normalized party affiliation via parse_party_affiliation macro
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: is_partisan
        description: >
          Race-level partisan flag, derived from Product DB's
          details:partisanType (exposed as campaigns.partisan_type).
          Matches BR (br_position.is_partisan) and TS (ts.partisan) semantics:
          true when the race itself is partisan, false when nonpartisan,
          null when unknown.

      - name: general_election_date
        description: >
          Sourced from BR's stage spine via br_stage_spine_lookup keyed on
          (ballotready_position_id, election_year). Replaces the prior
          campaign.election_date carry-through; deterministically equals
          BR's general-stage date for the campaign's race.
        data_tests:
          - not_null

      - name: primary_election_date
        description: BR's primary-stage date for the campaign's race.

      - name: primary_runoff_election_date
        description: BR's primary-runoff-stage date for the campaign's race.

      - name: general_runoff_election_date
        description: BR's general-runoff-stage date for the campaign's race.

      - name: is_demo
        data_tests:
          - not_null

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          name: gp_api_candidacy_updated_ge_created
          arguments:
            expression: "updated_at >= created_at"

  - name: int__civics_candidacy_stage_gp_api
    description: >
      Product Database campaigns × BR election_stage rows for same position+year.
      Grain: one row per (campaign × BR election_stage). Campaigns without a
      ballotready_position_id or without a matching BR stage are dropped.

      Stage-level election results (is_winner, election_result, votes_received)
      are null — Product DB's did_win is candidacy-grain, not stage-grain.

    columns:
      - name: gp_candidacy_stage_id
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidacy_id
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('int__civics_candidacy_gp_api')
                field: gp_candidacy_id

      - name: gp_election_stage_id
        data_tests:
          - not_null
          - relationships:
              # gp_api candidacy_stages adopt BR's natural gp_election_stage_id
              # (Task 1 filter ensures ballotready_position_id), so this FK
              # always holds against BR's spine.
              arguments:
                to: ref('int__civics_election_stage_ballotready')
                field: gp_election_stage_id

      - name: has_match
        description: No DDHQ matching for gp_api — always false.
        data_tests:
          - accepted_values:
              arguments:
                values: [false]

      - name: election_stage_date
        description: >
          Product DB's view of the stage date — the campaign's election_date
          carried through. Stays source-faithful even when ER maps
          gp_election_stage_id to a BR canonical with a different date.
        data_tests:
          - not_null

      - name: br_election_stage_date
        description: >
          BR's view of the canonical stage's election_date when
          gp_election_stage_id was adopted from ER. Null when ER didn't
          match. Pair with election_stage_date to surface PD-vs-BR
          divergence without re-resolving the canonical stage downstream.

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          name: gp_api_candidacy_stage_updated_ge_created
          arguments:
            expression: "updated_at >= created_at"

  - name: int__civics_elected_official_gp_api
    description: >
      Product Database elected offices transformed into the civics mart
      elected_officials schema. Grain: one row per gp_api_db_elected_office
      row whose campaign_id resolves in the campaigns mart (orphans filtered).

      Sourced from gp_api_db_elected_office (authoritative) — campaigns.did_win
      is stale for most winning campaigns.

    columns:
      - name: gp_elected_official_id
        description: UUID generated from ('gp_api_elected_office', elected_office.id).
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_api_elected_office_id
        description: Product DB elected_office.id
        data_tests:
          - unique
          - not_null

      - name: gp_api_user_id
        data_tests:
          - not_null

      - name: gp_api_campaign_id
        data_tests:
          - not_null

      - name: state
        data_tests:
          - not_null

      - name: candidate_id_source
        data_tests:
          - accepted_values:
              arguments:
                values: ["gp_api"]

      - name: office_level
        description: >
          Normalized office level matching BallotReady's 7-bucket PositionLevel
          taxonomy (City/Local/County/Township/State/Regional/Federal). For the
          ~84% of gp-api EO rows with a BR position FK, this is initcap of
          br_position.level (mirrors int__civics_elected_official_ballotready).
          For the ~16% without a position FK, falls back to campaigns.election_level
          which collapses to a 4-bucket subset (Local/County/State/Federal —
          City/Town/Township are not distinguishable at gp-api granularity).
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - City
                  - Local
                  - County
                  - Township
                  - State
                  - Regional
                  - Federal

      - name: party_affiliation
        description: Normalized party affiliation via parse_party_affiliation macro
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - Independent
                  - Nonpartisan
                  - Democrat
                  - Republican
                  - Libertarian
                  - Green
                  - Other

      - name: ballotready_position_id
        description: BR position FK from upstream campaigns mart. Populated for ~84% of gp-api EO rows.

      - name: normalized_position_name
        description: Normalized BR position name from campaigns; feeds candidate_office derivation.

      - name: br_position_level
        description: BR position level (city/county/state/federal) from BR API position table; used as office_level fallback.

      - name: campaign_office_raw
        description: >
          Raw campaign_office text preserved for downstream district extraction
          and official_office_name. Not normalized. Nullable (some campaigns
          lack a campaign_office; the prematch filters these at its own gp_api
          source CTE, mirroring candidacy line 266).

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

  - name: int__civics_elected_official_gp_api_bridge
    description: |
      Term-grain bridge from gp-api elected_office records to BR+TS terms,
      derived from the EO Splink cluster output. One row per gp_api
      elected_office record (deduped); also unique on br_office_holder_id
      after pass-2 collision suppression.

      The bridge resolves two ambiguities:
      1. Multi-term: when a gp_api record's Splink cluster contains more
         than one BR term, pass 1 picks the BR term whose term_start_date
         is closest to gp_api sworn_in_date.
      2. Bridge collision: when two gp_api records in the same Splink
         cluster pick the same BR term as their best match, pass 2 keeps
         the closer of the two; the loser falls back to a self-key in the
         person rollup and appears as a gp_api-only mart row. The bridge
         collision audit custom SQL test reports the dropped count.

      `hubspot_company_id` is sourced from `campaigns.hubspot_id` via
      `gp_api_campaign_id` join; deliberate alias of `hubspot_id` to make
      CRM linkage clearer at the term/campaign grain.

    tests:
      # Bridge attach to BR person rollup must not orphan. If
      # bridge.br_candidate_id is missing from
      # int__civics_elected_official_ballotready_person, the gp_api person
      # rollup silently self-keys instead of adopting BR canonical.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "not exists (select 1 from {{ ref('int__civics_elected_official_gp_api_bridge') }} b left join {{ ref('int__civics_elected_official_ballotready_person') }} p on p.br_candidate_id = b.br_candidate_id where p.br_candidate_id is null)"
          name: bridge_br_candidate_resolves_to_br_person
          config:
            severity: error

    columns:
      - name: gp_api_elected_office_id
        description: gp-api elected_office UUID; primary key of the bridge.
        data_tests:
          - not_null
          - unique
      - name: br_office_holder_id
        description: BR office holder ID of the chosen BR term.
        data_tests:
          - not_null
          - unique
      - name: cluster_id
        description: Splink cluster_id from the EO ER pipeline output.
        data_tests:
          - not_null
      - name: gp_api_user_id
        description: gp-api product user ID.
      - name: gp_api_campaign_id
        description: gp-api product campaign ID.
      - name: gp_api_organization_slug
        description: gp-api product organization slug.
      - name: br_candidate_id
        description: BR candidate ID (person-grain) of the chosen BR term.
      - name: ts_officeholder_id
        description: TS officeholder ID if the chosen BR term has a TS match.
      - name: br_term_start_date
        description: term_start_date of the chosen BR term.
      - name: sworn_in_date
        description: sworn_in_date from gp-api (term_start_date in cluster output).
      - name: days_to_sworn_in
        description: |
          abs(datediff(br_term_start_date, sworn_in_date)) — the metric that
          drove pass-1 selection. Audit column for monitoring tiebreaker
          quality. NULL when either date is NULL.
      - name: hubspot_company_id
        description: HubSpot company ID for the matched campaign (alias of campaigns.hubspot_id).

  - name: int__civics_elected_official_gp_api_person
    description: |
      Person-grain rollup of gp-api elected officials. One row per
      gp_api_user_id. Adopts BR's gp_elected_official_id via the bridge
      for matched users (so the mart's 3-way FOJ on gp_elected_official_id
      collapses correctly). Unmatched users get a salted UUID specific to
      gp_api ('elected_official_gp_api_user' salt) so they don't collide
      with BR/TS canonical IDs.

      `hubspot_contact_id` is renamed and cast in staging
      (`stg_airbyte_source__gp_api_db_user`).

    tests:
      # Canonical uniqueness on adopted BR canonicals. Catches the
      # multi-gp_api-adopting-same-BR-person failure mode that bridge term
      # uniqueness alone does not catch (e.g., two gp_api users bridging
      # to two different terms of the same BR person).
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(distinct gp_elected_official_id) from {{ ref('int__civics_elected_official_gp_api_person') }} where bridge_br_office_holder_id is not null) = (select count(*) from {{ ref('int__civics_elected_official_gp_api_person') }} where bridge_br_office_holder_id is not null)"
          name: gp_api_person_no_two_users_share_adopted_canonical
          config:
            severity: error

    columns:
      - name: gp_elected_official_id
        description: |
          Canonical person UUID. For bridge-matched users, equals BR's
          gp_elected_official_id (adopted via the bridge). For unmatched
          users, a salted UUID with 'elected_official_gp_api_user' prefix
          to prevent accidental collision with BR/TS canonicals.
        data_tests:
          - not_null
      - name: gp_api_user_id
        description: gp-api product user ID; primary key.
        data_tests:
          - not_null
          - unique
      - name: selected_gp_api_elected_office_id
        description: Audit. Which gp_api elected_office record won the latest-per-user rollup.
      - name: selected_gp_api_campaign_id
        description: Audit. gp-api campaign ID for the selected elected_office.
      - name: selected_gp_api_organization_slug
        description: Audit. gp-api organization slug for the selected elected_office.
      - name: first_name
        description: User's first name from gp-api (used for gp_api-only mart rows).
      - name: last_name
        description: User's last name from gp-api.
      - name: full_name
        description: User's full name from gp-api.
      - name: email
        description: User's email from gp-api (exposed on mart as gp_api_email).
      - name: phone
        description: User's phone from gp-api (exposed on mart as gp_api_phone).
      - name: gp_api_party_affiliation
        description: |
          Raw user-input party affiliation from gp-api. Sparse — feeds the
          canonical party_affiliation chain on the mart but also exposed
          separately as audit.
      - name: candidate_office
        description: Office name from gp-api (user-entered, may be NULL).
      - name: office_level
        description: Office level from gp-api (user-entered, may be NULL).
      - name: office_type
        description: Office type derived from candidate_office via the map_office_type macro.
      - name: state
        description: State from gp-api.
      - name: term_start_date
        description: gp_api sworn_in_date.
      - name: hubspot_contact_id
        description: HubSpot contact ID for the user (from raw gp_api_db_user metadata).
      - name: created_at
      - name: updated_at
      - name: er_cluster_id
        description: Splink cluster_id from the bridge match (NULL when unmatched).
      - name: bridge_br_office_holder_id
        description: BR office holder ID adopted via the bridge (NULL when unmatched).
      - name: bridge_br_candidate_id
        description: BR candidate ID adopted via the bridge (NULL when unmatched).

  - name: int__civics_er_canonical_ids
    description: >
      Entity resolution crosswalk: provider raw keys → BallotReady canonical
      gp_* IDs. Wide schema covering TechSpeed (keyed by ts_source_candidate_id
      + ts_stage_election_date) and Product DB (keyed by gp_api_campaign_id +
      gp_api_stage_election_date). Provider columns are null on rows from
      other providers.

    columns:
      - name: canonical_gp_candidate_id
        data_tests:
          - not_null

      - name: canonical_gp_candidacy_id
        data_tests:
          - not_null

      - name: canonical_gp_candidacy_stage_id
        description: >
          BR-anchored canonical for stage grain. NULL for non-BR cluster
          rows (those rely on the cluster_id-based FOJ in candidacy_stage
          mart, not canonical-id merging).

      - name: canonical_gp_election_stage_id
        description: >
          BR-anchored canonical for election_stage grain. NULL for non-BR
          cluster rows — TS/DDHQ election_stage int models fall back to
          their natural hashes there, which align with BR's natural id
          when BR has the race independently.

      - name: canonical_gp_election_id
        description: >
          BR-anchored canonical for election grain. NULL for non-BR cluster
          rows — same rationale as canonical_gp_election_stage_id above.

    tests:
      - dbt_utils.unique_combination_of_columns:
          name: ts_key_unique_in_crosswalk
          arguments:
            combination_of_columns:
              - ts_source_candidate_id
              - ts_stage_election_date
          config:
            where: "ts_source_candidate_id is not null"

      - dbt_utils.unique_combination_of_columns:
          name: gp_api_key_unique_in_crosswalk
          arguments:
            combination_of_columns:
              - gp_api_campaign_id
              - gp_api_stage_election_date
          config:
            where: "gp_api_campaign_id is not null"

  - name: int__civics_er_canonical_election_stages
    description: >
      Direct election-stage ER crosswalk: maps DDHQ / TechSpeed election stages
      that clustered with a BallotReady race (gp-data-matcha election_stage
      entity) to BR's canonical gp_election_stage_id. Broader race-level coverage
      than int__civics_er_canonical_ids's candidacy-derived
      canonical_gp_election_stage_id (links races even without a matched
      candidacy). BR-anchored clusters adopt BR's id; non-BR cross-source
      clusters (DDHQ <-> TS, no BR member) adopt a representative member's id so
      they still collapse. Single-record clusters keep their natural id.

      Grain: one row per non-BR provider election stage (source_name +
      gp_election_stage_id). Note: DDHQ and TS can share a natural
      gp_election_stage_id for the same race, so the id is unique only within a
      source. A small number (~41) of such shared ids map to different BR
      canonicals (the matcher anchored the DDHQ vs TS record to different BR
      races); consumers join per-source so the mapping stays deterministic.
    columns:
      - name: source_name
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["ddhq", "techspeed"]
      - name: gp_election_stage_id
        description: The provider's own gp_election_stage_id (the matched non-BR record).
        data_tests:
          - not_null
      - name: canonical_gp_election_stage_id
        description: BR's gp_election_stage_id for the cluster; consumers coalesce against this.
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns: [source_name, gp_election_stage_id]

  - name: int__serve_active_user
    description: >
      The single source of truth for the "active serve user" behavioral
      definition (epic DATA-1359), one row per user. A user is an active serve
      user when they completed Serve onboarding by sending an SMS poll AND have
      pledged. This is the behavioral half of the People Served cohort; the office
      half (Serve-ICP) and the internal-email exclusion are applied at
      int__serve_district_resolution, where the office and owner email live. Reads
      staging + intermediate only (never an analytics mart) so the cohort flag it
      feeds stays below the analytics layer, with no dependency cycle into
      int__serve_block_coverage. "Pledged" is any pledged campaign from
      source-staging campaigns, which on the serve cohort is identical to the
      stricter "latest candidacy pledged" notion (proven: zero membership delta).
    columns:
      - name: user_id
        description: Product-DB user id (primary key).
        data_tests:
          - unique
          - not_null
      - name: has_sent_sms_poll
        description: >
          Sent at least one 'Serve Onboarding - SMS Poll Sent' event (the final
          onboarding step), from int__amplitude_user_milestones.
        data_tests:
          - not_null
      - name: has_pledged
        description: >
          Owns at least one pledged campaign (details:pledged) in source-staging
          campaigns.
        data_tests:
          - not_null
      - name: is_active_serve_user
        description: >
          has_sent_sms_poll AND has_pledged: the behavioral gate of the People
          Served active cohort (combined with Serve-ICP and non-internal email
          downstream at the resolver).
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          name: serve_active_user_flag_matches_components
          arguments:
            expression: "is_active_serve_user = (has_sent_sms_poll and has_pledged)"

  - name: int__serve_district_resolution
    description: >
      Resolves each serve org to its L2 district: the serve-cohort entry point
      onto the District/Census substrate (a downstream consumer; election-api
      quarantined here, not in the substrate). Part of the Constituents Served
      pipeline
      (DATA-1988, epic DATA-1359). One row per serve org (organizations mart,
      organization_type = 'serve'), resolved to the L2 district the official
      serves: override-first through the org's election-api district record
      (coalesce(override_district_id, district_id), which bakes in the manual
      override corrections), with the LLM position->district crosswalk as
      fallback. Carries the snapshot-stable normalized district join key (L2
      names drift between snapshots), the resolution path, and guardrail
      flags: requires_review (deterministic container-mismatch rules),
      is_geo_seat (the jurisdiction-vs-electoral-seat semantics question),
      is_statewide (reported separately downstream), and is_internal_email.
      Rows are never excluded here; pending cohort decisions are var-driven
      filters plus flags, and flagged rows flow through for downstream review.
      Carries in_people_served_cohort (epic DATA-1359): the active People Served
      cohort gate -- active serve user (int__serve_active_user) AND Serve-ICP
      office (int__icp_offices, a unique join) AND not internal email -- as a flag,
      never a row exclusion.
    columns:
      - name: organization_slug
        description: Serve org identifier (primary key)
        data_tests:
          - unique
          - not_null
      - name: user_id
        description: Owning user of the serve org
        data_tests:
          - not_null
      - name: elected_office_id
        description: >
          The org's elected office record (its existence is what makes the
          org a serve org)
        data_tests:
          - not_null
      - name: ballotready_position_id
        description: BallotReady position id, when the org has a linked position
      - name: position_name
        description: Position title from the linked election-api position
      - name: custom_position_name
        description: Free-text position title entered in the product
      - name: district_id
        description: >
          The election-api district id the org resolves through
          (override_district_id when present, else the position's district)
      - name: resolution_path
        description: Which leg resolved the org to a district
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["district_mart", "crosswalk", "unresolved"]
      - name: state
        description: >
          Two-letter state code of the resolved district. Sourced from the
          district row (or crosswalk row), never from the org's
          position_state, which is null for override-only orgs.
        data_tests:
          - not_null:
              config:
                where: "resolution_path != 'unresolved'"
      - name: l2_district_type
        description: >
          L2 district-type column name. 'State' is a synthetic type for
          statewide offices; every other value, including 'Other', is a real
          L2 column.
        data_tests:
          - not_null:
              config:
                where: "resolution_path != 'unresolved'"
      - name: l2_district_name
        description: Raw L2 district name as carried by the resolving source
        data_tests:
          - not_null:
              config:
                where: "resolution_path != 'unresolved'"
      - name: normalized_district_name
        description: >
          Snapshot-stable district join key (normalize_l2_district_name
          macro: collapse whitespace, strip the drifting " (EST.)" suffix,
          upper-case). Downstream joins to L2-derived tables must use this
          key, normalized on both sides.
        data_tests:
          - not_null:
              config:
                where: "resolution_path != 'unresolved'"
      - name: is_statewide
        description: >
          Resolved to the synthetic statewide district; statewide orgs are
          reported separately downstream, never mixed into the local headline
        data_tests:
          - not_null
      - name: review_rule_statewide_container
        description: >
          Deterministic rule (a) - matched to the synthetic statewide
          district but the title is not a statewide office
        data_tests:
          - not_null
      - name: review_rule_county_container
        description: >
          Deterministic rule (b) - matched to a whole county but the title
          carries no county/borough/parish term (county-equivalent
          independent cities, stored by L2 in the County column with a
          ' CITY' suffix, are excluded as correct matches)
        data_tests:
          - not_null
      - name: review_rule_subscope_marker
        description: >
          Deterministic rule (c) - title names a sub-jurisdiction (subarea
          seat, community education council) while the match is a whole
          county, city, or school district
        data_tests:
          - not_null
      - name: requires_review
        description: >
          Any container-mismatch rule fired: the resolved district likely
          contains, but is larger than, the office's real jurisdiction.
          Flagged rows still flow through; the review queue consumes them.
        data_tests:
          - not_null
      - name: review_reason
        description: Human-readable list of the rules that fired; null when none
      - name: is_geo_seat
        description: >
          Title carries a geographic seat designation (Ward 3, District F,
          Zone 1) while the matched district is the whole jurisdiction.
          Correct under whole-jurisdiction semantics (the v1 default),
          overcounts under electoral-district semantics. Flag only - the
          semantics decision is pending.
        data_tests:
          - not_null
      - name: is_internal_email
        description: >
          Owner email matches the internal/test pattern. Whether these orgs
          count toward the public metric is a pending product decision, so
          flag, never exclude (the serve_cohort_exclude_internal_email_orgs
          var flips the filter).
        data_tests:
          - not_null
      - name: is_active_serve_user
        description: >
          Carried from int__serve_active_user: the owner sent an SMS poll AND
          pledged (the behavioral half of the cohort). False when the owner has no
          active-user row.
        data_tests:
          - not_null
      - name: icp_office_serve
        description: >
          Carried from int__icp_offices (unique join on ballotready_position_id):
          the office meets Serve ICP. False when the office is confirmed non-ICP, when
          the position id is null/missing (no linked office), or when the office's L2
          voter count is unknown (that last case is also flagged by
          icp_office_serve_unknown).
        data_tests:
          - not_null
      - name: icp_office_serve_unknown
        description: >
          The org has a BallotReady position that matched int__icp_offices but the
          office's L2 voter count is absent, so int__icp_offices returned a null
          serve-ICP determination (unknown, not confirmed non-ICP). icp_office_serve
          coalesces this to false (conservative exclusion); this flag keeps the data
          gap observable so a cohort miss is diagnosable as unknown vs true non-ICP.
        data_tests:
          - not_null
      - name: in_people_served_cohort
        description: >
          The active People Served cohort gate: is_active_serve_user AND
          icp_office_serve AND not is_internal_email. Flag only -- out-of-cohort
          officials still flow through. Drives both count_once
          (int__serve_block_coverage active union) and the count-multiple variants
          (people_served district_level filter).
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          name: serve_district_resolution_review_reason_consistency
          arguments:
            expression: >
              (requires_review and review_reason is not null)
              or (not requires_review and review_reason is null)

  - name: int__district_census_allocation
    description: >
      THE SUBSTRATE (DATA-1992, epic DATA-1359). One row per (census block,
      district_type, normalized district_name) with the 2020 decennial
      population allocated to that district in that block: allocated_population
      = pct_of_geo * block_population, where pct_of_geo is the within-(block,
      district_type) L2 voter share and the magnitude is census block
      population (never voter counts). Block grain only; block_group_geoid
      (LEFT 12) and tract_geoid (LEFT 11) are carried for GROUP BY rollups
      (coarser grains are never stored as rows, so no cross-grain
      double-count). Counts only, PII-free. Depends on L2 + census only (no
      election-api edge). Consumed by people_served, official_constituents, and
      district_census_stats.
    columns:
      - name: block_geoid
        description: 15-char zero-padded 2020 census block GEOID
        data_tests:
          - not_null
      - name: block_group_geoid
        description: Block group GEOID (LEFT 12 of block_geoid); rollup key
        data_tests:
          - not_null
      - name: tract_geoid
        description: Tract GEOID (LEFT 11 of block_geoid); rollup key
        data_tests:
          - not_null
      - name: state_postal_code
        description: Uppercase two-letter state postal code
        data_tests:
          - not_null
      - name: district_type
        description: L2 district column name (the curated substrate subset)
        data_tests:
          - not_null
      - name: district_name
        description: Normalized L2 district name (the join key to the serve resolver)
        data_tests:
          - not_null
      - name: voters_in_block_district
        description: Distinct L2 voters in this (block, district_type, district_name)
        data_tests:
          - not_null
      - name: voters_in_block
        description: >
          Distinct L2 voters in this block across all district_names of this
          district_type (the split denominator)
        data_tests:
          - not_null
      - name: block_population
        description: 2020 decennial census population of the block
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: pct_of_geo
        description: >
          Share of the block allocated to this district =
          voters_in_block_district / voters_in_block. At block grain this is the
          fraction of the block in this district.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
      - name: allocated_population
        description: >
          pct_of_geo * block_population (fractional by design; sums to
          block_population per (block, district_type))
        data_tests:
          - not_null
      - name: is_non_exact
        description: >
          The block's L2 voters report >1 district of this type (pct_of_geo <
          1). A voter-OBSERVED split indicator at block grain: it includes L2
          geocoding noise and misses geographic splits no observed voter falls
          on both sides of, so it is an indicator, not a precise
          geographic-overlap measure. The validated per-district
          non-exact-assignment share (the accuracy story) is computed at
          block-group grain in the demographic layer (phase 2); at block grain
          splitting is mostly noise (TDD App B.2).
        data_tests:
          - not_null
      - name: loaded_at
        description: Max loaded_at of the contributing L2 rows
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: district_census_allocation_unique_key
          arguments:
            combination_of_columns: [block_geoid, district_type, district_name]
      - dbt_utils.expression_is_true:
          name: district_census_allocation_allocated_le_population
          arguments:
            # +1e-6 tolerance guards against any binary-float overshoot near
            # pct_of_geo = 1.0 (sub-microperson; mass-conservation is the exact check)
            expression: "allocated_population <= block_population + 1e-6"
      - dbt_utils.expression_is_true:
          name: district_census_allocation_geoid_lengths
          arguments:
            expression: >
              length(block_geoid) = 15 and length(block_group_geoid) = 12
              and length(tract_geoid) = 11

  - name: int__serve_block_coverage
    description: >
      The count-once engine (DATA-1993, epic DATA-1359). One row per (census block,
      served_set) with the count of DISTINCT cohort-served voters and the block's total
      voters; people_served reads it as count-once(set) = sum(served_voters /
      total_voters * block_population) over served blocks. Count-once is a
      distinct-PERSON union across overlapping district types, which the counts-only
      substrate cannot produce (cross-type voter dedup needs voter IDs), so this model
      scans int__l2_nationwide_uniform once -- the "scanned, never surfaced" node from
      TDD 7.1 -- and emits only block-grain counts (PII-free). Scoped to the same
      district types as the substrate (get_l2_major_district_columns), so count-once <=
      count-multiple holds. served_set is 'all' (served by any cohort district) or one
      of the substrate's L2 district types; statewide officials are read from the exact T5
      'State' rows in people_served, not here. served_voters_active is the same count
      restricted to the active cohort (in_people_served_cohort on the resolver); active
      <= all block-for-block.
    columns:
      - name: block_geoid
        description: 15-char zero-padded 2020 census block GEOID
        data_tests:
          - not_null
      - name: served_set
        description: >
          'all' (voters served by any cohort district) or an L2 district_type (voters
          served by a cohort district of that type)
        data_tests:
          - not_null
      - name: served_voters
        description: Distinct cohort-served voters in this block for this served_set
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: served_voters_active
        description: >
          Distinct ACTIVE-cohort-served voters in this block for this served_set
          (in_people_served_cohort). A subset of served_voters, so <= served_voters
          and <= total_voters.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: total_voters
        description: >
          Distinct voters in this block carrying >=1 of the substrate's district values
          (the count-once denominator; ~= the block's total voters since County covers
          essentially all)
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
    data_tests:
      - dbt_utils.unique_combination_of_columns:
          name: serve_block_coverage_unique_key
          arguments:
            combination_of_columns: [block_geoid, served_set]
      - dbt_utils.expression_is_true:
          name: serve_block_coverage_served_le_total
          arguments:
            expression: "served_voters <= total_voters"
      - dbt_utils.expression_is_true:
          name: serve_block_coverage_active_le_served
          arguments:
            expression: "served_voters_active <= served_voters"

  - name: int__civics_viability_scoring
    description: >
      Viability scores for all candidacies in the civics mart, produced by an
      MLflow model waterfall (best-available model wins via COALESCE). Reads the
      candidacy + election marts as leaves; its output is joined onto the
      downstream candidacy_scored mart, never back onto candidacy (acyclic).
      Models load by latest registered version from model_predictions (no @prod
      alias). Grain: one row per gp_candidacy_id.
    columns:
      - name: gp_candidacy_id
        description: Primary key — foreign key to the candidacy mart.
        data_tests:
          - unique
          - not_null
          - is_uuid
      - name: viability_rating_2_0
        description: Viability score on a 0–5 scale (null where no waterfall model could score the row).
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 5
      - name: score_viability_automated
        description: Human-readable viability label derived from viability_rating_2_0.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - No Chance
                  - Unlikely to Win
                  - Has a Chance
                  - Likely to Win
                  - Frontrunner
      - name: scoring_model
        description: >
          Which waterfall model produced this row's surviving (coalesced) score —
          i.e. the feature-completeness tier (viabilitywithopponentdata = the full
          9-feature model; the rest are progressively more missing-tolerant
          fallbacks). Internal provenance; not surfaced on candidacy_scored.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - viabilitywithopponentdata
                  - viabilitywithoutopenseat
                  - viabilitynoopponentdata
                  - viabilitynoincumbency
                  - viabilitynocandidatedatahs
      - name: model_version
        description: >
          Resolved model_predictions registered version of scoring_model for this
          row. Latest-version load is a moving pointer, so this records the exact
          version that scored the row for traceability and a code-pin rollback target.
      - name: updated_at
        description: Timestamp when the score was last computed (the dbt run time).
        data_tests:
          - not_null
