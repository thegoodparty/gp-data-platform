    description: >
      Canonical BallotReady candidate identity inputs, one deterministic row per
      br_candidate_id. int__civics_candidate_ballotready and
      int__civics_candidacy_ballotready both hash these columns for
      gp_candidate_id, so a person resolves to the same id in both models
      (previously they picked divergent per-row vs rolled-up contact values and
      orphaned candidates whose email varied across candidacy rows).

      Grain: One row per br_candidate_id.
    columns:
      - name: br_candidate_id
        description: BallotReady candidate (person) database_id. Primary key.
        data_tests:
          - unique
          - not_null

  - name: int__civics_candidate_ballotready
    description: >
      BallotReady candidates transformed into civics mart candidate schema.

      Grain: One row per unique person (deduplicated on gp_candidate_id).

      Source: stg_airbyte_source__ballotready_s3_candidacies_v3 (2026+ elections),
      augmented with int__ballotready_person for contact/URL data from API.

    columns:
      - name: gp_candidate_id
        description: >
          Primary key - internally generated UUID for candidates.
          Generated from: first_name, last_name, state, birth_date (null), email, phone.
        data_tests:
          - unique
          - not_null
          - is_uuid
          - relationships:
              description: >
                Every candidate must have at least one candidacy. Failures
                indicate an ID-generation mismatch between candidate and
                candidacy models (e.g. different email coalesce logic).
              arguments:
                to: ref('int__civics_candidacy_ballotready')
                field: gp_candidate_id
              config:
                # A small number of candidates may have candidacy rows where
                # all election dates are null after rollup, causing them to be
                # filtered out of the candidacy table. Large spikes indicate
                # an ID-generation bug.
                warn_if: ">15"
                error_if: ">50"

      - name: first_name
        description: Candidate's first name
        data_tests:
          - not_null

      - name: last_name
        description: Candidate's last name
        data_tests:
          - not_null

      - name: state
        description: U.S. state (2-letter code)
        data_tests:
          - not_null
          - is_state_abbreviation

      - name: created_at
        data_tests:
          - not_null

      - name: updated_at
        data_tests:
          - not_null

