version: 2

models:
  - name: int__gp_ai_election_match
    description: >
      DEPRECATED (DATA-1834): Frozen snapshot of DDHQ-HubSpot AI election match
      results from Dec 2, 2025. Previously a Python model that fetched parquet from
      S3 via the gp-ai API. Splink modelling replaces this pipeline going forward.
      Kept as a SQL passthrough for backward compatibility with 6 downstream consumers.

      CLEANUP TODO: To fully remove this model, update these downstream consumers
      to reference stg_model_predictions__candidacy_ddhq_matches_20251202 directly
      (or migrate to civics mart / splink data), then delete this file and YAML:
        - m_general__candidacy_stage.sql (LEFT JOIN)
        - m_general__candidacy_preview.sql (LEFT JOIN, first in DDHQ>BR>LLM waterfall)
        - m_general__election_stage.sql (FROM — primary source)
        - int__civics_candidacy_stage_2025.sql (LEFT JOIN, archive)
        - int__civics_election_stage_2025.sql (FROM, archive)
        - mban_candidacy_election_results.sql (INNER JOIN — evaluate deprecation)
      Also consider removing the 5 older unused snapshot staging models:
        - stg_model_predictions__candidacy_ddhq_matches_2025{0826,0909,0916,1016,1112}
    columns:
      - name: gp_candidacy_id
        description: Unique identifier for the candidacy in the HubSpot data.
        data_tests:
          - not_null
      - name: election_date
        description: Date of the election.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
      - name: election_type
        description: Type of election (general, primary, or runoff).
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
          - accepted_values:
              arguments:
                values:
                  - general
                  - primary
                  - runoff
      - name: ddhq_race_id
        description: Unique identifier for the race in the DDHQ data.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
      - name: ddhq_candidate_id
        description: Unique identifier for the candidate in the DDHQ data.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - gp_candidacy_id
              - election_date
              - election_type
