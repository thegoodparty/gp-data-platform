version: 2

models:
  - name: int__gp_ai_candidacies
    description: >
      DEPRECATED (DATA-1834): This model prepared HubSpot candidacy data as input
      for the gp-ai election matching API. Disabled along with the matching pipeline
      it feeds into.
    config:
      enabled: false

  - name: int__gp_ai_start_election_match
    description: >
      DEPRECATED (DATA-1834): This model previously triggered the external gp-ai API
      to match HubSpot candidacies against DDHQ election results. Disabled because
      splink modelling now handles election matching, and HubSpot data is only used
      for 2025 and prior elections.
    config:
      enabled: false

  - name: int__gp_ai_election_match
    description: >
      DEPRECATED (DATA-1834): Frozen snapshot of DDHQ-HubSpot AI election match
      results from Dec 2, 2025. Previously a Python model that fetched parquet from
      S3 via the gp-ai API. Splink modelling replaces this pipeline going forward.
      Kept as a SQL passthrough for backward compatibility with 6 downstream consumers.
    columns:
      - name: gp_candidacy_id
        description: Unique identifier for the candidacy in the HubSpot data.
        data_tests:
          - not_null
      - name: election_date
        description: Date of the election.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
      - name: election_type
        description: Type of election (general, primary, or runoff).
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
          - accepted_values:
              arguments:
                values:
                  - general
                  - primary
                  - runoff
      - name: ddhq_race_id
        description: Unique identifier for the race in the DDHQ data.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
      - name: ddhq_candidate_id
        description: Unique identifier for the candidate in the DDHQ data.
        data_tests:
          - not_null:
              config:
                where: "has_match is true"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - gp_candidacy_id
              - election_date
              - election_type
