version: 2

models:
  - name: int__hubspot_calls
    description: |
      HubSpot engagement calls, deduped to one row per call_id and enriched
      with the disposition label and outcome_family classification from
      the hubspot_call_dispositions seed.
    columns:
      - name: id
        description: HubSpot call engagement ID. Unique per call after dedupe.
        data_tests:
          - not_null
          - unique
      - name: hs_call_disposition
        description: "HubSpot internal GUID for the call outcome"
      - name: disposition_label
        description: >
          Human-readable outcome label resolved from
          `hubspot_call_dispositions` (e.g. "Connected", "No answer",
          "Verbal Pledge - EO"). Null when the GUID has no seed entry or
          when the source row has no disposition set.
      - name: disposition_label_source
        description: >
          Provenance of the label: `hubspot_docs` (documented default),
          `inferred_from_title` (custom outcome derived from a call
          title pattern), or `unknown` (GUID present but label not yet
          mapped). Null when the call has no disposition.
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - hubspot_docs
                  - inferred_from_title
                  - unknown
      - name: outcome_family
        description: |
          Disjoint outcome classification: connected_pledge, connected_reject,
          connected_other, not_connected, unmapped (for GUIDs not yet labeled),
          or null_disposition (call has no disposition GUID set).
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - connected_pledge
                  - connected_reject
                  - connected_other
                  - not_connected
                  - unmapped
                  - null_disposition
              config:
                severity: warn
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "hs_call_disposition is null or disposition_label_source is not null"

  - name: int__hubspot_contacts
    description: >
        "Intermediate model that pulls selected properties from HubSpot contacts. To be used to build a general mart of Candidacies."
    columns:
      - name: id
        description: "HubSpot ID of the contact from the source system"
        tests:
          - unique
          - not_null
      - name: first_name
        description: "First name of the contact"
        tests:
          - not_null
      - name: last_name
        description: "Last name of the contact"
        tests:
          - not_null
      - name: br_position_id
        description: >
          BallotReady position database ID stored on the HubSpot contact.
          Sourced from the HubSpot `br_position_id` property — a denormalized
          snapshot that may lag the authoritative BallotReady data. Joins to
          `int__icp_offices.br_database_position_id`.
      - name: br_candidacy_id
        description: >
          BallotReady candidacy database ID stored on the HubSpot contact.
          Sourced from the HubSpot `br_candidacy_id` property.
      - name: br_race_id
        description: >
          BallotReady race database ID stored on the HubSpot contact. Sourced
          from the HubSpot `br_race_id` property.
      - name: effective_br_position_id
        description: >
          Resolved BallotReady position database ID for the contact, used to
          join `int__icp_offices`. Coalesces (in order): the contact's
          `br_position_id`, lookup via `br_race_id` against
          `stg_airbyte_source__ballotready_api_race`, lookup via
          `br_candidacy_id` against `int__ballotready_candidacy`, and finally
          a lookup through the contact's HubSpot company associations to a
          gp_api `campaigns` row carrying a `ballotready_position_id`.
      - name: icp_win
        description: >
          Whether the contact's position qualifies for the Win ICP (Ideal
          Customer Profile). Joined from `int__icp_offices` via
          `br_position_id`. The Win effective-date guard is applied: positions
          with a `win_effective_date` only return true when the contact's
          general election date is on or after that date.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: icp_serve
        description: >
          Whether the contact's position qualifies for the Serve ICP. Joined
          from `int__icp_offices` via `br_position_id`. Pass-through of
          `icp_office_serve` (no effective-date guard).
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: icp_win_supersize
        description: >
          Whether the contact's position is a Win-Supersize office (>100K
          voters meeting all other ICP criteria). Joined from `int__icp_offices`
          via `br_position_id`. Same effective-date guard as `icp_win`.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

  - name: int__hubspot_contacts_w_companies
    description: >
        "Intermediate model that pulls selected properties from HubSpot contacts. To be used to build a general mart of Candidacies."
    columns:
      - name: contact_id
        description: "HubSpot ID of the contact from the source system"
        tests:
          - not_null
      - name: gp_candidacy_id
        description: "GoodParty Candidacy ID of the contact"
        tests:
          - not_null
          - is_uuid
      - name: verified_candidate
        description: "Indicates whether the candidate has been verified"
      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge
    tests:
    - dbt_utils.unique_combination_of_columns:
        arguments:
          combination_of_columns:
            - contact_id
            - gp_candidacy_id

  - name: int__hubspot_contest
    description: >
        "Intermediate model that pulls selected properties from HubSpot contacts. To be used to build a general mart of Contest."
    columns:
      - name: contact_id
        description: "HubSpot ID of the contact from the source system"
        tests:
          - unique
          - not_null
      - name: official_office_name
        description: "Official office name of the contact"
        tests:
          - not_null
      - name: candidate_office
        description: "Candidate office of the contact"
        tests:
          - not_null
      - name: office_type
        description: "Office type of the contact"
        tests:
          - not_null
      - name: office_level
        description: "Office level of the contact"
        tests:
          - not_null:
              config:
                severity: warn
      - name: election_year
        description: "Year of the election"
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 2010
                max_value: 2199
                inclusive: true

  - name: int__hubspot_companies_archive_2025
    description: >
      Archived HubSpot companies prioritizing 2025 election dates.
      Selects from snapshot to get historical data with 2025 election dates.
    columns:
      - name: id
        description: "HubSpot ID of the company"
        data_tests:
          - unique
          - not_null

  - name: int__hubspot_contacts_archive_2025
    description: >
      Archived HubSpot contacts prioritizing 2025 election dates.
      Selects from snapshot to get historical data with 2025 election dates.
    columns:
      - name: id
        description: "HubSpot ID of the contact"
        data_tests:
          - unique
          - not_null

  - name: int__hubspot_prospect_contacts
    description: |
      One row per HubSpot contact, with lifecycle/stage/activation/pledge
      fields and resolved position-based ICP from int__hubspot_contacts.
      Does NOT filter by name — unlike int__hubspot_contacts — so prospects
      with missing names are included.
    columns:
      - name: id
        description: HubSpot contact ID.
        data_tests:
          - not_null
          - unique

  - name: int__hubspot_contact_calls
    description: |
      One row per HubSpot contact_id with at least one logged call.
      Disjoint per-outcome_family subtotals sum to total_calls. The
      connected_calls column is a convenience aggregate (pledge + reject
      + other) and is excluded from the disjoint-sum invariant test.
    columns:
      - name: contact_id
        description: HubSpot contact ID.
        data_tests:
          - not_null
          - unique
      - name: total_calls
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: connected_pledge_calls
        data_tests:
          - not_null
      - name: connected_reject_calls
        data_tests:
          - not_null
      - name: connected_other_calls
        data_tests:
          - not_null
      - name: not_connected_calls
        data_tests:
          - not_null
      - name: unmapped_calls
        data_tests:
          - not_null
      - name: null_disposition_calls
        data_tests:
          - not_null
      - name: connected_calls
        description: |
          Convenience aggregate = connected_pledge_calls +
          connected_reject_calls + connected_other_calls. Overlaps with the
          disjoint subtotals and is excluded from the disjoint-sum invariant.
        data_tests:
          - not_null
      - name: ever_connected
        data_tests:
          - not_null
      - name: first_call_at
        data_tests:
          - not_null
      - name: last_call_at
        data_tests:
          - not_null
      - name: last_connected_call_at
        description: |
          Timestamp of the most recent connected-family call. NULL for
          contacts who have never had a connected call (by design).
      - name: distinct_owners
        description: Count of distinct hubspot_owner_id values across this contact's calls.
        data_tests:
          - not_null
      - name: last_owner_id
        description: |
          hubspot_owner_id of the most recent call for this contact.
          Nullable when the owner field is unset on the latest call.
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: |
              total_calls =
                connected_pledge_calls + connected_reject_calls + connected_other_calls
                + not_connected_calls + unmapped_calls + null_disposition_calls
      - dbt_utils.expression_is_true:
          arguments:
            expression: "connected_calls = connected_pledge_calls + connected_reject_calls + connected_other_calls"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_call_at >= first_call_at"
