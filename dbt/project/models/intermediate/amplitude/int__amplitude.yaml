version: 2

models:
  - name: int__amplitude_user_milestones
    description: >
      User-grain intermediate model that aggregates milestone events from
      stg_airbyte_source__amplitude_api_events into one row per user_id for
      analytics.users metrics. Supports Onboarding CVR, Activated,
      and Active Candidates from a single Amplitude scan.
    columns:
      - name: user_id
        description: >
          BIGINT user identifier parsed from Amplitude user_id (STRING).
          Primary key for this model; used to join to mart_civics.users.
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('goodparty_data_catalog', 'users')
                field: user_id
              config:
                severity: warn

      - name: amplitude_registration_completed_at
        description: >
          Earliest timestamp for event_type = 'Onboarding - Registration Completed'.
          Denominator timestamp for onboarding conversion.

      - name: first_dashboard_viewed_at
        description: >
          Earliest timestamp for event_type = 'Dashboard - Candidate Dashboard Viewed'.
          Numerator timestamp for onboarding conversion.

      - name: registration_country
        description: >
          Amplitude country value from the registration event
          ('Onboarding - Registration Completed'). Used for US-segment filtering
          in onboarding CVR.

      - name: onboarding_completed_at
        description: >
          Earliest timestamp for event_type = 'onboarding_complete'.
          Supplemental column for OKR-document alternative onboarding definition.

      - name: first_campaign_sent_at
        description: >
          Earliest timestamp for event_type = 'Voter Outreach - Campaign Completed'.
          Supports activation milestones.

      - name: total_campaigns_sent
        description: >
          Count of event_type = 'Voter Outreach - Campaign Completed' per user.
          Supports campaign activity metrics.
        data_tests:
          - not_null

      - name: total_recipient_count
        description: >
          Sum of outreach recipient counts for
          event_type = 'Voter Outreach - Campaign Completed' per user.
          Uses COALESCE(recipientCount, voterContacts) and excludes values
          above 100000 or below 0 as Amplitude instrumentation errors.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: last_dashboard_viewed_at
        description: >
          Latest timestamp for event_type = 'Dashboard - Candidate Dashboard Viewed'.
          Supports active-candidate recency logic.

      - name: dashboard_view_count
        description: >
          Count of event_type = 'Dashboard - Candidate Dashboard Viewed' per user.
          Supports active-candidate usage intensity logic.
        data_tests:
          - not_null

      - name: pro_upgrade_completed_at
        description: >
          Earliest timestamp for event_type = 'pro_upgrade_complete'.
          Supplemental milestone for future analyses.

      - name: first_sms_poll_sent_at
        description: >
          Earliest timestamp for event_type = 'Serve Onboarding - SMS Poll Sent'.
          Supplemental Serve milestone for future analyses.

      - name: serve_getting_started_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Getting Started Viewed'.
          First step in the Serve onboarding funnel.

      - name: serve_constituency_profile_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Constituency Profile Viewed'.
          Second step in the Serve onboarding funnel.

      - name: serve_poll_value_props_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Poll Value Props Viewed'.
          Third step in the Serve onboarding funnel.

      - name: serve_poll_strategy_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Poll Strategy Viewed'.
          Fourth step in the Serve onboarding funnel.

      - name: serve_add_image_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Add Image Viewed'.
          Fifth step in the Serve onboarding funnel.

      - name: serve_poll_preview_at
        description: >
          Earliest timestamp for 'Serve Onboarding - Poll Preview Viewed'.
          Sixth step in the Serve onboarding funnel. Precedes SMS Poll Sent.
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "first_dashboard_viewed_at <= last_dashboard_viewed_at"
          config:
            where: "first_dashboard_viewed_at is not null and last_dashboard_viewed_at is not null"

  - name: int__amplitude_serve_activity
    description: >
      User x month intermediate aggregating Serve MAU activity from Amplitude.
      Filters to canonical Serve MAU definition: Viewed event on
      /dashboard/polls with Serve Activated = true, excluding @goodparty.org.

      Grain: One row per user_id x activity_month_year.

      Source: stg_airbyte_source__amplitude_api_events.
    columns:
      - name: user_id
        description: User identifier (BIGINT, cast from Amplitude string user_id).
        data_tests:
          - not_null

      - name: activity_month_year
        description: Calendar month of activity (first day of month, includes year).
        data_tests:
          - not_null

      - name: email
        description: User email from Amplitude user_properties. Used for internal exclusion.

      - name: first_activity_at
        description: Earliest poll dashboard view in this month.
        data_tests:
          - not_null

      - name: last_activity_at
        description: Latest poll dashboard view in this month.
        data_tests:
          - not_null

      - name: poll_view_count
        description: Total poll dashboard views in this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: activity_days
        description: Distinct days with poll dashboard views in this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - activity_month_year
      - dbt_utils.expression_is_true:
          arguments:
            expression: "activity_days <= day(last_day(activity_month_year))"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "poll_view_count >= activity_days"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_activity_at >= first_activity_at"

  - name: int__amplitude_win_activity
    description: >
      User x month intermediate aggregating Win product engagement from Amplitude.
      Captures campaign sends (Voter Outreach - Campaign Completed), and dashboard views
      (Dashboard - Candidate Dashboard Viewed).

      Grain: One row per user_id x activity_month_year.

      Source: stg_airbyte_source__amplitude_api_events.
    columns:
      - name: user_id
        description: User identifier (BIGINT, cast from Amplitude string user_id).
        data_tests:
          - not_null

      - name: activity_month_year
        description: Calendar month of activity (first day of month).
        data_tests:
          - not_null

      - name: campaigns_sent
        description: >
          Count of 'Voter Outreach - Campaign Completed' events in this month.
          Zero if user had only dashboard views this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: recipient_count
        description: >
          Sum of outreach recipients in this month. Uses
          COALESCE(recipientCount, voterContacts) with 100k cap
          NULL if no valid campaign sends this month.

      - name: first_campaign_sent_at
        description: Earliest campaign send event in this month.

      - name: last_campaign_sent_at
        description: Latest campaign send event in this month.

      - name: first_dashboard_viewed_at
        description: Earliest dashboard view event in this month.

      - name: last_dashboard_viewed_at
        description: Latest dashboard view event in this month.

      - name: dashboard_views
        description: >
          Count of 'Dashboard - Candidate Dashboard Viewed' events in this month.
          Zero if user had only campaign events this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: dashboard_view_days
        description: Distinct days with dashboard views in this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: total_events
        description: Total Win engagement events (campaigns + dashboard views) in this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: activity_days
        description: Distinct days with any Win engagement in this month.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: first_activity_at
        description: Earliest Win engagement event in this month.
        data_tests:
          - not_null

      - name: last_activity_at
        description: Latest Win engagement event in this month.
        data_tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - activity_month_year
      - dbt_utils.expression_is_true:
          arguments:
            expression: "activity_days <= day(last_day(activity_month_year))"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_events >= activity_days"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_activity_at >= first_activity_at"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_campaign_sent_at >= first_campaign_sent_at"
          config:
            where: "first_campaign_sent_at is not null and last_campaign_sent_at is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_dashboard_viewed_at >= first_dashboard_viewed_at"
          config:
            where: "first_dashboard_viewed_at is not null and last_dashboard_viewed_at is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "campaigns_sent + dashboard_views = total_events"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "dashboard_view_days <= activity_days"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "recipient_count >= 0"
          config:
            where: "recipient_count is not null"

  - name: int__amplitude_win_activity_weekly
    description: >
      User x week intermediate aggregating Win product engagement from Amplitude.
      Weekly analog of int__amplitude_win_activity (monthly). Substrate for
      retention modeling, cohort analysis, and point-in-time churn features
      where the ~12-week typical Win-account engagement window argues for a
      finer cadence than monthly.

      Grain: One row per user_id x week_start_date.

      Week boundaries follow date_trunc('week', ...): Monday-start, Sunday-end.
      week_end_date is exposed directly so downstream point-in-time features
      can use it as asof_date without further computation.

      Timezone semantics: event_time is in UTC; date_trunc('week', ...) is
      ISO-Monday-anchored. Activity at Sunday 23:30 UTC (Monday morning in
      many non-UTC locales) is bucketed into the week containing that Sunday,
      not the user's local Monday. Fine for retention modeling at weekly
      cadence; flagged so reviewers don't second-guess edge-of-week boundaries.

      Source: stg_airbyte_source__amplitude_api_events.
    columns:
      - name: user_id
        description: User identifier (BIGINT, cast from Amplitude string user_id).
        data_tests:
          - not_null

      - name: week_start_date
        description: First day of the ISO week containing the activity (Monday).
        data_tests:
          - not_null

      - name: week_end_date
        description: Last day of the ISO week (Sunday); week_start_date + 6 days.
        data_tests:
          - not_null

      - name: campaigns_sent
        description: >
          Count of 'Voter Outreach - Campaign Completed' events in this week.
          Zero if user had only dashboard views this week.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: recipient_count
        description: >
          Sum of outreach recipients in this week. Uses
          COALESCE(recipientCount, voterContacts) with 100k cap.
          NULL if no valid campaign sends this week.

      - name: first_campaign_sent_at
        description: Earliest campaign send event in this week.

      - name: last_campaign_sent_at
        description: Latest campaign send event in this week.

      - name: first_dashboard_viewed_at
        description: Earliest dashboard view event in this week.

      - name: last_dashboard_viewed_at
        description: Latest dashboard view event in this week.

      - name: dashboard_views
        description: >
          Count of 'Dashboard - Candidate Dashboard Viewed' events in this week.
          Zero if user had only campaign events this week.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: dashboard_view_days
        description: Distinct days with dashboard views in this week.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: total_events
        description: Total Win engagement events (campaigns + dashboard views) in this week.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: activity_days
        description: Distinct days with any Win engagement in this week.
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                max_value: 7

      - name: first_activity_at
        description: Earliest Win engagement event in this week.
        data_tests:
          - not_null

      - name: last_activity_at
        description: Latest Win engagement event in this week.
        data_tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - user_id
              - week_start_date
      - dbt_utils.expression_is_true:
          arguments:
            expression: "week_end_date = date_add(week_start_date, 6)"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "activity_days <= 7"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "total_events >= activity_days"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_activity_at >= first_activity_at"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_campaign_sent_at >= first_campaign_sent_at"
          config:
            where: "first_campaign_sent_at is not null and last_campaign_sent_at is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "last_dashboard_viewed_at >= first_dashboard_viewed_at"
          config:
            where: "first_dashboard_viewed_at is not null and last_dashboard_viewed_at is not null"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "campaigns_sent + dashboard_views = total_events"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "dashboard_view_days <= activity_days"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "recipient_count >= 0"
          config:
            where: "recipient_count is not null"

  - name: int__amplitude_event_catalog
    description: >
      Read-only catalog of Amplitude events: macro-derived family classification
      plus volume/recency from the event stream, joined to Amplitude Govern
      metadata, one row per event_type. Renamed from int__amplitude_event_taxonomy
      (DATA-2005). Pattern-based so new event_types in known families classify
      automatically. Does not compute a staleness verdict; code-presence provenance
      lives as a repo CSV (analytics/data/amplitude_event_provenance.csv, DATA-2014)
      and the relevance / up-to-dateness judgment is made at check time by an agent
      or the health monitor reconciling that CSV with this table. family is
      authoritative for classification; govern_category is descriptive metadata only.

      Grain: one row per distinct event_type. Sources:
      stg_airbyte_source__amplitude_api_events (behavior),
      stg_airbyte_source__amplitude_taxonomy_event_type (Govern metadata).
    columns:
      - name: event_type
        description: Distinct Amplitude event name. Primary key for this model.
        data_tests:
          - unique
          - not_null

      - name: family
        description: >
          Product-feature bucket. Win families are prefixed `win_`; non-Win
          buckets cover serve, auth/settings, navigation, and anonymous noise.
          Unmatched event_types fall through to 'other' for triage.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - win_onboarding
                  - win_dashboard
                  - win_voter_outreach
                  - win_outreach_planning
                  - win_outreach_scheduling
                  - win_content_builder
                  - win_voter_data
                  - win_candidate_profile
                  - win_pro_upgrade
                  - win_p2p_upgrade
                  - win_candidate_website
                  - win_candidacy_self_report
                  - win_compliance_or_planning
                  - win_ai_assistant
                  - win_briefings
                  - win_contacts
                  - win_resources
                  - serve
                  - auth_or_settings
                  - navigation
                  - viewed_generic
                  - amplitude_autotrack
                  - experiment_assignment
                  - session_or_browser
                  - other

      - name: is_win
        description: >
          True for Win-product candidate-attributed families (family like 'win_%').
          False for serve / cross-product / noise.
        data_tests:
          - not_null

      - name: is_recurrent
        description: >
          True for recurrent-activity events (vs one-off lifecycle milestones).
          Determines which events belong in the Win activity rollups. Event-level
          allowlist, not a pattern (see amplitude_event_is_recurrent macro).
        data_tests:
          - not_null

      - name: first_seen_date
        description: >
          Date of first appearance in the raw event stream. Use as a drift cutoff
          to exclude late-arriving event families from retrospective analyses.
        data_tests:
          - not_null

      - name: last_seen_date
        description: >
          Date of most recent appearance in the raw event stream. Powers recency
          checks (e.g. is the event still firing) at the consumer/agent layer.
        data_tests:
          - not_null

      - name: event_count
        description: Total occurrences of this event_type in the raw stream, all-time (volume context).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1

      - name: event_count_30d
        description: Occurrences of this event_type in the trailing 30 days (recent volume).
        data_tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: govern_category
        description: >
          Govern category name, flattened from the category JSON object. Descriptive
          metadata only, not used in any derived logic; largely uncurated today.

      - name: govern_description
        description: Govern human-curated description of the event (where populated).

      - name: govern_display_name
        description: Govern display name for the event.

      - name: govern_is_active
        description: Govern is_active flag for the event.

      - name: govern_is_hidden
        description: >
          True if the event is hidden from any Govern surface (OR of the four
          is_hidden_* flags).

      - name: govern_tags
        description: Govern tags for the event (array<string>; uncurated today).

      - name: govern_owner
        description: Govern-recorded owner of the event (uncurated today).

      - name: in_govern_taxonomy
        description: >
          Whether a Govern taxonomy row matched this event_type. Distinguishes
          "not in Govern" from "in Govern but uncurated".
        data_tests:
          - not_null
    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_win or not is_recurrent"
