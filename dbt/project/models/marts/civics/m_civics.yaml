version: 2

models:
  - name: users
    description: >
      Goodparty.org application users, with aggregate campaign counts appended.

      Grain: One row per user.

    columns:
      - name: user_id
        description: Primary key - unique user identifier from gp-api production database
        data_tests:
          - unique
          - not_null

      - name: email
        description: User's email address (primary contact, unique identifier)

      - name: first_name
        description: User's first name

      - name: last_name
        description: User's last name

      - name: phone
        description: User's phone number

      - name: zip
        description: User's zip code

      - name: created_at
        description: Timestamp when user account was created (signup date)

      - name: updated_at
        description: Timestamp when user account was last updated

      - name: organization_count
        description: Total number of organizations owned by this user
        data_tests:
          - not_null

      - name: win_organization_count
        description: Number of Win organizations (linked to a campaign)
        data_tests:
          - not_null

      - name: serve_organization_count
        description: Number of Serve organizations (linked to an elected office)
        data_tests:
          - not_null

      - name: campaign_count
        description: Total number of campaigns created by this user

      - name: non_demo_campaign_count
        description: Number of non-demo campaigns (use for production counts)

      - name: verified_campaign_count
        description: Number of verified campaigns

      - name: active_campaign_count
        description: Number of active campaigns

      - name: pro_campaign_count
        description: Number of pro-tier campaigns

      - name: pledged_campaign_count
        description: Number of campaigns where candidate took the GoodParty pledge

      - name: first_campaign_created_at
        description: Timestamp of user's first campaign creation

      - name: last_campaign_created_at
        description: Timestamp of user's most recent campaign creation

      - name: has_verified_campaign
        description: Whether user has at least one verified campaign
        data_tests:
          - not_null

      - name: has_pledged_campaign
        description: Whether user has at least one pledged campaign
        data_tests:
          - not_null

      - name: is_win_user
        description: >
          Whether the user is a Win user. True if the user owns at least one
          organization linked to a campaign (organization_type = 'win').
        data_tests:
          - not_null

      - name: is_serve_user
        description: >
          Whether the user is a Serve user. True if the user has a Serve
          organization (organization_type = 'serve') or has ever completed a
          poll through an elected office. The organization check is the
          authoritative source; the poll check preserves backwards compatibility
          for users who used Serve before the Organization entity was introduced.
        data_tests:
          - not_null

      - name: is_poll_user
        description: >
          Whether the user has completed a poll through an elected office.
          This was the original proxy for identifying Serve users before the
          Organization entity existed.
        data_tests:
          - not_null

      - name: eo_activated_at
        description: >
          Earliest timestamp indicating when the user became a Serve user.
          This is the earlier of: the creation date of their first Serve
          organization, or the creation date of their first completed poll.
          NULL for users who are not Serve users (is_serve_user = false).
        data_tests:
          - not_null:
              config:
                where: "is_serve_user = true"

  - name: campaigns
    description: >
      Goodparty.org application campaigns with historical version tracking.

      When a user reuses their campaign for a new election, the product database
      overwrites the campaign row in place. This model recovers historical
      versions from Airbyte's insert-only raw stream, so both past and current
      campaign data are available for tracking historical performance and
      election results.

      Grain: One row per campaign version (a campaign may have multiple rows if
      the user reused it for different elections).

    columns:
      - name: campaign_version_id
        description: >
          Primary key - surrogate key derived from campaign_id and election
          context fields (election date, position, office, state). Uniquely
          identifies each historical version of a campaign.
        data_tests:
          - unique
          - not_null

      - name: campaign_id
        description: >
          Campaign identifier from the gp-api production database. Not unique
          in this table — a campaign may have multiple historical versions if
          the user reused it for a new election.
        data_tests:
          - not_null

      - name: campaign_slug
        description: URL-friendly campaign identifier used in app URLs

      - name: organization_slug
        description: >
          Foreign key to the organizations table. Links this campaign to its
          parent organization entity, which holds position and district data.

      - name: hubspot_id
        description: HubSpot company identifier associated with this campaign

      - name: user_id
        description: Foreign key to user table - the user who owns this campaign
        data_tests:
          - not_null

      - name: user_email
        description: User's email address (primary contact)

      - name: user_first_name
        description: User's first name

      - name: user_last_name
        description: User's last name

      - name: user_phone
        description: User's phone number

      - name: user_zip
        description: User's zip code

      - name: user_created_at
        description: Timestamp when user account was created (signup date)

      - name: created_at
        description: Timestamp when this campaign was created

      - name: updated_at
        description: Timestamp when this campaign was last updated

      - name: is_verified
        description: Whether the campaign has been verified by GoodParty staff
        data_tests:
          - not_null

      - name: is_active
        description: Whether the campaign is currently active

      - name: is_pro
        description: Whether the campaign is on pro tier

      - name: is_demo
        description: Whether the campaign is a demo/test account (exclude from production counts)

      - name: did_win
        description: Whether the candidate won their election. May be null if the outcome has not been recorded.

      - name: is_pledged
        description: Whether the candidate has taken the GoodParty pledge

      - name: election_date
        description: Date of the election the campaign is targeting

      - name: campaign_state
        description: U.S. state where the campaign is running

      - name: campaign_party
        description: Political party affiliation

      - name: election_level
        description: Level of election (city, county, state, federal)
        data_tests:
          - accepted_values:
              arguments:
                values:
                  - city
                  - county
                  - state
                  - federal

      - name: campaign_office
        description: >
          The office name for this campaign version. For the latest version,
          this prefers the election-api position name resolved through the
          organization entity. For historical versions, it falls back to the
          legacy office field from campaign details. Used as the human-readable
          label for what office the campaign is targeting.

      - name: ballotready_position_id
        description: >
          BallotReady position database ID, joined via organization ->
          election-api position. Replaces the deprecated base64-decoded
          campaign.details.positionId field.

      - name: normalized_position_name
        description: >
          BallotReady normalized position name (e.g. "City Legislature",
          "Governor") resolved via the BR API position's normalized_position
          reference. Used for entity resolution — matching product campaigns
          to BallotReady candidacies by comparing standardized office names
          across sources.

      - name: is_latest_version
        description: >
          Whether this is the most recent version of the campaign (true) or a
          historical version that was overwritten (false). When filtering to
          current campaigns only, use `where is_latest_version`.
        data_tests:
          - not_null

  - name: organizations
    description: >
      Organizations from gp-api, representing the central entity that ties a
      user to either a Campaign (Win) or ElectedOffice (Serve). Each
      organization holds the position and district data that was previously
      stored on the campaign entity.

      Grain: One row per organization.

    columns:
      - name: organization_slug
        description: Primary key - unique slug identifier for the organization
        data_tests:
          - unique
          - not_null

      - name: user_id
        description: Foreign key to users table - the user who owns this organization
        data_tests:
          - not_null

      - name: user_email
        description: Owner's email address

      - name: user_first_name
        description: Owner's first name

      - name: user_last_name
        description: Owner's last name

      - name: position_id
        description: >
          Election-api position UUID. Populated when the user selected a
          BallotReady-sourced office. This is the election-api position ID,
          not the BallotReady database ID.

      - name: position_name
        description: >
          Position name from the election-api position table. Populated when
          position_id is set and the position exists in the election-api mart.

      - name: ballotready_position_id
        description: >
          BallotReady position database ID, resolved via the election-api
          position table. Useful for joining with BallotReady data.

      - name: position_state
        description: U.S. state for the position from the election-api

      - name: custom_position_name
        description: >
          Free-text position name entered by the user for custom offices not
          found in BallotReady. Mutually exclusive with position_id in practice.

      - name: override_district_id
        description: >
          L2 district ID override. Set when the district was manually selected
          via the district picker or matched via silver match. When null, the
          matched L2 district is fetched from the election-api.

      - name: district_id
        description: >
          L2 district UUID from the election-api, resolved via the position's
          matched district. NULL when position has no district match.

      - name: l2_district_type
        description: L2 district type (e.g., "State Senate", "Congressional District")

      - name: l2_district_name
        description: L2 district name (e.g., "District 5", "CA")

      - name: campaign_id
        description: >
          Foreign key to campaigns table. Populated for Win organizations.
          NULL for Serve organizations.

      - name: elected_office_id
        description: >
          Foreign key to elected_office. Populated for Serve organizations.
          NULL for Win organizations.

      - name: organization_type
        description: >
          Whether this organization is a Win (campaign) or Serve (elected office)
          organization.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["win", "serve"]

      - name: created_at
        description: Timestamp when the organization was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the organization was last updated
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: candidacy
    description: >
      Candidacies combining 2025 HubSpot archive and 2026+ BallotReady,
      TechSpeed, and DDHQ data.

      Grain: One row per candidacy.

      Provider precedence: BR > TS > DDHQ for every column. DDHQ contributes
      only as a fallback (and only for fields it carries: party_affiliation,
      candidate_office, official_office_name, office_level, office_type,
      candidacy_result, *_election_date). DDHQ supplies Won/Lost as
      candidacy_result — it never carries Runoff/Withdrew/Not on Ballot/
      Cannot Determine.

      DDHQ-only candidacies (DDHQ races with no Splink match to BR/TS/gp_api)
      appear as new rows with source_systems = ['ddhq'] and BR/TS-only fields
      (product_campaign_id, hubspot_*, viability_score, win_number,
      verification status, br_position_database_id) all NULL. Pre-2026
      DDHQ-derived candidacies still flow through the 2025 HubSpot archive
      path (limited to GP-product candidates the LLM matcher linked to a
      DDHQ race); the new live path covers 2026+.

    columns:
      - name: gp_candidacy_id
        description: Primary key - internally generated unique identifier for candidacies
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidate_id
        description: Foreign key to candidate table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('candidate')
                field: gp_candidate_id

      - name: gp_election_id
        description: Foreign key to election table.
        data_tests:
          - relationships:
              arguments:
                to: ref('election')
                field: gp_election_id
              config:
                where: "gp_election_id is not null"
                severity: warn

      - name: product_campaign_id
        description: >
          Foreign key linking to campaigns.campaign_id in the civics mart.
          Only populated for candidates who created a campaign in the GoodParty
          app. NULL for BallotReady-only or HubSpot-only candidacies.

      - name: hubspot_contact_id
        description: >
          Contact ID from HubSpot CRM. Links this candidacy to a HubSpot
          contact record. NULL for BallotReady-only candidates who have no
          HubSpot record.

      - name: hubspot_company_ids
        description: >
          Comma-separated HubSpot company IDs associated with this candidacy.
          A candidacy may link to multiple HubSpot companies.

      - name: candidate_id_source
        description: >
          The system that originally provided this candidate record. Values:
          BallotReady (external candidacy data), Techspeed (civics research
          vendor), Product (GoodParty app sign-up), or HubSpot (CRM-sourced
          from 2025 archive).

      - name: party_affiliation
        description: Candidate's political party

      - name: is_incumbent
        description: Whether the candidate is the incumbent
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_open_seat
        description: Whether the race is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: candidate_office
        description: >
          Human-readable office name standardized across data sources (e.g.
          "City Council", "Mayor", "School Board"). Use this for reporting
          and display; use official_office_name for the full formal title.

      - name: official_office_name
        description: >
          Formal BallotReady office title which may include district and seat
          details (e.g. "City Council District 5 Seat A", "State Senate
          District 12"). More specific than candidate_office. NULL for
          2025 HubSpot archive records.

      - name: office_level
        description: >
          Office level from BallotReady's PositionLevel enum (City, Local,
          County, Township, State, Regional, Federal). 2025 archive records
          may have a subset of these values.

      - name: office_type
        description: >
          Standardized type of office sourced from HubSpot properties.
          Common values include School Board, City Council, Town Council,
          Mayor, Judge, State House, State Senate, Congressional,
          Statewide/Governor, Sheriff, Alderman, Attorney, Clerk/Treasurer,
          County Supervisor, President, and Other.

      - name: candidacy_result
        description: >
          Result of the candidacy. Values:
          - Won: Candidate won the election
          - Lost: Candidate lost the election
          - Runoff: Election resulted in a runoff
          - Withdrew: Candidate withdrew from the race
          - Not on Ballot: Candidate was not on the ballot
          - Cannot Determine: Result could not be determined
        data_tests:
          - accepted_values:
              arguments:
                values:
                  [
                    "Won",
                    "Lost",
                    "Runoff",
                    "Withdrew",
                    "Not on Ballot",
                    "Cannot Determine",
                  ]
              config:
                where: "candidacy_result is not null"

      - name: is_pledged
        description: >
          Whether the candidate has taken the GoodParty pledge (boolean).
          A pledged candidate agreed to 4 qualifying statements either on the
          GoodParty website or via communication with the politics team.

      - name: is_verified
        description: >
          Whether the candidacy has been verified to exist (boolean).
          True if verified, false otherwise. Set automatically if candidate data
          came from Techspeed or BallotReady. For inbound candidates, verification
          was done manually by the politics team by checking for evidence of a
          legitimate campaign (campaign website, filing information, Facebook page,
          etc.). Manual verification was discontinued in 2026.

      - name: verification_status_reason
        description: >
          Reason why a candidacy is not verified. Only populated when is_verified
          is false. Values: No, Unresponsive, Can't Determine, Partisan Candidate,
          Write In.

      - name: is_partisan
        description: Whether the race is partisan
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: primary_election_date
        description: Date of the primary election

      - name: general_election_date
        description: Date of the general election

      - name: primary_runoff_election_date
        description: Date of the primary runoff election, if applicable

      - name: general_runoff_election_date
        description: Date of the general runoff election, if applicable

      - name: br_position_database_id
        description: >
          The numeric identifier for the political position (office) in BallotReady's
          database. For HubSpot-sourced records, extracted from the base64-encoded
          positionId in campaign details. For BallotReady-sourced records, comes
          directly from the S3 candidacy data.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__ballotready_api_position')
                field: database_id
              config:
                where: "br_position_database_id is not null"
                severity: warn
                # Some position IDs may not exist in the API position table yet
                # (API data is loaded incrementally, S3 data may be ahead).
                # Threshold raised post-DATA-1714 after the BR+TS candidacy
                # merge expanded the candidacy universe.
                warn_if: ">200"
                error_if: ">300"

      - name: viability_score
        description: Model-generated viability rating

      - name: win_number
        description: Estimated votes needed to win

      - name: win_number_model
        description: Model version used for win number calculation

      - name: is_win_icp
        description: >
          Whether this candidacy's position meets the Win Ideal Customer Profile
          (ICP) criteria, based on L2 voter count in the district. Voter-count
          thresholds are defined in int__icp_offices and may change over time.
          Derived from int__icp_offices via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: is_serve_icp
        description: >
          Whether this candidacy's position meets the Serve Ideal Customer
          Profile (ICP) criteria, based on L2 voter count in the district.
          The Serve voter-count range is a subset of Win, so any Serve-eligible
          office is also Win-eligible. Thresholds defined in int__icp_offices.
          Derived via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: is_win_supersize_icp
        description: >
          Whether this candidacy's position meets ICP criteria but exceeds the
          upper voter-count threshold for the standard Win process. These
          offices require separate consideration. Thresholds defined in
          int__icp_offices. Derived via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: candidate
    description: >
      Candidates combining 2025 HubSpot archive and 2026+ BallotReady,
      TechSpeed, and DDHQ data.

      Grain: One row per candidate.

      Provider precedence: BR > TS > DDHQ. DDHQ contributes only first_name,
      last_name, full_name, and state at this grain — every other column
      (HubSpot, contact, social, prod_db_user_id) is BR/TS-only.
      DDHQ-only candidates (DDHQ candidacies with no Splink match) appear
      as new rows with source_systems = ['ddhq']; the mart's `state` column
      receives DDHQ's state_postal_code (2-letter code) to match BR/TS
      convention at this layer.

    columns:
      - name: gp_candidate_id
        description: Primary key - internally generated unique identifier for candidates
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: hubspot_contact_id
        description: >
          Contact ID from HubSpot CRM linking this candidate to a HubSpot
          contact record. NULL for BallotReady-only candidates who have no
          HubSpot record.

      - name: prod_db_user_id
        description: >
          Foreign key linking to users.user_id in the civics mart. Populated
          when this candidate has a GoodParty app account. NULL for candidates
          known only through external sources (BallotReady, HubSpot).

      - name: candidate_id_tier
        description: >
          Confidence level from identity resolution indicating how reliably
          this candidate record was matched or created across sources. Lower
          tiers represent higher confidence matches.

      - name: first_name
        description: Candidate's first name

      - name: last_name
        description: Candidate's last name

      - name: full_name
        description: Candidate's full name

      - name: birth_date
        description: Candidate's date of birth

      - name: state
        description: U.S. state for the candidate
        data_tests:
          - is_state_abbreviation

      - name: email
        description: Candidate's email address

      - name: phone_number
        description: Candidate's phone number

      - name: street_address
        description: Candidate's street address

      - name: website_url
        description: Candidate's campaign website

      - name: linkedin_url
        description: Candidate's LinkedIn profile URL

      - name: twitter_handle
        description: Candidate's Twitter handle

      - name: facebook_url
        description: Candidate's Facebook page URL

      - name: instagram_handle
        description: Candidate's Instagram handle

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(first_name is not null) or (last_name is not null) or (full_name is not null)"
          config:
            # Companies without associated contacts may have null names
            error_if: ">200"
            warn_if: ">150"

  - name: candidacy_stage
    description: >
      Candidacy stages (primary, general, primary runoff, general runoff
      results) combining 2025 HubSpot/DDHQ archive and 2026+ BallotReady,
      TechSpeed, and DDHQ data.

      Grain: One row per candidacy stage (candidacy + election stage combination).

      Provider precedence: DDHQ wins for election outcome columns
      (is_winner, election_result, election_result_source, votes_received,
      is_uncontested) — DDHQ is the authoritative source for past-race
      results where it has coverage. BR > TS > DDHQ for descriptive columns
      (candidate_name, source_*, candidate_party, election_stage_date,
      timestamps). LLM-match metadata (match_confidence, match_reasoning,
      match_top_candidates, has_match) only exists on the BR/TS legacy
      paths; DDHQ has no equivalent.

      DDHQ-only candidacy_stages (no Splink match to BR/TS) appear as new
      rows with source_systems = ['ddhq']. election_result_source identifies
      which provider supplied the result for each row (ddhq, ballotready,
      techspeed, or hubspot for legacy archive rows).

    columns:
      - name: gp_candidacy_stage_id
        description: Primary key - internally generated unique identifier for candidacy stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_candidacy_id
        description: Foreign key to candidacy table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('candidacy')
                field: gp_candidacy_id

      - name: gp_election_stage_id
        description: Foreign key to election_stage table
        data_tests:
          - relationships:
              arguments:
                to: ref('election_stage')
                field: gp_election_stage_id
              config:
                error_if: ">=100"

      - name: candidate_name
        description: Name of the candidate

      - name: source_candidate_id
        description: >
          Vendor identifier carried on the stage row. For 2025 archive data,
          this is the DDHQ candidate_id (a person-level ID). For 2026+ data,
          this is the BallotReady candidacy_id (a candidacy-stage-level ID,
          despite the column name).

      - name: source_race_id
        description: >
          The vendor's own identifier for the race. For 2025 archive data
          this is the DDHQ race_id; for 2026+ data this is the BallotReady
          race_id.

      - name: candidate_party
        description: Candidate's political party affiliation

      - name: is_winner
        description: Whether the candidate won the election stage (boolean)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: election_result
        description: >
          Result of the election stage. Values:
          - Won: Candidate won this election stage
          - Lost: Candidate lost this election stage
          - Runoff: Election stage resulted in a runoff
          - Withdrew: Candidate withdrew from the race
          - Not on Ballot: Candidate was not on the ballot for this stage
        data_tests:
          - accepted_values:
              arguments:
                values: ["Won", "Lost", "Runoff", "Withdrew", "Not on Ballot"]
              config:
                where: "election_result is not null"

      - name: election_result_source
        description: >
          Source of the election_result / is_winner / votes_received values.
          Values: 'ddhq' (preferred when DDHQ covers the race), 'ballotready'
          (BR-supplied results), 'techspeed' (TS-supplied results),
          'hubspot' (2025-archive HubSpot stage results), or null if no
          result is available. DDHQ wins precedence for past-race outcomes
          where it has coverage.
        data_tests:
          - accepted_values:
              arguments:
                values: ["ddhq", "ballotready", "techspeed", "hubspot"]

      - name: match_confidence
        description: >
          LLM-generated confidence score (0 to 1) from the automated process
          that matched GoodParty candidates to DDHQ election results. Higher
          values indicate greater confidence in the match. Only populated for
          2025 archive records that went through DDHQ matching.

      - name: match_reasoning
        description: >
          LLM-generated reasoning text explaining why the DDHQ match was or
          was not made. Provides human-readable justification for the
          match_confidence score. Only populated for 2025 archive records.

      - name: match_top_candidates
        description: >
          Top candidate matches considered during the DDHQ matching process.
          Shows alternative candidates the LLM evaluated before selecting or
          rejecting a match.

      - name: has_match
        description: >
          Whether this candidacy stage was successfully linked to a vendor's
          election result data. For 2025 data, this means a DDHQ match was
          found. For 2026+ data, this means BallotReady result data is
          available. When true, vote counts and election results are populated.

      - name: votes_received
        description: >
          Number of votes received in this election stage. Stored as a
          string because BallotReady occasionally carries the literal
          "uncontested" alongside numeric counts. DDHQ wins for this column
          when DDHQ has data; BR/TS otherwise.

      - name: is_uncontested
        description: >
          Whether the race for this candidacy stage was uncontested,
          sourced from DDHQ. NULL for BR/TS-only rows (those providers
          don't carry uncontested status at the candidacy_stage grain).
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: election_stage_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: is_win_icp
        description: >
          Whether this candidacy stage's position meets the Win ICP criteria,
          based on L2 voter count. Thresholds defined in int__icp_offices.
          Derived from the election_stage table's ICP flags.
          NULL for records without BallotReady position match.

      - name: is_serve_icp
        description: >
          Whether this candidacy stage's position meets the Serve ICP criteria,
          based on L2 voter count. Thresholds defined in int__icp_offices.
          Derived from the election_stage table's ICP flags.
          NULL for records without BallotReady position match.

      - name: is_win_supersize_icp
        description: >
          Whether this candidacy stage's position exceeds the upper voter-count
          threshold for the standard Win process, requiring separate consideration.
          Thresholds defined in int__icp_offices.
          Derived from the election_stage table's ICP flags.
          NULL for records without BallotReady position match.

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

      - name: er_cluster_id
        description: >
          Splink cluster_id when this row went through entity resolution,
          else NULL. NOT stable across reruns; do not use as a foreign key.

      - name: br_candidacy_id
        description: >
          BallotReady's native candidacy ID. Populated only when 'ballotready'
          is in source_systems.

      - name: ts_source_candidate_id
        description: >
          TechSpeed's native candidate code. Populated only when 'techspeed'
          is in source_systems.

      - name: ddhq_candidate_id
        description: >
          DDHQ's native candidate_id (string-cast). Populated only when
          'ddhq' is in source_systems. Pairs with ddhq_race_id as DDHQ's
          compound natural key.

      - name: ddhq_race_id
        description: >
          DDHQ's native ddhq_race_id (string-cast). Populated only when
          'ddhq' is in source_systems. Pairs with ddhq_candidate_id.

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"

  - name: election
    description: >
      Elections combining 2025 HubSpot archive and 2026+ BallotReady,
      TechSpeed, and DDHQ data.

      Grain: One row per election.

      Provider precedence: BR > TS > DDHQ for descriptive columns; TS wins
      for filing_deadline / population / is_uncontested / is_open_seat (BR
      doesn't carry those at this grain), with DDHQ supplying is_uncontested
      as a fallback. has_ddhq_match is true when either the 2025 archive
      linked a DDHQ race to this election OR a 2026+ DDHQ row clustered
      into this election via Splink. The mart's `state` column receives
      DDHQ's state_postal_code (2-letter code) to match BR/TS convention.

    columns:
      - name: gp_election_id
        description: Primary key - internally generated unique identifier for elections
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: official_office_name
        description: Formal office title for the election

      - name: candidate_office
        description: Simplified/standardized office name

      - name: office_level
        description: >
          Office level from BallotReady's PositionLevel enum (City, Local,
          County, Township, State, Regional, Federal). 2025 archive records
          may have a subset of these values.

      - name: office_type
        description: Type of office (executive, legislative, judicial, etc.)

      - name: state
        description: U.S. state for the election
        data_tests:
          - is_state_abbreviation

      - name: city
        description: City for the election

      - name: district
        description: Electoral district

      - name: seat_name
        description: Specific seat name

      - name: election_date
        description: >
          The earliest or primary election date from the source data for this
          election cycle. For stage-specific dates, use primary_election_date,
          general_election_date, or the corresponding runoff date columns.
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: election_year
        description: Year of the election
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1900
                max_value: 2050
              config:
                where: "election_year is not null"

      - name: filing_deadline
        description: Filing deadline for the election

      - name: population
        description: Population of the electoral district
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0

      - name: seats_available
        description: Number of seats available in the election

      - name: term_start_date
        description: Start date of the term

      - name: is_uncontested
        description: Whether the election is uncontested
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: number_of_opponents
        description: Number of opponents in the race (may contain string values like '10+')

      - name: is_open_seat
        description: Whether the election is for an open seat
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: has_ddhq_match
        description: >
          True when DDHQ election results data is available for this
          election: either the 2025 archive linked a DDHQ race or a 2026+
          DDHQ row clustered into this election via Splink. False otherwise.
          Should agree with `'ddhq' in source_systems`.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]

      - name: br_position_database_id
        description: >
          The numeric identifier for the political position (office) in BallotReady's
          database. Derived from the candidacy associated with this election. Can be
          used to join with BallotReady position data for additional office metadata.
        data_tests:
          - relationships:
              arguments:
                to: ref('stg_airbyte_source__ballotready_api_position')
                field: database_id
              config:
                where: "br_position_database_id is not null"
                # Some position IDs may not exist in the API position table yet
                # (API data is loaded incrementally, S3 data may be ahead).
                warn_if: ">20"
                error_if: ">50"

      - name: is_judicial
        description: Whether the office is a judicial position (from BallotReady)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
              config:
                where: "is_judicial is not null"

      - name: is_appointed
        description: Whether the office is an appointed position (from BallotReady)
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]
              config:
                where: "is_appointed is not null"

      - name: br_normalized_position_type
        description: >
          BallotReady's standardized position category (e.g. "City Council",
          "Mayor", "School Board"). Used for cross-office comparison, ICP
          classification, and grouping offices into comparable categories
          regardless of how individual jurisdictions name them.

      - name: icp_voter_count
        description: >
          L2 voter count for the district, used to determine whether the office
          falls within GoodParty's Ideal Customer Profile (ICP) target market.
          The voter-count thresholds for Win, Serve, and Supersize ICP are
          defined in int__icp_offices and may change over time. Derived via
          br_position_database_id. NULL for records without a matched L2
          district.
        data_tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
              config:
                where: "icp_voter_count is not null"

      - name: icp_normalized_position_name
        description: >
          BallotReady normalized position type used in ICP eligibility determination.
          Derived from int__icp_offices via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: is_win_icp
        description: >
          Whether this election's position meets the Win ICP criteria, based on
          L2 voter count. Thresholds defined in int__icp_offices.
          Derived via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: is_serve_icp
        description: >
          Whether this election's position meets the Serve ICP criteria, based on
          L2 voter count. Thresholds defined in int__icp_offices.
          Derived via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: is_win_supersize_icp
        description: >
          Whether this election's position exceeds the upper voter-count threshold
          for the standard Win process, requiring separate consideration.
          Thresholds defined in int__icp_offices. Derived via br_position_database_id.
          NULL for records without BallotReady position match.

      - name: primary_election_date
        description: Date of the primary election stage, if applicable
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: general_election_date
        description: Date of the general election stage, if applicable
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: primary_runoff_election_date
        description: Date of the primary runoff election stage, if applicable
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: general_runoff_election_date
        description: Date of the general runoff election stage, if applicable
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: created_at
        description: Timestamp when the record was created
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"
      - dbt_utils.expression_is_true:
          arguments:
            expression: "has_ddhq_match = array_contains(source_systems, 'ddhq')"

  - name: election_stage
    description: >
      Election stages (primary, general, primary runoff, general runoff)
      combining 2025 DDHQ archive and 2026+ BallotReady, TechSpeed, and
      DDHQ data.

      Grain: One row per election stage.

      Provider precedence: BR > TS > DDHQ for descriptive columns
      (stage_type, election_date, race_name, is_primary, is_runoff,
      is_retention, number_of_seats). total_votes_cast carries the literal
      'uncontested' from BR as a sentinel — when present, DDHQ's numeric
      count overrides. ddhq_race_id falls back to DDHQ's own ID when BR
      has no value.

      DDHQ-only stages (no Splink match) appear as new rows with
      source_systems = ['ddhq']; BR-only fields (br_election_id,
      br_position_id, partisan_type, filing_*) are NULL.

    columns:
      - name: gp_election_stage_id
        description: Primary key - internally generated unique identifier for election stages
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_election_id
        description: Foreign key to election table
        data_tests:
          - not_null
          - relationships:
              arguments:
                to: ref('election')
                field: gp_election_id

      - name: br_race_id
        description: >
          BallotReady race ID. Populated for 2026+ BallotReady records,
          NULL for 2025 archive records.

      - name: br_election_id
        description: >
          BallotReady election ID. Populated for 2026+ BallotReady records,
          NULL for 2025 archive records.

      - name: br_position_id
        description: >
          BallotReady position ID. Used for ICP join. Populated for 2026+
          BallotReady records. For 2025 archive records, populated when any
          candidacy at this stage has a product DB campaign link (base64-decoded
          campaign.details.positionId); otherwise NULL.

      - name: ddhq_race_id
        description: >
          DDHQ race identifier. Populated for 2025 archive records,
          NULL for 2026+ BallotReady records.

      - name: stage_type
        description: Type of election stage (primary, general, primary runoff, general runoff)
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - general
                  - primary
                  - primary runoff
                  - general runoff

      - name: election_date
        description: Date of the election stage
        data_tests:
          - dbt_expectations.expect_column_values_to_be_between:
              arguments:
                min_value: "'1900-01-01'"
                max_value: "'2050-12-31'"

      - name: election_name
        description: >
          Overarching election event name (e.g., "Illinois Primary Election").
          Populated for 2026+ BallotReady records, NULL for 2025 archive records.

      - name: race_name
        description: >
          Office-specific race label. Format differs by data era: 2025 records
          use the DDHQ format (e.g. "WI Tigerton Village Trustee"), while
          2026+ records use a format constructed from BallotReady position
          fields (e.g. "IL Franklin County Board - Full Term"). Not directly
          comparable across eras due to the format difference.

      - name: is_primary
        description: Whether this stage is a primary election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_runoff
        description: Whether this stage is a runoff election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: is_retention
        description: Whether this stage is a retention election
        data_tests:
          - accepted_values:
              arguments:
                values: [true, false]

      - name: number_of_seats
        description: Number of seats available for this race (BallotReady only)

      - name: total_votes_cast
        description: >
          Total votes cast in the election stage. Note: this is a string
          column because it may contain the value "uncontested" for races
          without competitive vote tallies, not just numeric values. Cast
          to integer only after filtering out non-numeric entries.

      - name: partisan_type
        description: >
          Whether the position is "partisan" or "nonpartisan". Sourced from
          BallotReady position metadata. NULL for 2025 archive records where
          this data was not available from DDHQ.

      - name: filing_period_start_on
        description: >
          Start date of the candidate filing period for this race.
          Sourced from BallotReady filing period data. NULL for 2025 archive records
          or races without filing period information.

      - name: filing_period_end_on
        description: >
          End date (deadline) of the candidate filing period for this race.
          Sourced from BallotReady filing period data. NULL for 2025 archive records
          or races without filing period information.
        data_tests:
          - dbt_utils.expression_is_true:
              arguments:
                expression: ">= filing_period_start_on"
              config:
                where: "filing_period_end_on is not null and filing_period_start_on is not null"

      - name: filing_requirements
        description: >
          Filing requirements for the position (e.g., petition signatures, fees).
          Sourced from BallotReady position data. NULL for 2025 archive records.

      - name: filing_address
        description: >
          Address of the filing office for this position.
          Sourced from BallotReady position data. NULL for 2025 archive records.

      - name: filing_phone
        description: >
          Phone number of the filing office for this position.
          Sourced from BallotReady position data. NULL for 2025 archive records.

      - name: is_win_icp
        description: >
          Whether this election stage's position meets the Win ICP criteria,
          based on L2 voter count. Thresholds defined in int__icp_offices.
          Derived via br_position_id.
          NULL for 2025 archive records without BallotReady position match.

      - name: is_serve_icp
        description: >
          Whether this election stage's position meets the Serve ICP criteria,
          based on L2 voter count. Thresholds defined in int__icp_offices.
          Derived via br_position_id.
          NULL for 2025 archive records without BallotReady position match.

      - name: is_win_supersize_icp
        description: >
          Whether this election stage's position exceeds the upper voter-count
          threshold for the standard Win process, requiring separate consideration.
          Thresholds defined in int__icp_offices. Derived via br_position_id.
          NULL for 2025 archive records without BallotReady position match.

      - name: created_at
        description: Timestamp when the record was created (from Airbyte extraction)
        data_tests:
          - not_null

      - name: updated_at
        description: Timestamp when the record was last updated

  - name: elected_official_terms
    description: |
      Term-grain BR fact table for elected officials. One row per BR
      office-holder term. Reads int__civics_elected_official_ballotready
      directly (BR term grain with both term and person UUIDs, plus ICP
      flags) and LEFT JOINs int__civics_elected_official_canonical_ids
      for TS provenance markers (ts_officeholder_id,
      has_direct_ts_term_match, ts_officeholder_id_is_reused).

      Term-grain TS attributes (is_incumbent, TS-enriched contact) are NOT
      exposed at this grain — those live on elected_officials. Consumers
      needing TS-derived person-level data join
      elected_official_terms.gp_elected_official_id →
      elected_officials.gp_elected_official_id.

      source_systems is join-based: 'ballotready' is always present;
      'techspeed' is added when has_direct_ts_term_match = true.

      gp-api attachment (DATA-1885): each BR term that the EO Splink bridge
      attached to a gp-api elected_office record exposes
      `gp_api_elected_office_id`, `gp_api_user_id`, `gp_api_campaign_id`,
      `gp_api_organization_slug`, `hubspot_company_id`, and `days_to_sworn_in`.
      Bridge is unique on `br_office_holder_id` so the LEFT JOIN does not
      multiply rows. `source_systems` includes 'gp_api' when bridge matched.

    columns:
      - name: gp_elected_official_term_id
        description: Primary key. Term-grain canonical UUID, sourced from int__civics_elected_official_ballotready.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: gp_elected_official_id
        description: |
          Foreign key to elected_officials.gp_elected_official_id. Person-grain
          canonical UUID. NULL for vacancy terms (no person).
        data_tests:
          - is_uuid
          - relationships:
              arguments:
                to: ref('elected_officials')
                field: gp_elected_official_id
              config:
                where: "gp_elected_official_id is not null"

      - name: br_office_holder_id
        description: BallotReady term-level row PK (OfficeHolder.databaseId)
        data_tests:
          - unique
          - not_null

      - name: br_candidate_id
        description: BallotReady person-level ID (Person.databaseId). NULL for vacancy rows.

      - name: br_position_id
        description: BallotReady seat/office ID (Position.databaseId)

      - name: br_candidacy_id
        description: BallotReady candidacy ID associated with this term

      - name: br_geo_id
        description: BallotReady geographic identifier

      - name: ts_officeholder_id
        description: |
          TS officeholder ID deterministically associated with this BR term
          (try_cast(ts_officeholder_id as bigint) = br_office_holder_id). NULL
          when no TS match. For reused IDs, this single ID may correspond to
          multiple TS source rows representing different people; use
          ts_officeholder_id_is_reused to identify contaminated matches before
          treating the ID as a clean TS-row pointer.

      - name: has_direct_ts_term_match
        description: True when this BR term has a deterministically matched ts_officeholder_id. Equivalent to 'techspeed' appearing in source_systems for this row.
        data_tests:
          - not_null

      - name: ts_officeholder_id_is_reused
        description: |
          True when the matched ts_officeholder_id is flagged as reused in the
          crosswalk (>=2 staging records after delivery dedup; ~86 IDs). False
          when no TS match. Use this to filter out contaminated matches when
          querying TS-matched terms.
        data_tests:
          - not_null

      - name: first_name
        description: Official's first name (BR)

      - name: last_name
        description: Official's last name (BR)

      - name: middle_name
        description: Official's middle name (BR)

      - name: suffix
        description: Official's name suffix (BR)

      - name: full_name
        description: Official's full name (BR)

      - name: phone
        description: Phone number from BallotReady (BR-only at term grain). TS-enriched contact lives on elected_officials.

      - name: email
        description: Email address from BallotReady (BR-only at term grain). TS-enriched contact lives on elected_officials.

      - name: office_phone
        description: Office phone number (BR-only)

      - name: central_phone
        description: Central office phone number (BR-only)

      - name: position_name
        description: Raw position name from BallotReady

      - name: normalized_position_name
        description: Normalized position name from BallotReady

      - name: candidate_office
        description: Derived office name for the position
        data_tests:
          - not_null

      - name: office_level
        description: Level of government
        data_tests:
          - accepted_values:
              arguments:
                values: ["City", "Local", "County", "Township", "State", "Regional", "Federal"]
              config:
                severity: warn

      - name: office_type
        description: Type of office held

      - name: state
        description: U.S. state abbreviation
        data_tests:
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"
              config:
                severity: warn

      - name: city
        description: City for the position (BR)

      - name: district
        description: District identifier for the position (BR)

      - name: term_start_date
        description: When the officeholder term started (BR)

      - name: term_end_date
        description: When the officeholder term ended or will end (BR)

      - name: is_appointed
        description: Whether the officeholder was appointed (BR)

      - name: is_judicial
        description: Whether this is a judicial position (BR)

      - name: is_vacant
        description: Whether this is a vacancy placeholder (BR)

      - name: is_off_cycle
        description: Whether the term is out of normal schedule (BR)

      - name: party_affiliation
        description: Political party affiliation
        data_tests:
          - accepted_values:
              arguments:
                values: ["Independent", "Nonpartisan", "Democrat", "Republican", "Libertarian", "Green", "Other"]
              config:
                severity: warn

      - name: website_url
        description: Official's government or campaign website (BR)

      - name: linkedin_url
        description: Official's LinkedIn profile (BR)

      - name: facebook_url
        description: Official's Facebook page (BR)

      - name: twitter_url
        description: Official's Twitter profile (BR)

      - name: mailing_address_line_1
        description: Mailing address line 1 (BR)

      - name: mailing_address_line_2
        description: Mailing address line 2 (BR)

      - name: mailing_city
        description: Mailing city (BR)

      - name: mailing_state
        description: Mailing state (BR)

      - name: mailing_zip
        description: Mailing ZIP code (BR)

      - name: tier
        description: BallotReady tier classification (1-5)

      - name: candidate_id_source
        description: Source identifier (always 'ballotready' in this model)

      - name: source_systems
        description: |
          Array of source systems contributing to this row, join-based per the
          candidacy mart convention. Always contains 'ballotready'; contains
          'techspeed' when has_direct_ts_term_match = true.

          Note: 'techspeed' membership means a TS ts_officeholder_id matched
          this term — NOT that trusted TS enrichment was applied. For
          contaminated matches (ts_officeholder_id_is_reused = true), TS data
          is suppressed downstream at the person grain in elected_officials,
          but the term-level join existed so 'techspeed' is still surfaced
          here for auditability.
        data_tests:
          - not_null

      - name: gp_api_elected_office_id
        description: |
          gp-api elected_office UUID. Populated when the EO Splink bridge
          attached this BR term to a gp-api product elected_office record.
      - name: gp_api_user_id
        description: gp-api product user ID. Populated when bridge matched.
      - name: gp_api_campaign_id
        description: gp-api campaign ID. Populated when bridge matched.
        data_tests:
          - relationships:
              arguments:
                to: ref('campaigns')
                field: campaign_id
              config:
                where: "gp_api_campaign_id is not null"
      - name: gp_api_organization_slug
        description: gp-api organization slug. Populated when bridge matched.
      - name: hubspot_company_id
        description: |
          HubSpot company ID for the matched gp-api campaign. Alias of
          `campaigns.hubspot_id` exposed at the term/campaign grain.
      - name: days_to_sworn_in
        description: |
          Audit: |bridge.br_term_start_date − bridge.sworn_in_date| in days.
          Lower is a closer date match. NULL when either date is NULL.

      - name: is_win_icp
        description: >
          Whether this position meets Win ICP criteria (non-judicial,
          non-appointed, 500-100K voters, recognized position type).
          NULL when voter count data is unavailable.

      - name: is_serve_icp
        description: >
          Whether this position meets Serve ICP criteria (non-judicial,
          non-appointed, serve-eligible position type, 1K-100K voters).

      - name: is_win_supersize_icp
        description: >
          Whether this is a large office (>100K voters) meeting all
          other Win ICP criteria except the voter count cap.

      - name: created_at
        description: Record creation timestamp (BR)
        data_tests:
          - not_null

      - name: updated_at
        description: Record last update timestamp (BR)
        data_tests:
          - not_null

    tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"
          config:
            # 37 of 530K BR source rows have updated_at < created_at
            warn_if: ">40"
            error_if: ">100"
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('int__civics_elected_official_ballotready')
      # gp_api source presence floor on term mart. Lower-bound only — we
      # expect this to grow as gp_api adoption increases. Threshold set well
      # below current observed value so legitimate growth doesn't fire it.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(*) from {{ ref('elected_official_terms') }} where gp_api_elected_office_id is not null) >= 800"
          name: term_mart_bridge_attach_floor
          config:
            severity: warn
      # hubspot_company_id coverage on bridge-attached rows. Coalesce ensures
      # 0/0=NULL doesn't silently pass.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce((select count(*) * 1.0 from {{ ref('elected_official_terms') }} where hubspot_company_id is not null) / nullif((select count(*) from {{ ref('elected_official_terms') }} where gp_api_elected_office_id is not null), 0), 0) >= 0.95"
          name: term_mart_hubspot_company_coverage
          config:
            severity: warn
      # source_systems values are limited to known sources (array-aware row-level test)
      - dbt_utils.expression_is_true:
          arguments:
            expression: "size(array_except(source_systems, array('ballotready', 'techspeed', 'gp_api'))) = 0"
          name: term_mart_source_systems_known_values
          config:
            severity: error

  - name: elected_officials
    description: |
      Civics mart elected_officials. Person-grain 3-way merge of
      BallotReady + TechSpeed + gp-api elected officials, full-outer-joined
      on the canonical gp_elected_official_id with COALESCE per column.
      Provider precedence: BR > TS > gp_api for shared identity/office
      fields. Mirrors the candidate.sql / candidacy.sql merge pattern at
      the BR↔TS layer; gp_api adopts BR canonical via the EO Splink bridge
      (see "gp-api integration" paragraph below).

      Grain: one row per elected official person (by br_candidate_id) for
      BR-matched rows; gp_api-only rows (Splink found no BR/TS match) have
      their own salted UUID with `source_systems = ['gp_api']` and NULL
      `br_candidate_id`.

      Latest-term semantics: term-scoped attributes (candidate_office,
      office_level, office_type, state, city, district, mailing_*, tier,
      party_affiliation, term dates) come from the BR person rollup,
      which selects the latest term per person. Multi-term people with
      cross-term variation (8,400+ multi-office, 7,300+ multi-office_type)
      reflect the latest term; consumers needing accurate per-term values
      must query elected_official_terms.

      ICP flags (is_win_icp, is_serve_icp, is_win_supersize_icp) are
      intentionally NOT on this mart per Hugh's commit 8c22079 — ICP is
      position-scoped and a latest-term scalar misrepresents the data.
      Term-grain ICP remains on elected_official_terms.

      is_incumbent and ts_incumbent_conflict come from the TS person
      rollup (with reused-ID suppression and canonical-grain conflict
      detection). is_incumbent is NULL when no TS data, when contributing
      TS rows disagreed (~350 cases), or when all TS contributions for
      that canonical were suppressed as reused (~53 canonicals).

      source_systems is join-based: 'ballotready' present when BR
      contributed a person row; 'techspeed' present when clean TS data
      contributed.

      gp-api integration (DATA-1885): the mart now full-outer-joins a third
      provider (`int__civics_elected_official_gp_api_person`) on
      `gp_elected_official_id`, with gp_api adopting BR's canonical via the
      bridge for matched users. gp_api-only rows (Splink found no BR/TS
      match) appear with `source_systems = ['gp_api']`, NULL `br_candidate_id`,
      and identity/office fields populated from gp_api via the precedence
      chain. The cluster-based merge_key pattern from candidacy_stage.sql
      does NOT apply here — see design spec for details.

    columns:
      - name: gp_elected_official_id
        description: Primary key. Person-grain canonical UUID. Same value as BR person intermediate's gp_elected_official_id.
        data_tests:
          - unique
          - not_null
          - is_uuid

      - name: br_candidate_id
        description: |
          BallotReady's natural person-level key. NULL on gp_api-only mart
          rows (where Splink found no BR/TS match).
        data_tests:
          - unique:
              config:
                where: "br_candidate_id is not null"
          - not_null:
              config:
                where: "array_contains(source_systems, 'ballotready')"

      - name: first_name
        description: Official's first name

      - name: last_name
        description: Official's last name

      - name: middle_name
        description: Official's middle name

      - name: suffix
        description: Official's name suffix

      - name: full_name
        description: Official's full name

      - name: phone
        description: TS-wins coalesce. TS-side phone is the per-field FIRST_VALUE IGNORE NULLS rollup across all non-reused contributing TS rows; falls back to BR's latest-term phone when TS has none.

      - name: email
        description: BR-wins coalesce. BR's latest-term email; falls back to TS-side per-field rollup if BR has none.

      - name: office_phone
        description: Office phone number

      - name: central_phone
        description: Central office phone number

      - name: candidate_office
        description: Office name from latest term

      - name: office_level
        description: Level of government from latest term
        data_tests:
          - accepted_values:
              arguments:
                values: ["City", "Local", "County", "Township", "State", "Regional", "Federal"]
              config:
                severity: warn

      - name: office_type
        description: Type of office from latest term

      - name: state
        description: U.S. state from latest term
        data_tests:
          - accepted_values:
              arguments:
                values: "{{ get_us_states_list(include_DC=true, include_US=true, include_territories=true) }}"
              config:
                severity: warn

      - name: city
        description: City from latest term

      - name: district
        description: District from latest term

      - name: term_start_date
        description: Start date of latest term

      - name: term_end_date
        description: End date of latest term

      - name: is_judicial
        description: Whether this is a judicial position (from latest term)

      - name: is_incumbent
        description: |
          TS-derived incumbency at person grain. NULL when no TS data, when
          contributing TS rows for this canonical disagreed (see
          ts_incumbent_conflict), or when all TS contributions were
          suppressed as reused IDs.

      - name: ts_incumbent_conflict
        description: True when >=2 non-reused contributing TS rows for this canonical disagreed on is_incumbent. ~350 affected canonicals in PR #333 data.
        data_tests:
          - not_null

      - name: party_affiliation
        description: Political party affiliation
        data_tests:
          - accepted_values:
              arguments:
                values: ["Independent", "Nonpartisan", "Democrat", "Republican", "Libertarian", "Green", "Other"]
              config:
                severity: warn

      - name: website_url
        description: Official's website

      - name: linkedin_url
        description: Official's LinkedIn profile

      - name: facebook_url
        description: Official's Facebook page

      - name: twitter_url
        description: Official's Twitter profile

      - name: mailing_address_line_1
        description: Mailing address line 1

      - name: mailing_address_line_2
        description: Mailing address line 2

      - name: mailing_city
        description: Mailing city

      - name: mailing_state
        description: Mailing state

      - name: mailing_zip
        description: Mailing ZIP code

      - name: tier
        description: BallotReady tier classification

      - name: selected_gp_elected_official_term_id
        description: |
          Audit column. The BR term whose values populate the latest-term-
          derived attributes for this person. NULL on gp_api-only rows.
          Trace via elected_official_terms.gp_elected_official_term_id.
        data_tests:
          - not_null:
              config:
                where: "array_contains(source_systems, 'ballotready')"
          - is_uuid:
              config:
                where: "selected_gp_elected_official_term_id is not null"

      - name: selected_br_office_holder_id
        description: |
          Audit. BR's natural term-grain key for the chosen latest term.
          NULL on gp_api-only rows.
        data_tests:
          - not_null:
              config:
                where: "array_contains(source_systems, 'ballotready')"

      - name: selected_ts_officeholder_id
        description: Audit. The ts_officeholder_id of the TS row chosen as latest non-reused for this canonical, or NULL if no clean TS row contributed.

      - name: selected_ts_position_id
        description: Audit. The ts_position_id of the chosen TS row.

      - name: gp_api_user_id
        description: |
          gp-api product user ID for this person. Populated when the EO
          Splink bridge resolved a match (or for gp_api-only mart rows).
        data_tests:
          - relationships:
              arguments:
                to: ref('users')
                field: user_id
              config:
                where: "gp_api_user_id is not null"
      - name: selected_gp_api_elected_office_id
        description: |
          Audit: which gp_api elected_office record won the latest-per-user
          rollup that fed this mart row.
      - name: selected_gp_api_campaign_id
        description: "Audit: gp_api campaign ID for the selected elected_office."
      - name: selected_gp_api_organization_slug
        description: "Audit: gp_api organization slug for the selected elected_office."
      - name: gp_api_email
        description: |
          User's email from gp-api product signup. Exposed separately from
          the canonical `email` column (which is BR-wins) because product
          signup contact is uniquely valuable.
      - name: gp_api_phone
        description: |
          User's phone from gp-api product signup. Exposed separately from
          the canonical `phone` column (which is TS-wins).
      - name: gp_api_party_affiliation
        description: |
          Raw user-input party affiliation from gp-api. Audit copy of the
          value that feeds the canonical party_affiliation chain.
      - name: hubspot_contact_id
        description: |
          HubSpot contact ID for the gp-api user, sourced from raw
          `gp_api_db_user.meta_data:hubspotid`.
      - name: er_cluster_id
        description: |
          Splink cluster_id from the EO ER pipeline (audit). Populated for
          gp_api person rows whose bridge resolved a match.
      - name: source_systems
        description: |
          Array of source systems contributing to this person, join-based per
          the candidacy mart convention. 'ballotready' present when BR person
          row exists for this canonical; 'techspeed' present when a clean TS
          person row exists; 'gp_api' present when the gp_api person rollup
          contributed (either via bridge match or as a gp_api-only row).

          Source-presence semantics, not value-survivorship: 'techspeed'
          membership means clean TS data joined this person, NOT that any
          final coalesced column took its value from TS. Reused-only
          canonicals (~53 in PR #333 data) yield 'ballotready' alone.
        data_tests:
          - not_null

      - name: created_at
        description: Record creation timestamp
        data_tests:
          - not_null

      - name: updated_at
        description: Record last update timestamp
        data_tests:
          - not_null

    tests:
      # BR-backed rowcount must match BR person intermediate (no BR rows lost in merge)
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(*) from {{ ref('elected_officials') }} where array_contains(source_systems, 'ballotready')) = (select count(*) from {{ ref('int__civics_elected_official_ballotready_person') }})"
          name: elected_officials_br_backed_rowcount_matches_br_person
          config:
            severity: error
      # Total mart rowcount lower-bound. BR person count grows over time; the
      # mart should be at least BR-rowcount-equivalent.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(*) from {{ ref('elected_officials') }}) >= (select count(*) from {{ ref('int__civics_elected_official_ballotready_person') }})"
          name: elected_officials_total_rowcount_at_least_br
          config:
            severity: error
      - dbt_utils.expression_is_true:
          arguments:
            expression: "updated_at >= created_at"
          config:
            # Inherits BR source rows where updated_at < created_at
            warn_if: ">30"
            error_if: ">100"
      # gp_api source presence floor. Hard error if gp_api integration falls
      # off entirely or drops to a tiny fraction of current scale. Lower-bound
      # only — gp_api is expected to grow.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(*) from {{ ref('elected_officials') }} where array_contains(source_systems, 'gp_api')) >= 900"
          name: gp_api_source_presence_floor
          config:
            severity: error
      # gp_api-matched persons floor (cross-source coverage). gp_api users
      # that Splink linked to a BR person; should grow as gp_api adoption
      # increases. Lower-bound only.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "(select count(*) from {{ ref('elected_officials') }} where gp_api_user_id is not null and array_contains(source_systems, 'ballotready')) >= 800"
          name: person_mart_gp_api_br_cross_source_coverage_floor
          config:
            severity: warn
      # gp_api-only rows have first/last/state populated (identity invariant).
      # gp_api-only mart rows derive identity from gp_api source via the
      # coalesce chain; if these are NULL, the chain is broken. Error-level.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce((select count(*) * 1.0 from {{ ref('elected_officials') }} where source_systems = array('gp_api') and first_name is not null and last_name is not null and state is not null) / nullif((select count(*) from {{ ref('elected_officials') }} where source_systems = array('gp_api')), 0), 0) >= 0.99"
          name: gp_api_only_rows_have_identity_fields
          config:
            severity: error
      # gp_api email coverage. coalesce(rate, 0) ensures the test FAILS when
      # gp_api drops to zero (without it, 0/0=NULL passes the test). Email is
      # collected at signup, so coverage on linked gp_api users should be high.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce((select count(*) * 1.0 from {{ ref('elected_officials') }} where gp_api_email is not null) / nullif((select count(*) from {{ ref('elected_officials') }} where gp_api_user_id is not null), 0), 0) >= 0.99"
          name: gp_api_email_coverage
          config:
            severity: error
      # HubSpot contact coverage. Sourced from raw user metadata; high
      # coverage expected because most product users sync to HubSpot.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "coalesce((select count(*) * 1.0 from {{ ref('elected_officials') }} where hubspot_contact_id is not null) / nullif((select count(*) from {{ ref('elected_officials') }} where gp_api_user_id is not null), 0), 0) >= 0.95"
          name: gp_api_hubspot_contact_coverage
          config:
            severity: warn
      # source_systems values are limited to known sources (array-aware
      # row-level test).
      - dbt_utils.expression_is_true:
          arguments:
            expression: "size(array_except(source_systems, array('ballotready', 'techspeed', 'gp_api'))) = 0"
          name: person_mart_source_systems_known_values
          config:
            severity: error
