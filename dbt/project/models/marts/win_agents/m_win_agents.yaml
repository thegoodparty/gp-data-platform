version: 2

models:
  - name: win_agent_voters
    description: >
      Full-signal voter dataset for the Win product's AI agents, from
      int__l2_nationwide_uniform_w_haystaq. Mirrors serve_agent_voters but
      removes PII only: partisan and commercial fields are retained. Exposed
      columns are the l2_column_classification registry minus the identity_pii
      and operational families.
