seeds:
  - name: l2_column_classification
    description: >
      L2 column classification registry: one row per column in
      int__l2_nationwide_uniform_w_haystaq with its family, description, and an is_available
      flag. serve_agent_voters exposes the columns where is_available is true; win_agent_voters
      exposes every family except identity_pii and operational. Change a column's classification
      here and rebuild; no model SQL change is needed.
    columns:
      - name: column_name
        description: "Source column name in int__l2_nationwide_uniform_w_haystaq."
      - name: data_type
        description: "Databricks data type of the source column."
      - name: family
        description: "Classification family (e.g. district, demographic, household, turnout, haystaq_issue, identity_pii, partisan, commercial)."
      - name: description
        description: "Human/agent-facing description, sourced from L2's data dictionaries."
      - name: is_available
        description: "Whether the column is exposed to the Serve agent (true/false)."
      - name: reasoning
        description: "Why the column is included or excluded."
