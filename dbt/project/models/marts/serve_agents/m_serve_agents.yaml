version: 2

models:
  - name: serve_agent_voters
    description: >
      De-identified voter dataset for the Serve product's AI agents (DATA-2003, TDD DATA-1977).
      One row per voter (a proxy for a constituent), sourced from
      int__l2_nationwide_uniform_w_haystaq (L2 national voter file + Haystaq issue models).
      Curated for analytical, aggregate queries by an AI agent serving an elected official's
      chief of staff. All direct identifiers and PII (names, street addresses, phone numbers,
      exact geocode, date of birth, device IDs) are removed; all partisanship (party
      registration, partisan modeled scores, political-donor and candidate/ideology Haystaq
      models) is removed; commercial / consumer-lifestyle attributes are excluded. Only
      non-partisan civic, geographic/district, demographic, household, turnout, and non-partisan
      Haystaq issue-model fields are exposed. The exposed column set is governed by the
      l2_column_classification seed (is_available flag) and selected dynamically at build
      time.
    columns:
      - name: voter_key
        description: '{{ doc("l2col_voter_key") }}'
        data_tests:
          - not_null
          - unique
      - name: state_postal_code
        description: '{{ doc("l2col_state_postal_code") }}'
        data_tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_be_in_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false) }}"
      - name: "Residence_Addresses_City"
        description: '{{ doc("l2col_Residence_Addresses_City") }}'
      - name: "Residence_Addresses_State"
        description: '{{ doc("l2col_Residence_Addresses_State") }}'
      - name: "Residence_Addresses_Zip"
        description: '{{ doc("l2col_Residence_Addresses_Zip") }}'
