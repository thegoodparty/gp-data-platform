version: 2

models:
  - name: m_election_api__candidacy
    description: "Mart model that serves the Election API"
    columns:
      - name: br_database_id
        description: "Database ID of the candidacy"
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('int__ballotready_candidacy')
                field: database_id
      - name: id
        description: "UUID of the place"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: is_incumbent
        description: >
          Whether the candidate is the incumbent for this position. Sourced
          from mart_civics.candidacy (TS-supplied; ~51k populated in civics)
          and scoped to the most recent election cycle for this
          (gp_candidate_id, br_position_database_id) pair via
          max_by(is_incumbent, general_election_date). For groups where
          every general_election_date is null, falls back to
          max_by(is_incumbent, updated_at) so the most recently updated
          row's value wins without collapsing all rows into a boolean OR.
          Null when no civics row carries an is_incumbent value for this
          person + position.
      - name: gp_candidate_id
        description: >
          Canonical civics candidate UUID. Resolved via
          int__civics_candidate_ballotready (BR person.database_id ->
          gp_candidate_id). Pre-aggregated by br_candidate_id with
          max(gp_candidate_id) for deterministic selection when a single BR
          person produced multiple gp_candidate_ids upstream. Null when the
          BR candidate is not present in civics.
      - name: email
        description: >
          Candidate email, sourced from int__civics_candidate_ballotready
          (which itself coalesces S3 candidacy email with the BR API
          person.contacts email). Surfaced by the campaign-strategy-context
          endpoint so the caller can match the requesting user.
      - name: website_url
        description: >
          Candidate website URL, sourced from int__civics_candidate_ballotready
          (extracted from BR person.urls where type='website').

  - name: m_election_api__district
    description: "Mart model that serves districts to the Election API, part of projected turnout"
    columns:
      - name: id
        description: "UUID of the district"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: state
        description: "State postal code"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [
                  "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA",
                  "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD",
                  "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ",
                  "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC",
                  "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY",
                  "DC", "US"
                ]
      - name: registered_voters
        description: >
          Distinct L2 voters appearing in this district, joined from
          int__l2_district_aggregations.voter_count. Null for
          turnout-only synthetic districts that have no L2 aggregation
          row.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: unique_cellphones
        description: >
          Distinct cellphone numbers
          (votertelephones_cellphoneformatted) appearing on L2 voters
          in this district. The collapse is on the phone-number value
          itself, so two voters sharing a household phone count as
          one — this matches per-channel send/dial costs downstream
          (SMS, robocall). Null for turnout-only synthetic districts.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
      - name: unique_landlines
        description: >
          Distinct landline numbers
          (votertelephones_landlineformatted) appearing on L2 voters
          in this district. Same collapse semantics as
          unique_cellphones. Null for turnout-only synthetic
          districts.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                inclusive: true
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - state
              - l2_district_type
              - l2_district_name

  - name: m_election_api__issue
    description: "Mart model that serves the Election API"
    columns:
      - name: id
        description: "UUID of the issue"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: br_database_id
        description: "Database ID of the `issue` from BallotReady"
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('int__ballotready_issue')
                field: database_id
    tests:
      - dbt_utils.equal_rowcount:
          arguments:
            compare_model: ref('int__ballotready_issue')

  - name: m_election_api__place
    description: "Mart model that serves the Election API"
    columns:
      - name: id
        description: "UUID of the place"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: slug
        description: "Slug of the place"
        tests:
          - not_null
          - unique
      - name: br_database_id
        description: "Database ID of the `place` from BallotReady"
        tests:
          - relationships:
              arguments:
                to: ref('int__enhanced_place')
                field: br_database_id
      - name: geoid
        description: "Geo ID of the place"
        tests:
          - not_null
          - unique

  - name: m_election_api__position
    description: "Mart model that serves the Election API"
    columns:
      - name: id
        description: "UUID of the position"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: br_database_id
        description: "Database ID of the `position` from BallotReady"
        tests:
          - not_null
          - unique
      - name: br_position_id
        description: "BallotReady position ID"
        tests:
          - not_null
          - unique
      - name: name
        description: "BallotReady position name"
      - name: state
        description: "State postal code"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [
                  "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA",
                  "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD",
                  "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ",
                  "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC",
                  "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY",
                  "DC", "US"
                ]
      - name: district_id
        description: "UUID of the district"
        tests:
          - relationships:
              arguments:
                to: ref('m_election_api__district')
                field: id
      - name: level
        description: >
          Position level from BallotReady. Maps to the `PositionLevel` enum on
          the election-api Postgres `Position` table.
        tests:
          - accepted_values:
              arguments:
                values:
                  - CITY
                  - COUNTY
                  - FEDERAL
                  - LOCAL
                  - REGIONAL
                  - STATE
                  - TOWNSHIP
      - name: is_win_icp
        description: >
          ICP-Office-Win flag from int__icp_offices (icp_office_win). True when
          the office is Win-ICP eligible, false when ineligible, null when the
          office's voter_count is unknown. Ungated office-level flag.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]
      - name: is_serve_icp
        description: >
          ICP-Office-Serve flag from int__icp_offices (icp_office_serve). True
          when the office is Serve-ICP eligible, false when ineligible, null
          when the office's voter_count is unknown.
        tests:
          - accepted_values:
              arguments:
                values: [true, false]

  - name: m_election_api__projected_turnout
    description: Turnout projections data load from model predictions
    columns:
      - name: id
        description: "UUID of the projected turnout"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: election_code
        description: The election code
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ["General", "LocalOrMunicipal", "ConsolidatedGeneral"]
      - name: model_version
        description: The model version
        tests:
          - not_null
      - name: district_id
        description: "UUID of the district"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__district')
                field: id
      - name: projected_turnout
        description: The projected turnout
        tests:
          - not_null
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - district_id
              - election_year
              - election_code
              - model_version

  - name: m_election_api__race
    description: "Mart model that serves the Election API"
    columns:
      - name: id
        description: "UUID of the race"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: br_database_id
        description: "Database ID of the `race` from BallotReady"
        tests:
          - relationships:
              arguments:
                to: ref('int__enhanced_race')
                field: br_database_id
      - name: position_id
        description: >
          UUID of the BallotReady position the race is for. Foreign key to
          m_election_api__position. Lets API consumers traverse
          Race -> Position -> District -> ProjectedTurnout. The race
          mart explicitly filters out rows without a matching Position
          so this is always populated.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__position')
                field: id
      - name: number_of_seats
        description: >
          Number of seats this election fills, from mart_civics.election_stage
          (br_race_id match). Null when civics has no matching stage row.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: win_number
        description: >
          BallotReady viability_score.win_number passed through from
          mart_civics.candidacy. Sparse in practice; null for nearly all
          small non-partisan local races. The consuming app computes a
          fallback estimate from projected_turnout / number_of_seats; do not
          coalesce here.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
                inclusive: true
      - name: is_partisan
        description: >
          Whether the race is partisan, from mart_civics.candidacy aggregated
          to the gp_election_id grain (invariant within an election cycle).
          Null when civics has no matching candidacy rows.
      - name: office_type
        description: >
          Standardized office_type from mart_civics.candidacy
          (e.g. City Council, School Board, State House). Null when civics
          has no matching candidacy rows.
      - name: official_office_name
        description: >
          Canonical BallotReady-supplied office name from
          mart_civics.candidacy. The existing position_names[] array carries
          the BR position name(s) for the race; official_office_name is the
          civics-standardized single string. Null when civics has no
          matching candidacy rows.
      - name: office_level
        description: >
          Civics (HubSpot-sourced) office level. Distinct from the BR
          positionLevel column (CITY / COUNTY / FEDERAL / LOCAL / REGIONAL /
          STATE / TOWNSHIP); office_level uses the civics taxonomy and can
          be null even when positionLevel is populated. Aggregated from
          mart_civics.candidacy by gp_election_id.

  - name: m_election_api__zip_to_position
    description: >
      Maps zip codes to future election positions for the OfficePicker product.
      Joins the civics election mart with the zip-to-BallotReady-office
      intermediate model, filtered to elections within two years of the
      current date.

      Grain: One row per (zip_code, position_id, election_date). Positions
      without zip coverage will have a null zip_code.
    columns:
      - name: position_id
        description: >
          Election API position UUID. Foreign key to m_election_api__position.
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__position')
                field: id
      - name: name
        description: "BallotReady position name"
      - name: zip_code
        description: "5-digit zip code mapped to this office via L2 district matching"
      - name: election_year
        description: "Year of the election"
        tests:
          - not_null
      - name: display_office_level
        description: >
          Office level for display. Maps judicial positions to 'Judicial',
          otherwise uses the standard office_level value.
        tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - City
                  - County
                  - Federal
                  - Judicial
                  - Local
                  - Regional
                  - State
                  - Township
      - name: office_type
        description: "Type of office (e.g. City Council, Mayor, Judge)"
      - name: state
        description: "Two-letter state postal code"
      - name: city
        description: "City associated with the office"
      - name: district
        description: "District identifier for the office"
      - name: election_date
        description: "Date of the election"
        tests:
          - not_null
      - name: br_database_id
        description: "Database ID of the `position` from BallotReady"
        tests:
          - not_null
      - name: voters_in_zip
        description: >
          L2 voters in this zip with a non-null value for the district_type
          column matched by this BR position. Invariant across district names
          within a district type, so the upstream rows for (zip, br_database_id)
          all carry the same value; the mart uses any_value() to carry it
          forward, guarded by tests/assert_zip_to_br_office_voters_in_zip_invariant.sql.
          Null when this position has no zip coverage.
      - name: voters_in_zip_district
        description: >
          L2 voters in this (zip, BR position). Aggregated from upstream
          int__zip_code_to_br_office by sum() across L2 district names that
          map to the same BR position. Null when no zip coverage.
      - name: pct_districtzip_to_zip
        description: >
          voters_in_zip_district / voters_in_zip — fraction of zip's L2
          voters who live in any L2 district that maps to this BR position.
          Used by election-api to filter spurious overlaps. Null when no
          zip coverage.
        tests:
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 1
                inclusive: true
              config:
                where: "zip_code is not null"
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - zip_code
              - position_id
              - election_date
      - dbt_utils.expression_is_true:
          arguments:
            expression: "voters_in_zip_district <= voters_in_zip"
          config:
            where: "zip_code is not null"

  - name: m_election_api__district_top_issues
    description: >
      District-level Haystaq issue scores per L2 district, covering every L2
      district with an `is_matched = true` row in the LLM L2-to-BallotReady
      district match (`stg_model_predictions__llm_l2_br_match_20260126`). Not
      scoped to a single election cycle — districts with off-cycle offices
      are included as well.

      Each row carries four jurisdictional flags (is_local, is_regional,
      is_state, is_federal) indicating where the issue is actionable.
      Downstream consumers filter by flag and re-rank within the filtered
      set. The mart emits the overall `issue_rank` only.

      Grain: up to one row per (l2_state, l2_district_type, l2_district_name,
      issue) where the district has at least one voter with a non-null score
      for that issue. Spark UNPIVOT defaults to EXCLUDE NULLS, so districts
      with NULL average scores for an issue emit no row for that issue.

      Issue universe, labels, and flags are sourced from the
      `haystaq_issue_tags` seed.
    columns:
      - name: id
        description: "UUID of the district-issue row"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: district_id
        description: "UUID of the district. Foreign key to m_election_api__district."
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__district')
                field: id
      - name: l2_state
        description: "State postal code"
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: [
                  "AL", "AK", "AZ", "AR", "CA", "CO", "CT", "DE", "FL", "GA",
                  "HI", "ID", "IL", "IN", "IA", "KS", "KY", "LA", "ME", "MD",
                  "MA", "MI", "MN", "MS", "MO", "MT", "NE", "NV", "NH", "NJ",
                  "NM", "NY", "NC", "ND", "OH", "OK", "OR", "PA", "RI", "SC",
                  "SD", "TN", "TX", "UT", "VT", "VA", "WA", "WV", "WI", "WY",
                  "DC", "US"
                ]
      - name: l2_district_type
        description: "L2 district type (e.g. State_House_District, City, County, or 'State' for statewide)"
        tests:
          - not_null
      - name: l2_district_name
        description: "L2 district name within the district type"
        tests:
          - not_null
      - name: l2_voter_count
        description: >
          Voters in this district (the count(*) denominator behind the issue
          averages). Voters with a NULL upstream score for a specific issue
          are still counted here but do not contribute to that issue's avg —
          per-issue contributing-voter counts are not pre-computed.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: issue
        description: "Haystaq issue score column name (e.g. hs_charter_schools_support)"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('haystaq_issue_tags')
                field: issue
      - name: issue_label
        description: "Human-readable issue label for product display, sourced from haystaq_issue_tags seed"
        tests:
          - not_null
      - name: score
        description: "Average Haystaq score for the issue across voters in the district (0-100)"
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
                max_value: 100
      - name: is_local
        description: "Issue is actionable at the local level (city, township, county). Sourced from haystaq_issue_tags seed."
        tests:
          - not_null
      - name: is_regional
        description: "Issue is actionable at the regional level (MPO, transit authority, etc.). Sourced from haystaq_issue_tags seed."
        tests:
          - not_null
      - name: is_state
        description: "Issue is actionable at the state level. Sourced from haystaq_issue_tags seed."
        tests:
          - not_null
      - name: is_federal
        description: "Issue is actionable at the federal level. Sourced from haystaq_issue_tags seed."
        tests:
          - not_null
      - name: issue_rank
        description: >
          Overall rank of the issue within the district (1 = highest score),
          with a deterministic tie-breaker on `issue asc`. Not capped — the
          API filters by jurisdictional flag and re-ranks within the
          filtered set.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
    tests:
      - dbt_utils.unique_combination_of_columns:
          arguments:
            combination_of_columns:
              - l2_state
              - l2_district_type
              - l2_district_name
              - issue

  - name: m_election_api__stance
    description: "Mart model that serves the Election API"
    columns:
      - name: id
        description: "UUID of the stance"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: br_database_id
        description: "Database ID of the `stance` from BallotReady"
        tests:
          - not_null
          - unique
      - name: issue_id
        description: "UUID of the issue"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__issue')
                field: id
      - name: candidacy_id
        description: "UUID of the candidacy"
        tests:
          - not_null
          - relationships:
              arguments:
                to: ref('m_election_api__candidacy')
                field: id

  - name: m_election_api__elected_official_support
    description: >
      Position-grained support metrics for the public Election API, one row per
      position (office) from that office's most recent GENERAL election win.
      This is the public-API version of mart_civics.elected_official_support: the
      per-person gp_elected_official_id is intentionally dropped (the Election API
      is fully public and must not carry per-user ids), and multi-seat offices
      (which have several winners) are collapsed to the single top winner by
      votes. The support figure for a multi-seat office therefore reflects one
      winner; number_of_seats is retained so the consumer can label or adjust it.

      Primaries are excluded because a primary win does not confer office;
      'general' covers general, general special, general runoff, and general
      special runoff stages. Only contested wins with a coherent vote tally and an
      L2 voter count are kept; rows are dropped when votes, the L2 voter count, or
      the projected support would be zero. Uncontested winners (no numeric total),
      rows where votes exceed the reported total (an unreliable BallotReady partial
      load), and rows with no L2 district match are all excluded.

      Grain: One row per br_position_id.

      Source note: votes_received is DDHQ-canonical via candidacy_stage;
      total_votes_cast is BallotReady-first (DDHQ fallback) via election_stage;
      icp_voter_count is the L2 district voter count from the positions mart.
      projected_registered_supporters is an interim placeholder for a future
      constituents-based support figure.
    columns:
      - name: id
        description: "UUID of the elected official support row (salted hash of br_position_id)"
        tests:
          - not_null
          - unique
          - is_uuid
      - name: created_at
        description: "Timestamp the row was first created in this table"
        tests:
          - not_null
      - name: updated_at
        description: "Timestamp the row was last refreshed"
        tests:
          - not_null
      - name: position_id
        description: >
          Election API position UUID (m_election_api__position.id). The key the
          product uses to look up an office (organization.position_id resolves to
          this UUID), and the foreign key to the Election API Position table.
        tests:
          - not_null
          - unique
          - is_uuid
          - relationships:
              arguments:
                to: ref('m_election_api__position')
                field: id
      - name: br_position_id
        description: >
          BallotReady position (office) identifier (Position.databaseId). The
          natural key for this table and the join key to the Election API
          position model (m_election_api__position.br_database_id).
        tests:
          - not_null
          - unique
          - relationships:
              arguments:
                to: ref('m_election_api__position')
                field: br_database_id
              config:
                severity: warn
      - name: number_of_seats
        description: >
          Number of seats filled in this race, from election_stage. Flags
          multi-seat / at-large offices. In a multi-seat race the displayed
          support reflects only the top winner by votes, so the consumer should
          use this to label or adjust the displayed figure.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: votes_received
        description: >
          Votes received by the top winner in the most recent general win for this
          office. Sourced from candidacy_stage.votes_received (DDHQ-canonical).
          Always populated and positive.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: total_votes_cast
        description: >
          Total votes cast in that same race. Sourced from
          election_stage.total_votes_cast (BallotReady first, DDHQ fallback).
          Always populated and greater than zero.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: icp_voter_count
        description: >
          L2 district voter count (registered voters in the office's district),
          from the positions mart, joined on br_position_database_id. Always
          populated here (rows without an L2 count are excluded). Because the
          upstream LLM position-to-L2-district match is excluded when it fails,
          this table under-covers offices the match struggles with (school boards
          and special districts, and the states Texas and Missouri); it is not a
          complete roster of offices. Always positive.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
      - name: projected_registered_supporters
        description: >
          Estimated registered voters in the district who support the office's top
          winner, computed as icp_voter_count * (votes_received / total_votes_cast)
          and rounded to a whole number. INTERIM PLACEHOLDER: when a real
          constituents count exists, the same vote share will be applied to it
          instead. Assumes non-voters would split at the same rate as voters. Fine
          for a display figure, not for analysis. Always populated and positive;
          rows that would round to zero are excluded.
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 1
    tests:
      # Regression guard: the model's where clause already enforces
      # votes_received <= total_votes_cast, so this cannot fail on current logic.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "votes_received <= total_votes_cast"
          name: eos_votes_received_never_exceeds_total_votes_cast
          config:
            severity: warn
      # Regression guard: guaranteed by construction (share <= 1).
      - dbt_utils.expression_is_true:
          arguments:
            expression: "projected_registered_supporters <= icp_voter_count"
          name: eos_projected_supporters_never_exceeds_registered_voters
          config:
            severity: warn
      # Real data-quality signal: a winner cannot receive more votes than there
      # are registered voters in the district. Violations indicate an upstream L2
      # position-to-district match that resolved to too small a district.
      - dbt_utils.expression_is_true:
          arguments:
            expression: "votes_received <= icp_voter_count"
          name: eos_votes_received_never_exceeds_registered_voters
          config:
            severity: warn
