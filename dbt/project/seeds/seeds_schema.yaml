version: 2

seeds:
  - name: fips_codes
    description: >
      Federal Information Processing System (FIPS) Codes for States and Counties

      FIPS codes are numbers which uniquely identify geographic areas.  The number of
      digits in FIPS codes vary depending on the level of geography.  State-level FIPS
      codes have two digits, county-level FIPS codes have five digits of which the
      first two are the FIPS code of the state to which the county belongs.  When
      using the list below to look up county FIPS codes, it is advisable to first look
      up the FIPS code for the state to which the county belongs.  This will help you
      identify the right section of the list while scrolling down, which can be
      important since there are over 3000 counties and county-equivalents (e.g.
      independent cities, parishes, boroughs) in the United States.

      see https://transition.fcc.gov/oet/info/maps/census/fips/fips.txt
    columns:
      - name: fips_code
        tests:
          - unique
          - not_null
      - name: place_name
        tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=false) }}"
              row_condition: "level = 'state'"

      - name: level
        tests:
          - not_null
    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["fips_code", "place_name"]

  - name: clean_states
    description: "Clean state names, postal codes, and FIPS codes for US states and territories"
    columns:
      - name: state_raw
        description: "Raw state name"
        tests:
          - not_null
          - unique
      - name: state_cleaned_postal_code
        description: "Clean state name"
        tests:
        - dbt_expectations.expect_column_distinct_values_to_equal_set:
            arguments:
              value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=true) }}"
  - name: nicknames
    description: >
      Mapping of given names to their common nicknames/aliases.
      Used by int__er_prematch_candidacy_stages to build first_name_aliases arrays
      for Splink entity resolution nickname matching.
    columns:
      - name: name1
        description: The canonical/full given name
        data_tests:
          - not_null
      - name: relationship
        description: Relationship type (always 'has_nickname')
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - has_nickname
      - name: name2
        description: The nickname/alias for name1
        data_tests:
          - not_null

  - name: l2_br_match_overrides
    description: >
      Manual overrides for LLM-generated L2-to-BallotReady district matches.
      When the Gemini string matcher maps a BR position to the wrong L2
      district, add a row here with the correct l2_district_type and
      l2_district_name. These take precedence over the LLM match in the
      election-api position mart.
    columns:
      - name: br_database_id
        description: BallotReady position database ID to override
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int__enhanced_position')
                field: br_database_id
      - name: br_position_name
        description: Human-readable BR position name (for documentation only, not used in joins)
        data_tests:
          - not_null
      - name: state
        data_tests:
          - not_null
          - is_state_abbreviation
      - name: l2_district_type
        description: Corrected L2 district type
        data_tests:
          - not_null
      - name: l2_district_name
        description: Corrected L2 district name
        data_tests:
          - not_null
      - name: reason
        description: Why this override is needed
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              concat(state, '|', l2_district_type, '|', l2_district_name) in (
                select concat(state, '|', l2_district_type, '|', l2_district_name)
                from {{ ref('m_election_api__district') }}
              )

  - name: icp_normalized_position_names
    description: >
      BallotReady normalized position names that qualify for ICP flags.
      The serve_eligible column controls whether a position qualifies for
      Serve ICP (false for school board positions, which are Win-only).
    columns:
      - name: name
        description: BallotReady normalized position name
        data_tests:
          - unique
          - not_null
      - name: branch
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - legislative
                  - executive
      - name: serve_eligible
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: win_effective_date
        description: >
          Earliest election date for which the Win ICP flag applies.
          Null means always eligible; non-null gates the win flag to
          elections on or after this date (used for school board positions).
        data_tests:
          - not_null:
              config:
                where: "category = 'school_board'"

  - name: states_zip_code_range
    description: "States and their zip code ranges. Sourced from https://zipcodes.org/us-zip-codes"
    columns:
      - name: state_postal_code
        tests:
          - not_null
          - unique
      - name: zip_code_range
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: ^\\[([0-9]{5},[0-9]{5})\\]$
