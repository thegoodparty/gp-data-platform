version: 2

seeds:
  - name: fips_codes
    description: >
      Federal Information Processing System (FIPS) Codes for States and Counties

      FIPS codes are numbers which uniquely identify geographic areas.  The number of
      digits in FIPS codes vary depending on the level of geography.  State-level FIPS
      codes have two digits, county-level FIPS codes have five digits of which the
      first two are the FIPS code of the state to which the county belongs.  When
      using the list below to look up county FIPS codes, it is advisable to first look
      up the FIPS code for the state to which the county belongs.  This will help you
      identify the right section of the list while scrolling down, which can be
      important since there are over 3000 counties and county-equivalents (e.g.
      independent cities, parishes, boroughs) in the United States.

      see https://transition.fcc.gov/oet/info/maps/census/fips/fips.txt
    columns:
      - name: fips_code
        tests:
          - unique
          - not_null
      - name: place_name
        tests:
          - not_null
          - dbt_expectations.expect_column_distinct_values_to_equal_set:
              arguments:
                value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=false) }}"
              row_condition: "level = 'state'"

      - name: level
        tests:
          - not_null
    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          arguments:
            column_list: ["fips_code", "place_name"]

  - name: clean_states
    description: "Clean state names, postal codes, and FIPS codes for US states and territories"
    columns:
      - name: state_raw
        description: "Raw state name"
        tests:
          - not_null
          - unique
      - name: state_cleaned_postal_code
        description: "Clean state name"
        tests:
        - dbt_expectations.expect_column_distinct_values_to_equal_set:
            arguments:
              value_set: "{{ get_us_states_list(include_DC=true, include_US=false, include_territories=true) }}"
  - name: us_states
    description: "One row per U.S. state/territory mapping postal code to human-readable name"
    columns:
      - name: state_postal_code
        description: "2-letter state postal code"
        data_tests:
          - unique
          - not_null
          - is_state_abbreviation
      - name: state_name
        description: "Human-readable state name"
        data_tests:
          - unique
          - not_null

  - name: nicknames
    description: >
      Mapping of given names to their common nicknames/aliases.
      Used by int__er_prematch_candidacy_stages to build first_name_aliases arrays
      for Splink entity resolution nickname matching.
    columns:
      - name: name1
        description: The canonical/full given name
        data_tests:
          - not_null
      - name: relationship
        description: Relationship type (always 'has_nickname')
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - has_nickname
      - name: name2
        description: The nickname/alias for name1
        data_tests:
          - not_null

  - name: l2_br_match_overrides
    description: >
      Manual overrides for LLM-generated L2-to-BallotReady district matches.
      When the Gemini string matcher maps a BR position to the wrong L2
      district, add a row here with the correct l2_district_type and
      l2_district_name. These take precedence over the LLM match in the
      election-api position mart. A row is also honored when its BR position has
      no LLM match row at all (e.g. positions added after the static match
      snapshot): the position mart injects the match directly from this seed.
    columns:
      - name: br_database_id
        description: BallotReady position database ID to override
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int__enhanced_position')
                field: br_database_id
      - name: br_position_name
        description: Human-readable BR position name (for documentation only, not used in joins)
        data_tests:
          - not_null
      - name: state
        data_tests:
          - not_null
          - is_state_abbreviation
      - name: l2_district_type
        description: Corrected L2 district type
        data_tests:
          - not_null
      - name: l2_district_name
        description: Corrected L2 district name
        data_tests:
          - not_null
      - name: reason
        description: Why this override is needed
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              concat(state, '|', l2_district_type, '|', l2_district_name) in (
                select concat(state, '|', l2_district_type, '|', l2_district_name)
                from {{ ref('m_election_api__district') }}
              )

  - name: election_api_race_filing_address_overrides
    description: >
      Manual overrides for the filing office address shown on election-api race
      pages. BallotReady sometimes supplies the wrong filing address for a
      position; add a row here keyed on the race br_database_id with the correct
      address and it takes precedence over the BallotReady value in the
      election-api race mart. Keyed at race grain (one row per BallotReady race)
      to match the mart and the displayed page; a future election for the same
      office gets a new br_database_id and would need its own row.
    columns:
      - name: br_database_id
        description: BallotReady race database ID to override
        data_tests:
          - unique
          - not_null
          - relationships:
              arguments:
                to: ref('int__enhanced_race')
                field: br_database_id
      - name: slug
        description: election-api race slug (for documentation only, not used in joins)
        data_tests:
          - not_null
      - name: filing_office_address
        description: Corrected filing office address
        data_tests:
          - not_null
      - name: reason
        description: Why this override is needed
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: >
              br_database_id in (
                select br_database_id
                from {{ ref('m_election_api__race') }}
              )

  - name: icp_normalized_position_names
    description: >
      BallotReady normalized position names that qualify for ICP flags.
      The serve_eligible column controls whether a position qualifies for
      Serve ICP (false for school board positions, which are Win-only).
    columns:
      - name: name
        description: BallotReady normalized position name
        data_tests:
          - unique
          - not_null
      - name: branch
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - legislative
                  - executive
      - name: serve_eligible
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values: [true, false]
      - name: win_effective_date
        description: >
          Earliest election date for which the Win ICP flag applies.
          Null means always eligible; non-null gates the win flag to
          elections on or after this date (used for school board positions).
        data_tests:
          - not_null:
              config:
                where: "category = 'school_board'"

  - name: hubspot_call_dispositions
    description: >
      Maps HubSpot `hs_call_disposition` GUIDs to human-readable outcome labels.
      The Airbyte HubSpot connector ingests the raw GUID but not the label
      mapping, which lives in HubSpot Settings (Objects > Activities > Calls >
      "Call and meeting outcomes"). This seed exists so downstream models
      can join the GUID to a readable label.

      `source` records how each row was populated:
        - `hubspot_docs`: documented default outcome (stable across HubSpot
          accounts), from
          https://developers.hubspot.com/docs/api-reference/legacy/crm/activities/calls/guide
        - `inferred_from_title`: custom outcome whose label was extracted from
          the Nooks Call title pattern `[Nooks Call] - <label> - <name> - by <rep>`.
        - `unknown`: GUID is present in the data but its label could not be
          inferred. Fill manually from HubSpot Settings.

      Maintaining this seed (updating or adding labels):
        - The authoritative GUID -> label binding is NOT in the warehouse, and
          the HubSpot Settings "Edit call outcomes" panel lists labels but not
          their GUIDs. Only the HubSpot API property options for
          `hs_call_disposition` expose the GUID behind each label:
          `GET /crm/v3/properties/calls/hs_call_disposition` (option `value` is
          the GUID, `label` is the human-readable outcome).
        - `inferred_from_title` labels are a best-effort proxy and CAN be wrong.
          The disposition GUID (a dropdown the rep selects) and the free-text
          call title are set independently, so a single GUID may carry more than
          one title. Treat the dominant title as a hint only, confirm the label
          against HubSpot's call outcomes, and fall back to `unknown` when the
          titles for a GUID disagree.
        - New disposition GUIDs that appear in the calls data are flagged by the
          warn-severity `relationships` test
          (`warn_unmapped_hs_call_disposition_guid`) on
          `int__hubspot_calls.hs_call_disposition`. When it warns, add the new
          GUID here. `int__hubspot_calls` coalesces any GUID missing from this
          seed to `disposition_label_source = 'unknown'` /
          `outcome_family = 'unmapped'`, so a missing row never breaks the build.
    columns:
      - name: guid
        description: "HubSpot internal GUID for the call disposition (hs_call_disposition)"
        data_tests:
          - unique
          - not_null
      - name: disposition_label
        description: "Human-readable outcome label as shown in the HubSpot UI"
      - name: source
        description: "How this row was populated (see seed description)"
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - hubspot_docs
                  - inferred_from_title
                  - unknown
      - name: notes
        description: "Free-text notes, e.g. derivation method or TODO markers"
      - name: outcome_family
        description: >
          Coarse outcome category for this disposition. One of: connected_pledge,
          connected_reject, connected_other, not_connected, unmapped.
          unmapped is used for rows where the disposition label is not yet known
          (source = 'unknown'). null_disposition is coalesced at the model level
          for calls with no disposition GUID at all.
        data_tests:
          - not_null
          - accepted_values:
              arguments:
                values:
                  - connected_pledge
                  - connected_reject
                  - connected_other
                  - not_connected
                  - unmapped
              config:
                severity: warn

  - name: states_zip_code_range
    description: "States and their zip code ranges. Sourced from https://zipcodes.org/us-zip-codes"
    columns:
      - name: state_postal_code
        tests:
          - not_null
          - unique
      - name: zip_code_range
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_match_regex:
              arguments:
                regex: ^\\[([0-9]{5},[0-9]{5})\\]$

  - name: haystaq_issue_tags
    description: >
      Per-issue metadata used by m_election_api__district_top_issues. One row
      per Haystaq issue column with the user-facing label and four
      jurisdictional flags (is_local, is_regional, is_state, is_federal)
      indicating where the issue is actionable. Flags are not mutually
      exclusive. Regional is tagged conservatively (only where a regional
      body has meaningful authority). Sort rows alphabetically by `issue`
      when editing.


      Column-name constraint: the `issue` values here must match the upstream
      `hs_*` column names on int__l2_nationwide_uniform_w_haystaq verbatim,
      including pre-existing L2 typos. The mart references each value as a
      live SQL identifier in an AVG aggregation, so renaming an `issue` in
      this seed without renaming the upstream column would break the mart
      compile (column-not-found) and the `relationships` test on
      m_election_api__district_top_issues.issue (mart values would no longer
      be a subset of seed values). Two known typos currently present:
      `hs_aliens_governenment_hiding_much` (should be `government`) and
      `hs_mass_deporations_support` (should be `deportations`). Keep both
      as-is; if L2 ever fixes them upstream, update the seed, the inline
      `issue_columns` list in the mart SQL, and rebuild.
    config:
      column_types:
        issue: STRING
        issue_label: STRING
        is_local: BOOLEAN
        is_regional: BOOLEAN
        is_state: BOOLEAN
        is_federal: BOOLEAN
    columns:
      - name: issue
        description: >
          Haystaq score column name on int__l2_nationwide_uniform_w_haystaq.
        data_tests:
          - not_null
          - unique
      - name: issue_label
        description: Human-readable label for product display.
        data_tests:
          - not_null
      - name: is_local
        description: Issue is actionable at the local level (city, township, county).
        data_tests:
          - not_null
      - name: is_regional
        description: >
          Issue is actionable at the regional level (MPO, transit authority,
          regional planning council, air quality district, regional health
          district).
        data_tests:
          - not_null
      - name: is_state
        description: Issue is actionable at the state level.
        data_tests:
          - not_null
      - name: is_federal
        description: Issue is actionable at the federal level.
        data_tests:
          - not_null
    data_tests:
      - dbt_utils.expression_is_true:
          arguments:
            expression: "is_local or is_regional or is_state or is_federal"
