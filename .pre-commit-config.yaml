# Install both hook types so `pre-commit install` wires up the pre-push test
# check below in addition to the per-commit lint/format hooks.
default_install_hook_types: [pre-commit, pre-push]

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
    -   id: trailing-whitespace
    -   id: end-of-file-fixer
    -   id: check-yaml
    -   id: mixed-line-ending
        args: ['--fix=lf']
    -   id: check-case-conflict
    -   id: detect-private-key

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
    -   id: ruff
        args: ['--fix']
    -   id: ruff-format

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
    -   id: mypy
        exclude: ^(people-api-loader|matcha|apps/genie-tools|apps/genie-slack-bot|dbt)/
        additional_dependencies: [
            'types-requests',  # Add specific type stubs as needed
            'types-psycopg2',
            'types-paramiko',
            'types-tabulate',
        ]

-   repo: https://github.com/tconbeer/sqlfmt
    rev: v0.26.0
    hooks:
    -   id: sqlfmt
        language_version: python
        additional_dependencies: ['.[jinjafmt]']

-   repo: local
    hooks:
    # Per-directory test suites, gated by which files changed, run on push only.
    # The pre-push stage keeps them OUT of the CI `pre-commit run --all-files`
    # job (default pre-commit stage), so CI is not duplicated — each directory's
    # own workflow is the CI coverage. Each hook runs the suite in that
    # directory's environment, so that env must be set up locally first
    # (`uv sync` / `poetry install` / `pip install ...`). `files:` means a push
    # only runs the suites for directories it actually touched.
    -   id: pytest-people-api-loader
        name: people-api-loader tests (pre-push)
        entry: bash -c 'cd people-api-loader && uv run pytest'
        language: system
        files: ^people-api-loader/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-matcha
        name: matcha tests (pre-push)
        entry: bash -c 'cd matcha && uv run pytest'
        language: system
        files: ^matcha/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-airflow
        name: airflow tests (pre-push)
        entry: bash -c 'cd airflow && poetry run pytest'
        language: system
        files: ^airflow/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-dbt
        name: dbt tests (pre-push)
        entry: bash -c 'cd dbt && uv run pytest'
        language: system
        files: ^dbt/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-analytics
        name: analytics tests (pre-push)
        entry: bash -c 'cd analytics && pytest'
        language: system
        files: ^analytics/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-genie-tools
        name: genie-tools tests (pre-push)
        entry: bash -c 'cd apps/genie-tools && uv run pytest'
        language: system
        files: ^apps/genie-tools/
        pass_filenames: false
        stages: [pre-push]
    -   id: pytest-genie-slack-bot
        name: genie-slack-bot tests (pre-push)
        entry: bash -c 'cd apps/genie-slack-bot && uv run pytest'
        language: system
        files: ^apps/genie-slack-bot/
        pass_filenames: false
        stages: [pre-push]
