name: people-api-loader

# Standalone (not via uv-subproject.yml): this project uses the Astral type
# checker `ty` instead of mypy, and keeps its dev deps in an optional-deps
# extra, so it needs `--extra dev`. Ruff is covered repo-wide by pre-commit.yml.
on:
  pull_request:
    paths:
      - 'people-api-loader/**'
      - '.github/workflows/people-api-loader.yml'
  push:
    branches: [main]
    paths:
      - 'people-api-loader/**'
      - '.github/workflows/people-api-loader.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: people-api-loader
    # A throwaway Postgres so the integration test (tests/test_integration_pg.py) runs
    # against a real engine — it covers partitioning / composite constraints / SQL
    # overloads the FakeConn unit tests can't. Vanilla PG has no aws_s3, which is why
    # that test loads via plain INSERT; see its module docstring.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
          cache-dependency-glob: people-api-loader/uv.lock
      - name: Install
        run: uv sync --frozen --extra dev
      - name: Type check (ty)
        run: uv run ty check
      - name: Pytest
        env:
          LOADER_TEST_PG_DSN: postgresql://postgres:postgres@localhost:5432/postgres
        run: uv run pytest -ra
