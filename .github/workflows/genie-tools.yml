name: genie-tools
on:
  pull_request:
    paths: ['apps/genie-tools/**', '.github/workflows/genie-tools.yml', '.github/workflows/uv-subproject.yml']
  push:
    branches: [main]
    paths: ['apps/genie-tools/**', '.github/workflows/genie-tools.yml', '.github/workflows/uv-subproject.yml']
jobs:
  test:
    uses: ./.github/workflows/uv-subproject.yml
    with:
      directory: apps/genie-tools
      mypy-targets: src
