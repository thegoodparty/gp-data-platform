name: analytics
on:
  pull_request:
    paths: ['analytics/**', '.github/workflows/analytics.yml', '.github/workflows/uv-subproject.yml']
  push:
    branches: [main]
    paths: ['analytics/**', '.github/workflows/analytics.yml', '.github/workflows/uv-subproject.yml']
jobs:
  test:
    uses: ./.github/workflows/uv-subproject.yml
    with:
      directory: analytics
      mypy-targets: lib tests
