brief_id: win-power-user-profile-2153
created: 2026-07-22
author: framing routine (refined with tristan)
ticket: DATA-2153 (epic DATA-2031); feeds DATA-2154, DATA-2171, DATA-2172

amendments:
  - date: 2026-07-23
    change: |
      Cohorting changed from election_quarter (as framed below) to three named election
      periods: "pre-Nov 2025" (Jan-Oct 2025 odd-year local generals), "Nov 2025" (the
      completed cycle), and "2026" (mostly upcoming). Quarterly buckets split the small
      power-user cohorts (intense N=304) below usable sizes; the three periods preserve the
      completed-vs-upcoming separation quarterly was chosen for while holding cell counts up.
      Implemented as election_period in win_power_users.add_derived. The reference_event,
      rationale, and dimensions.election_quarter entries below are superseded; code is the
      source of truth.

decision:
  what_action: |
    Two decisions. (1) Planning: characterize the Win power-user segment to inform this
    year's and next year's planning cycles. (2) Acquisition/ICP: hand DATA-2154 a
    data-grounded "power users look like this" profile it can turn into an acquisition
    target and a possible ICP redefinition. If power users cluster into distinctive
    segments, those segments become the lookalike target; if they look like the broad Win
    base across every cut, the clustering thesis fails and DATA-2154 has no target to define.
  who_acts: |
    Bryan (product/planning) and the growth/sales function that acts on the acquisition
    profile. Tristan (data) executes and owns the follow-on tickets.

question:
  one_sentence: |
    Who are the Win power users (the users who use the product the most), and do they
    cluster into recognizable segments - by office, constituency size, geography, party,
    viability, tenure, Pro status, and outcome - distinctively enough to define a lookalike
    acquisition target?
  type: descriptive
  underlying_hypothesis: |
    That power users EXIST is treated as an established fact, not a hypothesis: there is
    plainly a group that uses the product more (verified - see power_user_definition). The
    open hypothesis is only that they CLUSTER: that power users over-index on identifiable
    segments rather than being spread like the broad base. Bryan also suspects today's ICP
    (mayor/legislator + constituency >1,000) may be miscalibrated, so ICP is examined as an
    output, not imposed as a filter.

power_user_definition:
  rationale: |
    "Power user" is a USAGE cohort, defined by how much the person uses the product - and
    it is deliberately distinct from Pro. Empirically Pro and usage are nearly orthogonal:
    in the scoped base is_pro = 1,019 and activated (sent >=1 outreach) = 1,013, but their
    overlap is only 280. So "upgraded to Pro" (a commercial/commitment signal) is a
    different axis from "uses the product," which is why power-user is its own cohort and
    Pro cuts ACROSS it rather than defining it. (Verified 2026-07-22.)
  two_nested_cohorts: |
    Graduated usage axis, nested (intense is a subset of engaged):
      - POWER-USER: ENGAGED - the broad usage cohort. sent >=1 voter outreach campaign
        OR dashboard views >= the base p90 (~14). N ~= 2,597 (~11% of base). This is the
        primary cohort for the clustering analysis and the combination sweep (large enough
        for populated cells).
      - POWER-USER: INTENSE - the deep-usage core. sent >=5 voter outreach campaigns.
        N ~= 303 (~1.3%). Profiled at coarse grain; its distinctive over-indexes reported
        where N>=30. The "truest power users" by outreach depth.
  thresholds: |
    Exact thresholds pinned against the observed base distribution at execution and
    pre-registered before any cut. Current picks: dashboard-engagement threshold = base
    p90 of dashboard_view_count (14 on 2026-07-22); intense outreach threshold = 5 campaigns
    (>= base p99). Rerun as a sensitivity check at p85/p95 for the dashboard edge.
  signals_used: |
    Outreach: users_win_base.total_campaigns_sent (== is_activated when >=1; governed
    Activated OKR). Dashboard: int__amplitude_user_milestones.dashboard_view_count.
    Rejected signals: is_active_candidate_30d (=0 for the whole historical cohort - anchored
    to today, useless here) and active_campaign_count (~1 for everyone - not an intensity
    signal). Both usage counts are lifetime, not election-anchored - see known_concerns.

population:
  included: |
    Win candidacies with a general election dated 2025-01-01 through 2026-12-31 inclusive,
    with voter_count >= 1000, passing hygiene is_latest_version AND NOT is_demo. Unit of
    analysis is the candidacy (gp_candidacy_id). The power-user cohorts (engaged, intense)
    are defined within this base; every other attribute (Pro, activated, won, office, level,
    constituency size, geography, party, viability, tenure, ICP) is a dimension cut across
    the power-user cohorts and the base.
  excluded: |
    Primaries and primary-only candidacies (generals only). Demo and non-latest-version
    campaign rows. Constituencies with voter_count < 1000 (the "sewage board" tail where L2
    district data is thin) - the one population filter carried over from ICP thinking.
    Candidacies with NULL general_election_date, and any general_election_date outside
    [2025-01-01, 2026-12-31] (the calendar-year window that excludes the corrupt far-future
    tail - MAX observed was 2030-11-05).
  source_model: |
    Base + Pro + segmentation dims: goodparty_data_catalog.mart_analytics.users_win_candidacy
    (campaign-version grain; is_latest_version collapses to ~campaign grain). Canonical
    gp_candidacy_id, outcome, and incumbency: goodparty_data_catalog.mart_civics.candidacy,
    joined via users_win_candidacy.campaign_id = candidacy.product_campaign_id. Usage +
    activation: goodparty_data_catalog.mart_analytics.users_win_base (is_activated,
    total_campaigns_sent; one row per user_id) and
    goodparty_data_catalog.dbt.int__amplitude_user_milestones (dashboard_view_count,
    pro_upgrade_completed_at), both attached to the candidacy via user_id. L2 district
    context is already denormalized on users_win_candidacy (voter_count, l2_district_type,
    l2_district_name) - no separate L2 join for phase 1.

data_provenance:
  schema_status: prod
  coverage_start: |
    users_win_candidacy.general_election_date MIN = 1978-11-12 across all hygiene rows
    (full history; our window floors it at 2025-01-01). Verified by query 2026-07-22.
  coverage_end: |
    users_win_candidacy.general_election_date MAX = 2030-11-05 (corrupt far-future tail;
    our window caps it at 2026-12-31). users_win_base grain verified: 62,494 rows =
    62,494 distinct user_id (clean user grain). Verified by query 2026-07-22.
  post_merge_swap: |
    N/A. All sources are prod (mart_analytics, mart_civics, dbt). No dev/pending schemas.

eligibility:
  tenure_requirement: |
    None imposed on product observability. A candidacy qualifies on its general_election_date
    falling in the window, not on how long the user has been on the product. Rationale: this
    is a descriptive profile of who reached power-user status, not a treatment-exposure
    analysis, so an exposure-window tenure gate is not needed. The won-outcome cut is
    implicitly gated to completed generals (see target/censoring).
  reference_event: |
    general_election_date (the candidacy's general election). Cohorting is by election
    quarter of this date. [superseded 2026-07-23: three periods pre-Nov 2025 / Nov 2025 /
    2026 - see amendments.]
  rationale: |
    The population is defined by electoral cycle, not by product signup. Election quarter is
    the coarsest cohort that separates the completed 2025-early-2026 cycles from the upcoming
    Nov 2026 cycle while keeping cohort sizes usable.

target:
  definition: |
    Descriptive profile, not a single scalar target. The primary outcome is power-user
    cohort membership (engaged / intense) and how it distributes across segments vs the
    base. Reported quantities per (cohort x dimension, and per combination - see
    combination_sweep): power-user rate within the cell vs the base rate (over-index ratio),
    with Wilson 95% CIs. Cross-cutting attributes: Pro = users_win_candidacy.is_pro;
    activated = users_win_base.is_activated; won = latest_stage_reached + latest_stage_result
    from mart_civics.candidacy indicating a general-election win (NOT general_election_result,
    NOT candidacy_result). The Pro -> activated -> won commitment funnel is also reported
    descriptively (it was the original manager question) and win-rate is reported within the
    power-user cohorts.
  censoring: |
    Upcoming (Nov 2026) candidacies are right-censored on outcome: they populate the base
    and the power-user cohorts, but their won status is unobserved, so they are excluded from
    the won cut and from any win-rate denominator. Won is evaluated only on completed generals
    (general_election_date strictly before current_date()).
  absorbing_states: |
    Won/lost is read from the deepest stage reached (latest_stage_reached + latest_stage_result)
    per the governed outcome definition, which already encodes the terminal stage. Dropped/
    withdrawn candidacies surface through their latest stage and are not silently treated as
    losses; unresolved/NULL outcomes among completed generals are reported as an "outcome
    unknown" bucket, not folded into lost.

comparison:
  type: descriptive_cut
  comparison_group: |
    The broad scoped base (~23k candidacies) is the baseline. Each power-user cohort
    (engaged, intense) is compared to that base on every dimension and every N>=30
    combination: the signal is power-user-share-in-segment vs power-user-share-in-base
    (over-index). The intense cohort is additionally compared to the engaged cohort (does
    the profile sharpen as usage deepens?).
  notes: |
    Not causal. Over-indexing of a segment among power users does not mean that segment
    causes heavy usage; both may be driven by candidate type, race competitiveness, or sales
    targeting. Pro is sales-selected (sales targets ICP offices), so Pro-adjacent
    over-indexes may reflect targeting - DATA-2171 reruns these cuts on the full population as
    the designed control. Report associations, not effects.

observation_window:
  start: |
    general_election_date >= DATE '2025-01-01' (inclusive).
  end: |
    general_election_date <= DATE '2026-12-31' (inclusive). Won cut sub-window:
    general_election_date < current_date() (strictly before today) for outcome to be observed.
  anchored_to: |
    The candidacy's general election date.
  boundary_semantics: |
    general_election_date is a DATE column (not a timestamp), so date-vs-date comparisons are
    exact with no midnight-truncation risk. Window bounds inclusive both ends
    [2025-01-01, 2026-12-31]. voter_count >= 1000 inclusive of exactly 1000. Completed/upcoming
    split uses strict "< current_date()" so a general dated exactly today counts as upcoming.
    Pro / activated / usage-count flags are as-of mart materialization (point-in-time snapshot),
    NOT anchored to the election date - see known_concerns.

cohorts:
  # Primary cohort axis: power-user (usage-defined). Everything below "power_user" is a
  # dimension cut ACROSS the power-user cohorts and the base (and combined - see combination_sweep).
  - dimension: power_user
    values: |
      engaged (sent>=1 OR dash_views>=p90); intense (sent>=5). Nested. Base = comparator.
  - dimension: is_pro
    values: "TRUE / FALSE (cross-cut, not the cohort definition)"
  - dimension: is_activated
    values: "TRUE / FALSE"
  - dimension: won
    values: "won / lost / outcome-unknown (completed generals only)"
  - dimension: election_period   # superseded election_quarter, see amendments 2026-07-23
    values: "pre-Nov 2025 / Nov 2025 / 2026 (from general_election_date)"
  - dimension: office_type
    values: all observed (HubSpot string; School Board, City Council, Mayor, etc.; light grouping if needed)
  - dimension: election_level
    values: "city, county, state, federal, + explicit NULL bucket (~45% NULL - reported, not dropped)"
  - dimension: voter_count_band
    values: |
      Pre-registered bands (finalized against observed distribution): e.g. 1k-5k, 5k-25k,
      25k-100k, 100k+.
  - dimension: l2_district_type
    values: all observed
  - dimension: campaign_state
    values: all observed (~99% populated)
  - dimension: campaign_party
    values: all observed (~95% populated)
  - dimension: viability_band
    values: "Viability Score 2.0 five-band label (No Chance ... Frontrunner). Do NOT decile (bimodal)."
  - dimension: is_incumbent
    values: |
      TRUE / FALSE / unknown (mart_civics.candidacy, ~70% populated). Part of the tenure
      picture and a first-class sweep dimension (Bryan's office x state x incumbent example).
  - dimension: tenure
    values: |
      first-time candidate / first-time elected official running for first re-election /
      longer-term incumbent (Nth run). Phase 1: structured signals only (is_incumbent,
      win_number, BallotReady candidacy history where determinable); unresolved -> explicit
      "unknown" bucket. Web-search backfill of the ~30% gap DEFERRED unless tenure is spiky.
  - dimension: icp_office_win
    values: |
      Output only - % of Pro (and of each power-user cohort) that is ICP under today's
      mayor/legislator + >1,000 definition. NOT a filter (DATA-1935).

combination_sweep:
  purpose: |
    Bryan's Note 3: cheaply enumerate multi-way dimension combinations and see which combined
    segments over-index among power users vs baseline - e.g. office x state x incumbent -
    without hand-picking. A deterministic pandas loop over the single working set.
  method: |
    Over the dimension set {office_type, election_level, voter_count_band, l2_district_type,
    campaign_state, campaign_party, viability_band, is_incumbent, is_pro, is_activated, tenure},
    enumerate combinations of order 1..K (start K=3; extend to K=4 only if cheap and cells
    survive the floor). For each combination, groupby to cells; KEEP only cells with base
    N>=30. For each kept cell compute the power-user rate (engaged, and intense) within the
    cell, the base power-user rate, the over-index ratio, and a Wilson 95% CI. Rank kept cells
    by a support-weighted over-index (magnitude x sqrt(N)) so large distinctive segments float
    up, not tiny noisy ones.
  guardrails: |
    N>=30 floor on the CELL (not just the marginal). Log how many combinations and cells were
    evaluated and how many dropped below the floor, so silent truncation is visible. Multiple
    comparisons: treat the sweep as hypothesis-generation, not confirmatory - surface the top
    spiky combos, do not attach p-values as if pre-registered. The pre-registered single-dimension
    cuts (cohorts above) remain the confirmatory layer.

sample_size:
  expected_n_total: |
    Scoped base ~23,226 candidacies (~23,214 distinct users - grain barely matters in this
    window; double-counting minor but reported). Verified 2026-07-22.
  expected_n_per_cohort: |
    Power-user engaged ~2,597 (completed generals ~1,417; Pro overlap ~515); power-user
    intense ~303 (completed ~222; Pro overlap ~94). Cross-cut marginals: Pro ~1,019;
    activated ~1,013 (Pro-activated overlap only ~280); completed generals ~14,343; upcoming
    ~8,883; won-cut ceiling (Pro+activated+completed) ~161, won a subset (~80-110).
  power_concern: |
    Won cut (~80-110) is the binding constraint - coarse cuts only (election_level,
    campaign_state, viability_band) + Wilson CIs, plus win-rate within the power-user cohorts;
    no fine won cross-tab. The intense cohort (~303) supports single-dimension cuts and the
    coarsest sweep cells (N>=30) but not deep combinations - the sweep floor handles this by
    construction. The engaged cohort (~2,597) is the workhorse for the sweep. Flag every
    N<30 bin; Wilson CIs on any claimed difference.

falsification:
  what_would_change_belief: |
    Power users existing is not under test (established). Under test is clustering: if neither
    power-user cohort over-indexes on any single dimension OR any N>=30 combination beyond CI
    noise - i.e. power users are distributed like the broad base everywhere - then there is no
    distinctive profile to target, the "power users look like this, acquire lookalikes" thesis
    is unsupported, and DATA-2154 has no data-grounded segment. The over-index ratios + Wilson
    CIs (single-dimension and swept) directly move this.

known_concerns:
  - |
    Point-in-time / lifetime flags: is_pro, is_activated, total_campaigns_sent, and
    dashboard_view_count are mart-materialization snapshots / lifetime counts, not anchored to
    the election date, so post-election usage can leak into the power-user definition. For the
    completed 2025-early-2026 cycles this is a minor timing leak; sanity-check
    pro_upgrade_completed_at vs general_election_date on a sample (execution step 4).
  - |
    Pro-selection bias: sales targets ICP offices, so Pro is not a random draw; ICP/office-adjacent
    over-indexes among Pro may reflect targeting, not organic affinity. Flag on every ICP-adjacent
    finding; DATA-2171 (full-population rerun) is the designed control.
  - |
    Combination sweep is exploratory: with many combinations tested, some over-indexes will be
    chance. It is hypothesis-generation feeding DATA-2154, not confirmatory; the pre-registered
    single-dimension cuts are the confirmatory layer. Do not present swept combos with
    pre-registered-grade confidence.
  - |
    election_level ~45% NULL (correlated with judicial/appointed offices); report the NULL bucket
    explicitly. office_type is a free-ish HubSpot string; may need light grouping.
  - |
    Tenure structurally determinable for only ~70% in phase 1; the "unknown" bucket will be
    sizable and must be shown. Any tenure read is provisional until the deferred backfill runs.
  - |
    Dashboard-threshold choice (p90) is a judgement call; the engaged cohort size moves with it.
    Rerun the definition at p85/p95 as a sensitivity check and report whether headline spiky
    segments are stable to it.

execution_notes:
  preferred_format: notebook
  output_location: |
    analytics/projects/win_power_users/ (scout project). Notebook under notebooks/, this brief
    alongside, working-set builder + sweep helper under the project (promote to analytics/lib if
    they generalize). Per-contributor artifacts gitignored by default; promote with git add -f.
  reruns: |
    Set up for repeated runs. The candidacy-grain working set is built once and re-sliced in
    pandas; DATA-2171 reruns the same cuts on the full population; phase 2 adds geo density,
    organic-vs-sales channel, and L2/Haystaq demographic joins. Carry all slice dims on the
    working set up front so those are free re-cuts / cheap amends.
  steps:
    - 1. Build the candidacy-grain working set once - one row per gp_candidacy_id in the scoped
      base, carrying the two power-user flags (engaged, intense) and ALL cross-cut dims
      (is_pro, is_activated, won, office_type, election_level, voter_count_band, l2_district_type,
      campaign_state, campaign_party, viability_band, is_incumbent, tenure, election_period,
      icp_office_win). Purpose-built query, NOT build_win_working_set (user-grain, funnel-oriented,
      wrong grain).
    - 2. Verify join fan-out - confirm campaign_id = product_campaign_id is ~1:1 after
      is_latest_version; report candidacies with NULL gp_candidacy_id (pre-BR-coverage) as a
      coverage caveat, don't drop silently.
    - 3. Pin power-user thresholds against the observed base distribution and pre-register them;
      compute the two cohort Ns and confirm they match the framing sizing (~2,597 / ~303).
    - 4. Timing sanity check - on a sample of completed generals, compare pro_upgrade_completed_at
      to general_election_date to size the point-in-time-flag leak.
    - 5. Quick first output - cohort Ns and headline single-dimension cuts (office, level, state,
      voter_count band, incumbent, Pro) as over-index vs base, before the full brief.
    - 6. Single-dimension over-index (confirmatory) - per cohort x dimension, cohort-share vs
      base-share with Wilson 95% CIs; flag N<30; surface spiky segments (>5-10% of audience,
      distinctively over-indexed).
    - 7. Combination sweep (exploratory) - the N>=30 multi-way loop per combination_sweep above;
      output a ranked table of the most distinctive combined segments, with the evaluated/dropped
      counts logged.
    - 8. Won overlay - win-rate within engaged and intense cohorts vs base; coarse won cuts
      (election_level, state, viability) + Wilson CIs only.
    - 9. ICP output - % of Pro and of each power-user cohort that is ICP under today's definition;
      do not filter.
    - 10. Dashboard-threshold sensitivity - rerun the engaged definition at p85/p95; report whether
      headline spiky segments are stable.
