command: ["python", "app.py"]

env:
  - name: SLACK_BOT_TOKEN
    valueFrom: 'slack-bot-token'
  - name: SLACK_SIGNING_SECRET
    valueFrom: 'slack-signing-secret'
  - name: SLACK_APP_TOKEN
    valueFrom: 'slack-app-token'
  - name: DATABRICKS_GENIE_SPACE_ID
    valueFrom: 'genie-civics-space'
  - name: PORT
    value: "3000"
  - name: LOG_LEVEL
    value: "INFO"
